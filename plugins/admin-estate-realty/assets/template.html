<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen in the
  Estate Realty refined-light/teal skin. It carries the :root token block and
  the app shell (deep-teal sidebar + sticky topbar + main content slot).
  Replace the brand text, the entity-switcher label, the nav section labels,
  nav items, and the <main> content with the real domain's equivalents.
  Mark the active nav item with .active. Keep the token block intact.
-->
<style>
:root {
  /* Primary accent (teal) */
  --color-accent:        #0d9488;
  --color-accent-mid:    #14b8a6;
  --color-accent-active: #5eead4;
  --color-accent-hover:  #0b7a70;
  --color-accent-light:  #ccfbf1;
  --color-accent-faint:  #f0fdfa;
  /* Status ramp — add/remove to match the domain */
  --color-success:       #16a34a;  --color-success-bg:  #dcfce7;  --color-success-border: #bbf7d0; --color-success-faint: #f0fdf4;
  --color-warning:       #d97706;  --color-warning-bg:  #fef3c7;
  --color-danger:        #dc2626;  --color-danger-bg:   #fee2e2;
  /* Type-distinction pills */
  --color-pill-blue:     #1d4ed8;  --color-pill-blue-bg:   #dbeafe;
  --color-pill-violet:   #6d28d9;  --color-pill-violet-bg: #ede9fe;
  --color-pill-amber:    #854d0e;  --color-pill-amber-bg:  #fef9c3;
  /* Leaderboard rank tokens */
  --color-rank-gold:     #b45309;
  --color-rank-silver:   #64748b;
  --color-rank-bronze:   #92400e;
  /* Neutrals */
  --color-text:          #1e2d2b;
  --color-muted:         #64748b;
  --color-border:        #e3e9e9;
  --color-surface:       #ffffff;
  --color-bg:            #f7f9f9;
  --color-bg-subtle:     #fafcfc;
  /* Sidebar */
  --color-sidebar:       #0f2623;
  --color-sidebar-item:  rgba(255,255,255,0.07);
  --color-sidebar-text:  #a8c5c2;
  --color-sidebar-active:#e2f0ef;
  --color-sidebar-head:  rgba(255,255,255,0.30);
  /* Geometry */
  --radius-card:         12px;
  --shadow-card:         0 2px 10px rgba(13,148,136,0.07);
  --font-sans:           "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
  background: var(--color-bg); color: var(--color-text);
  min-height: 100vh; display: flex;
}

/* ── SIDEBAR ──────────────────────────────────────────────────── */
.sidebar {
  width: 240px; min-height: 100vh; background: var(--color-sidebar);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.brand-mark {
  width: 36px; height: 36px; background: var(--color-accent); border-radius: 9px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
.brand-name span { display: block; font-size: 10px; font-weight: 400; color: var(--color-sidebar-text); letter-spacing: 0.03em; }
/* Entity switcher — relabel to the domain's primary scope */
.entity-switcher {
  margin: 14px 14px 8px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09); border-radius: 8px; padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 6px;
}
.entity-switcher-label { font-size: 12px; color: var(--color-sidebar-text); flex: 1; min-width: 0; }
.entity-switcher-name { color: #e2f0ef; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Nav sections */
.nav-section { padding: 10px 14px 2px; }
.nav-section-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--color-sidebar-head); padding: 0 6px; margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px;
  color: var(--color-sidebar-text); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.15s, color 0.15s; margin-bottom: 1px;
  position: relative; text-decoration: none;
}
.nav-item:hover { background: var(--color-sidebar-item); color: #e2f0ef; }
.nav-item.active { background: rgba(20,184,166,0.18); color: var(--color-accent-active); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: var(--color-accent-mid); border-radius: 0 3px 3px 0;
}
.nav-badge { margin-left: auto; background: var(--color-accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; line-height: 1.6; }
.sidebar-footer {
  margin-top: auto; border-top: 1px solid rgba(255,255,255,0.07);
  padding: 14px 16px; display: flex; align-items: center; gap: 10px;
}
.sidebar-footer-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.sidebar-footer-info { flex: 1; min-width: 0; }
.sidebar-footer-name { color: #e2f0ef; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-footer-role { color: var(--color-sidebar-text); font-size: 10.5px; }

/* ── TOPBAR ──────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: 60px; background: var(--color-surface); border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--color-text); white-space: nowrap; letter-spacing: -0.01em; }
/* Search — relabel placeholder to domain's search subjects */
.topbar-search { flex: 1; max-width: 380px; margin: 0 auto; position: relative; }
.topbar-search input { width: 100%; padding: 7px 14px 7px 34px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-sans); font-size: 13px; color: var(--color-text); background: var(--color-bg); outline: none; transition: border-color 0.15s; }
.topbar-search input::placeholder { color: var(--color-muted); }
.topbar-search input:focus { border-color: var(--color-accent-mid); }
.topbar-search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--color-muted); pointer-events: none; }
/* Dimension filter — relabel options to domain's dimensions */
.filter-select { padding: 6px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-sans); font-size: 12.5px; color: var(--color-text); background: var(--color-surface); cursor: pointer; outline: none; }
.topbar-bell { width: 36px; height: 36px; border-radius: 50%; background: var(--color-bg); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; color: var(--color-muted); flex-shrink: 0; }
.bell-dot { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; border-radius: 50%; background: var(--color-danger); border: 1.5px solid var(--color-surface); }
.topbar-avatar { display: flex; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; }
.topbar-avatar-circle { width: 34px; height: 34px; border-radius: 50%; background: var(--color-accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
.topbar-avatar-name { font-size: 13px; font-weight: 600; color: var(--color-text); }

/* ── MAIN CONTENT SLOT ───────────────────────────────────────── */
.page-body { padding: 24px; display: flex; flex-direction: column; gap: 22px; }

/* Reusable primitives */
.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-card); box-shadow: var(--shadow-card); overflow: hidden; }
.btn-primary { padding: 8px 16px; background: var(--color-accent); color: #fff; font-family: var(--font-sans); font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary:hover { background: var(--color-accent-hover); }
.btn-ghost { padding: 8px 14px; background: transparent; color: var(--color-muted); font-family: var(--font-sans); font-size: 13px; font-weight: 500; border: 1px solid var(--color-border); border-radius: 8px; cursor: pointer; transition: border-color 0.15s, color 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost:hover { border-color: var(--color-accent-mid); color: var(--color-accent); }
.pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
</style>
</head>
<body>

<!-- SIDEBAR: brand → entity-switcher → grouped nav → footer avatar -->

  <div class="sidebar-footer">
