<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Service Admin — {Screen Title}</title>
<style>
  /* ══════════════════════════════════════════════════════════════
     SERVICE ADMIN SKIN — token reference
     Copy this file, replace {placeholders}, drop region skeletons
     from references/layouts.md into <main class="content">.
  ══════════════════════════════════════════════════════════════ */
  :root {
    /* ── Accent / alert / positive ─────────────────────────── */
    --amber:        #f59e0b;
    --amber-light:  #fef3c7;
    --amber-mid:    #fcd34d;
    --tomato:       #ef4444;
    --tomato-light: #fee2e2;
    --green:        #22c55e;
    --green-light:  #dcfce7;

    /* ── Surfaces & borders ─────────────────────────────────── */
    --surface:      #faf8f5;   /* page background */
    --card:         #ffffff;   /* raised card */
    --border:       #ece6df;   /* card/row border */
    --shadow:       0 1px 4px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
    --radius:       10px;

    /* ── Sidebar ────────────────────────────────────────────── */
    --sidebar-bg:   #1c1917;
    --sidebar-text: #d6d3d1;
    --sidebar-act:  #f59e0b;

    /* ── Text ───────────────────────────────────────────────── */
    --text-primary:   #1e293b;
    --text-secondary: #64748b;

    /* ── Typography ─────────────────────────────────────────── */
    --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--surface);
    color: var(--text-primary);
    display: flex;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── SIDEBAR ─────────────────────────────────────────────────── */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 20px 18px 16px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .brand-mark {
    width: 34px; height: 34px;
    background: var(--amber); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .brand-mark svg { color: #1c1917; }
  .brand-name { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.2; }
  .brand-sub { font-size: 10px; color: var(--sidebar-text); letter-spacing: .05em; text-transform: uppercase; }

  .entity-switcher {
    margin: 12px 12px 8px;
    border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
    padding: 8px 10px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; background: rgba(255,255,255,.04);
  }
  .entity-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
  .entity-label { font-size: 12px; color: #e7e5e4; flex: 1; }
  .entity-caret svg { width: 12px; height: 12px; color: var(--sidebar-text); }

  .nav-section { padding: 16px 0 4px; }
  .nav-label {
    font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: rgba(214,211,209,.45); padding: 0 18px; margin-bottom: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px; font-size: 13px; color: var(--sidebar-text);
    cursor: pointer; position: relative; transition: background .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,.05); }
  .nav-item.active { color: #fff; background: rgba(245,158,11,.12); }
  .nav-item.active::before {
    content: ""; position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 3px; background: var(--sidebar-act); border-radius: 0 2px 2px 0;
  }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
  .nav-item.active svg { opacity: 1; color: var(--sidebar-act); }
  .nav-badge {
    margin-left: auto; background: var(--tomato); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px;
  }
  .nav-badge.amber { background: var(--amber); color: #1c1917; }

  .sidebar-footer {
    margin-top: auto;
    border-top: 1px solid rgba(255,255,255,.06);
    padding: 14px 18px; display: flex; align-items: center; gap: 10px;
  }
  .staff-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--amber); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #1c1917; flex-shrink: 0;
  }
  .staff-name { font-size: 12px; color: #e7e5e4; flex: 1; }
  .staff-role { font-size: 10px; color: var(--sidebar-text); }
  .end-link { font-size: 10px; color: var(--tomato); cursor: pointer; margin-left: auto; }

  /* ── MAIN ────────────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ── TOPBAR ──────────────────────────────────────────────────── */
  .topbar {
    height: 60px;
    background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 0 24px;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .topbar-search { flex: 1; max-width: 320px; position: relative; }
  .topbar-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
  .topbar-search input {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px 7px 32px; font-size: 13px; font-family: var(--font);
    background: var(--surface); color: var(--text-primary); outline: none;
  }
  .topbar-search input:focus { border-color: var(--amber); }
  .period-chip {
    background: var(--amber-light); color: #92400e;
    border-radius: 20px; padding: 5px 12px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    border: 1px solid var(--amber-mid);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; color: var(--text-secondary);
  }
  .icon-btn:hover { background: var(--surface); }
  .notif-dot {
    position: absolute; top: 5px; right: 5px;
    width: 7px; height: 7px; background: var(--tomato);
    border-radius: 50%; border: 1.5px solid var(--card);
  }
  .mgr-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--amber); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #1c1917; cursor: pointer;
  }

  /* ── CONTENT SLOT ────────────────────────────────────────────── */
  .content { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

  /* ── PAGE HEADER ─────────────────────────────────────────────── */
  .page-header { display: flex; align-items: center; justify-content: space-between; }
  .page-header-left h2 { font-size: 20px; font-weight: 700; }
  .page-header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
  .header-actions { display: flex; gap: 10px; }

  /* ── BUTTONS ─────────────────────────────────────────────────── */
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); border: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-primary { background: var(--amber); color: #1c1917; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  /* ── SHARED CARD ─────────────────────────────────────────────── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
  .card-title svg { color: var(--amber); }
  .card-link { font-size: 12px; color: var(--amber); font-weight: 600; cursor: pointer; text-decoration: none; }
  .card-count { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 6px; font-variant-numeric: tabular-nums; }

  /* ── STATUS PILLS ────────────────────────────────────────────── */
  .pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .pill.paid     { background: var(--green-light); color: #15803d; }
  .pill.pending  { background: var(--amber-light); color: #92400e; }
  .pill.cancelled{ background: var(--tomato-light); color: #b91c1c; }
  .pill.active   { background: var(--amber-light); color: #92400e; }
  .pill.new      { background: rgba(245,158,11,.12); color: #92400e; border: 1px solid var(--amber-mid); }
  .pill.done     { background: var(--green-light); color: #15803d; }

  /* ── DELTA CHIPS ─────────────────────────────────────────────── */
  .delta { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 2px; padding: 2px 6px; border-radius: 6px; }
  .delta.up   { background: var(--green-light); color: #15803d; }
  .delta.down { background: var(--tomato-light); color: #b91c1c; }

  /* ── KPI TILES ───────────────────────────────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
  .kpi-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
  .kpi-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
  .kpi-value { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .kpi-unit { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }
  .kpi-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .kpi-sub { font-size: 11px; color: var(--text-secondary); }

  /* ── STATE BOARD ─────────────────────────────────────────────── */
  .state-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .state-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .col-header { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  .col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .col-dot.new    { background: var(--amber); }
  .col-dot.active { background: var(--tomato); }
  .col-dot.done   { background: var(--green); }
  .col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-secondary); }
  .col-count { margin-left: auto; background: var(--border); color: var(--text-secondary); font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }

  /* ── RECORD CARD (state board) ───────────────────────────────── */
  .record-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .record-card:last-child { margin-bottom: 0; }
  .record-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .record-id   { font-size: 13px; font-weight: 700; }
  .record-loc  { font-size: 11px; color: var(--text-secondary); }
  .record-time { font-size: 11px; color: var(--text-secondary); }
  .record-summary { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
  .record-footer { display: flex; align-items: center; justify-content: space-between; }
  .record-total  { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .record-btn { font-size: 11px; font-weight: 700; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: var(--font); }
  .record-btn.accept { background: var(--amber); color: #1c1917; }
  .record-btn.done   { background: var(--green-light); color: #15803d; border: 1px solid var(--green); }
  .elapsed-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .elapsed-fill { height: 100%; border-radius: 2px; }
  .elapsed-fill.ok   { background: var(--green); }
  .elapsed-fill.warn { background: var(--amber); }
  .elapsed-fill.late { background: var(--tomato); }

  /* ── RANKED LIST ─────────────────────────────────────────────── */
  .ranked-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ranked-row:last-child { margin-bottom: 0; }
  .rank-badge { width: 20px; height: 20px; border-radius: 6px; background: var(--amber-light); color: #92400e; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ranked-name  { flex: 1; font-size: 13px; font-weight: 500; }
  .ranked-count { font-size: 11px; color: var(--text-secondary); width: 50px; text-align: right; flex-shrink: 0; }
  .ranked-value { font-size: 12px; font-weight: 700; width: 58px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .ranked-bar-wrap { width: 90px; flex-shrink: 0; }
  .ranked-bar { height: 5px; border-radius: 3px; background: var(--amber); }

  /* ── TABLE ───────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--text-secondary); padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); background: var(--card); white-space: nowrap; }
  thead th.num { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:hover { background: var(--surface); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 16px; color: var(--text-primary); font-variant-numeric: tabular-nums; vertical-align: middle; }
  td.num { text-align: right; }
  .id-link { color: var(--amber); font-weight: 700; text-decoration: none; }

  /* ── TOOLBAR ─────────────────────────────────────────────────── */
  .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar-search { position: relative; flex: 1; max-width: 340px; }
  .toolbar-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
  .toolbar-search input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 34px; font-size: 13px; font-family: var(--font); background: var(--card); color: var(--text-primary); outline: none; }
  .toolbar-search input:focus { border-color: var(--amber); }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; background: var(--card); }
  .chip:hover { border-color: var(--amber); color: var(--text-primary); }
  .chip.active { background: var(--amber-light); border-color: var(--amber-mid); color: #92400e; font-weight: 600; }
  .chip-count { font-size: 11px; font-weight: 700; opacity: .7; font-variant-numeric: tabular-nums; }

  /* ── PAGINATION ──────────────────────────────────────────────── */
  .table-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
  .pagination { display: flex; align-items: center; gap: 4px; }
  .page-btn { width: 28px; height: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 12px; font-family: var(--font); }
  .page-btn.active { background: var(--amber); border-color: var(--amber); color: #1c1917; font-weight: 700; }

  /* ── FORM FIELDS ─────────────────────────────────────────────── */
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field.full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .req { color: var(--tomato); margin-left: 1px; }
  .control { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: var(--font); color: var(--text-primary); background: var(--surface); outline: none; transition: border-color .15s; -webkit-appearance: none; }
  .control:focus { border-color: var(--amber); background: var(--card); }
  .helper { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .field.invalid .control { border-color: var(--tomato); background: #fff8f8; }
  .error-msg { font-size: 12px; color: var(--tomato); font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .form-hint { font-size: 12px; color: var(--text-secondary); }

  /* ── ANIMATION ───────────────────────────────────────────────── */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- SIDEBAR — replace {placeholder} values -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark">
      <!-- Replace with your brand glyph (18×18 inline SVG) -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="5" height="5" rx="1" fill="currentColor"/>
        <rect x="10" y="3" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
        <rect x="3" y="10" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
        <rect x="10" y="10" width="5" height="5" rx="1" fill="currentColor" opacity=".35"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">{Brand Name}</div>
      <div class="brand-sub">{Back Office}</div>
    </div>
  </div>

  <div class="entity-switcher">
    <div class="entity-dot"></div>
    <span class="entity-label">{Entity name}</span>
    <div class="entity-caret">
      <svg viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <nav>
    <!-- Repeat .nav-section blocks for each group; add .active to the current item -->
    <div class="nav-section">
      <div class="nav-label">{GROUP LABEL}</div>
      <div class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        {Nav item}
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="staff-avatar">{XX}</div>
    <div>
      <div class="staff-name">{Staff name}</div>
      <div class="staff-role">{Role}</div>
    </div>
    <div class="end-link">End Shift</div>
  </div>
</aside>

<!-- MAIN SHELL -->
<div class="main">
  <header class="topbar">
    <div class="topbar-title">{Screen Title}</div>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Search…">
    </div>
    <div class="period-chip">{Period · HH:MM – HH:MM}</div>
    <div class="topbar-right">
      <div class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 015 5v3l1.5 2.5H2.5L4 10V7a5 5 0 015-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7 14.5a2 2 0 004 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <div class="notif-dot"></div>
      </div>
      <div class="mgr-avatar">{XX}</div>
    </div>
  </header>

  <!-- DROP REGION SKELETONS FROM references/layouts.md BELOW -->
  <main class="content">

    <div class="page-header">
      <div class="page-header-left">
        <h2>{Page heading}</h2>
        <p>{Location · Date}</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost">{Secondary}</button>
        <button class="btn btn-primary">+ {Primary action}</button>
      </div>
    </div>

    <!-- ← paste region skeletons here → -->

  </main>
</div>

</body>
</html>
