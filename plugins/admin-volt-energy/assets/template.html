<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volt Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen in the
  Volt Admin deep-navy / dual-accent skin. It carries the :root token block and
  the app shell (navbar + region-switcher pills + search + notification bell +
  avatar + icon rail + main slot). Replace the brand wordmark, the region labels,
  the rail icons, and the <main> content with the real domain's equivalents.
  Mark the active rail item with .active. Keep the token block intact.
-->
<style>
  :root {
    /* Canvas / surfaces */
    --bg-root:    #0a0e14;
    --bg-panel:   #121822;
    --bg-card:    #1a2230;
    --border:     #28323f;

    /* Dual accent */
    --accent-amber: #fbbf24;
    --accent-cyan:  #22d3ee;

    /* Text ramp */
    --text-hi:    #e4ecf4;
    --text-muted: #8794a4;

    /* Status tokens — add/remove states to match the domain */
    --state-online:   #34d399;
    --state-degraded: #fbbf24;
    --state-offline:  #f87171;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: var(--bg-root);
    color: var(--text-hi);
    min-height: 100vh; display: flex; flex-direction: column;
    font-variant-numeric: tabular-nums;
  }

  /* ── NAVBAR ─────────────────────────────────────────────── */
  .navbar {
    height: 48px; background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px 0 0;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  .nav-logo {
    width: 52px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px solid var(--border);
  }
  .nav-wordmark {
    font-size: 11px; font-weight: 700; letter-spacing: .12em;
    color: var(--accent-amber); text-transform: uppercase; white-space: nowrap;
  }
  /* Region/entity switcher — pill group */
  .nav-regions {
    display: flex; gap: 2px; background: var(--bg-root);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px;
    margin-left: 8px;
  }
  .nav-regions button {
    background: none; border: none; cursor: pointer;
    padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500;
    color: var(--text-muted); transition: all .15s; font-family: inherit;
  }
  .nav-regions button.active { background: var(--bg-card); color: var(--text-hi); }
  /* Search */
  .nav-search {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--bg-root); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
  }
  .nav-search input {
    background: none; border: none; outline: none;
    font-size: 12px; color: var(--text-hi); width: 160px; font-family: inherit;
  }
  .nav-search input::placeholder { color: var(--text-muted); }
  /* Bell */
  .nav-bell { position: relative; cursor: pointer; padding: 6px; }
  .nav-bell-badge {
    position: absolute; top: 4px; right: 3px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-amber); border: 1.5px solid var(--bg-panel);
  }
  /* Avatar */
  .nav-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-cyan), #0e7490);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #0a0e14; cursor: pointer;
  }

  /* ── BODY LAYOUT ─────────────────────────────────────────── */
  .body-wrap { display: flex; padding-top: 48px; flex: 1; }

  /* ── ICON RAIL ───────────────────────────────────────────── */
  .rail {
    width: 52px; flex-shrink: 0; background: var(--bg-root);
    border-right: 1px solid var(--border);
    position: fixed; top: 48px; left: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 2px; z-index: 50;
  }
  .rail-item {
    position: relative; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; color: var(--text-muted);
    transition: color .15s, background .15s;
  }
  .rail-item:hover { background: var(--bg-panel); color: var(--text-hi); }
  .rail-item.active { color: var(--accent-amber); }
  .rail-item.active::before {
    content: ''; position: absolute; left: -8px; top: 10px; bottom: 10px;
    width: 3px; border-radius: 0 2px 2px 0; background: var(--accent-amber);
  }
  .rail-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }

  /* ── MAIN CONTENT SLOT ───────────────────────────────────── */
  .main {
    margin-left: 52px; flex: 1; padding: 20px;
    display: flex; flex-direction: column; gap: 16px; min-width: 0;
  }

  /* ── REUSABLE PRIMITIVES ─────────────────────────────────── */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .btn-ghost { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: border-color .15s, color .15s; }
  .btn-ghost:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .btn-primary { padding: 6px 14px; background: var(--accent-amber); border: none; border-radius: 6px; color: #0a0e14; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .pill { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 3px 9px; border-radius: 4px; }
  .pill-online   { background: rgba(52,211,153,.12); color: var(--state-online); }
  .pill-degraded { background: rgba(251,191,36,.14); color: var(--state-degraded); }
  .pill-offline  { background: rgba(248,113,113,.13); color: var(--state-offline); }
</style>
</head>
<body>

<!-- TOP NAVBAR: logo → wordmark → region switcher → search → bell → avatar -->
<nav class="navbar">
  <div class="nav-logo">
    <!-- Brand glyph (inline SVG, stroke/fill var(--accent-amber) or currentColor) -->
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <polygon points="13,1 5,12 10,12 9,21 17,10 12,10" fill="var(--accent-amber)"/>
    </svg>
  </div>
  <!-- BRAND WORDMARK — relabel to the domain's product name -->
  <span class="nav-wordmark">Brand Name</span>

  <!-- REGION / ENTITY SWITCHER — relabel to the domain's primary scope groupings -->
  <div class="nav-regions">
    <button class="active">Zone A</button>
    <button>Zone B</button>
    <button>Zone C</button>
  </div>

  <div class="nav-search">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="var(--text-muted)" stroke-width="1.6"/>
      <line x1="11" y1="11" x2="15" y2="15" stroke="var(--text-muted)" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <input type="text" placeholder="Search…">
  </div>

  <div class="nav-bell">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <path d="M10 2a6 6 0 0 0-6 6v3l-1.5 2.5h15L16 11V8a6 6 0 0 0-6-6z" stroke="var(--text-muted)" stroke-width="1.5" fill="none"/>
      <path d="M8.5 16.5a1.5 1.5 0 0 0 3 0" stroke="var(--text-muted)" stroke-width="1.5" fill="none"/>
    </svg>
    <div class="nav-bell-badge"></div>
  </div>

  <!-- AVATAR — replace initials with domain user initials -->
  <div class="nav-avatar">OP</div>
</nav>

<div class="body-wrap">

  <!-- ICON RAIL — 3-5 destinations + a pinned settings item. Mark one .active. -->
  <aside class="rail">
    <div class="rail-item active" title="Overview">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity=".9"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/>
      </svg>
    </div>
    <div class="rail-item" title="Entities">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M10 2C6.686 2 4 4.686 4 8c0 4 6 10 6 10s6-6 6-10c0-3.314-2.686-6-6-6z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="10" cy="8" r="2" fill="currentColor" opacity=".7"/>
      </svg>
    </div>
    <div class="rail-item" title="Alerts">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M10 2l7.5 13H2.5L10 2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="10" y1="8" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="10" cy="14.5" r=".8" fill="currentColor"/>
      </svg>
    </div>
    <div class="rail-sep"></div>
    <div class="rail-item" title="Settings" style="margin-top:auto">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.41 1.41M14.37 14.37l1.41 1.41M4.22 15.78l1.41-1.41M14.37 5.63l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
  </aside>

  <!-- MAIN CONTENT SLOT — drop the screen body here (KPI tiles, status board,
       dual-series chart, alerts table, side panel, list, form, or detail).
       See assets/*.html and references/layouts.md. -->
  <main class="main">
    <!-- content goes here -->
  </main>

</div>

</body>
</html>
