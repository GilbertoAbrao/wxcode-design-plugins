<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{Screen title}</title>
<style>
/*
  SLATE ADMIN — token seed
  Copy this file, drop a region skeleton from references/layouts.md into
  the <main> slot, and replace every {placeholder} with real domain content.

  Token recap:
    Canvas/panel  #f9fafb / #ffffff / #f3f4f6 / #e5e7eb
    Text          #111827 / #6b7280 / #9ca3af
    Accent em     #10b981 / #d1fae5 / #059669 / #065f46
    Accent am     #f59e0b / #fef3c7 / #92400e
    Danger        #ef4444 / #fee2e2 / #b91c1c
    Slate         #f1f5f9 / #475569
    Sidebar       240px fixed
    Topbar        60px fixed
    Radius        sm=6px md=10px  Shadow: 0 1px 3px rgba(0,0,0,.07)
*/
:root {
  --bg-base:    #f9fafb;
  --bg-white:   #ffffff;
  --bg-hover:   #f3f4f6;
  --border:     #e5e7eb;
  --text-primary:   #111827;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;
  --accent:          #10b981;
  --accent-light:    #d1fae5;
  --accent-dark:     #059669;
  --accent-deep:     #065f46;
  --accent-am:       #f59e0b;
  --accent-am-light: #fef3c7;
  --accent-am-warn:  #92400e;
  --badge-danger-bg:   #fee2e2;
  --badge-danger-text: #b91c1c;
  --badge-slate-bg:    #f1f5f9;
  --badge-slate-text:  #475569;
  --sidebar-w: 240px;
  --topbar-h: 60px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "Courier New", monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--text-primary);background:var(--bg-base);display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:16px}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.brand-icon{width:32px;height:32px;flex-shrink:0;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-name{font-weight:700;font-size:15px;letter-spacing:-.3px;line-height:1.1}
.brand-tag{font-size:11px;color:var(--text-secondary)}
.entity-switcher{margin:12px 12px 4px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.entity-label{font-size:12px;font-weight:600}
.entity-sub{font-size:11px;color:var(--text-secondary)}
.nav-section{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-muted);padding:16px 18px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;color:var(--text-secondary);font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .12s,color .12s;position:relative}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{color:var(--accent);font-weight:600;background:var(--accent-light)}
.nav-item.active::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-badge{margin-left:auto;background:var(--accent-am);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.sidebar-footer{margin-top:auto;padding:12px 14px 0;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent-light),#6ee7b7);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent-dark);flex-shrink:0}
.footer-name{font-size:13px;font-weight:600;line-height:1.2}
.footer-role{font-size:11px;color:var(--text-secondary)}
.footer-logout{margin-left:auto;cursor:pointer;color:var(--text-muted)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);flex-shrink:0;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px}
.page-title{font-size:18px;font-weight:700;letter-spacing:-.4px}
.topbar-spacer{flex:1}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;width:220px}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--text-primary);outline:none;width:100%;font-family:var(--font)}
.search-box input::placeholder{color:var(--text-muted)}
.range-pill{display:flex;align-items:center;gap:7px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer}
.notif-btn{position:relative;width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--bg-base);border:1px solid var(--border);cursor:pointer;color:var(--text-secondary)}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--accent-am);border:1.5px solid var(--bg-white)}
.avatar-ring{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent-light),#6ee7b7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent-dark);border:2px solid var(--accent);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── SHARED COMPONENTS ── */
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-card)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.btn-primary{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge.active{background:var(--accent-light);color:var(--accent-dark)}
.badge.pending{background:var(--accent-am-light);color:var(--accent-am-warn)}
.badge.inactive{background:var(--badge-slate-bg);color:var(--badge-slate-text)}
.badge.danger{background:var(--badge-danger-bg);color:var(--badge-danger-text)}
.badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.8}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);padding:10px 20px;text-align:left;background:var(--bg-base);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-hover)}
tbody td{padding:12px 20px;font-size:13px;vertical-align:middle}
.rec-id{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
.rec-metric{font-weight:700;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <!-- Replace with domain glyph (inline SVG, stroke=#fff) -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">{App Name}</div>
      <div class="brand-tag">Admin Console</div>
    </div>
  </div>

  <div class="entity-switcher">
    <div>
      <div class="entity-label">{Primary entity name}</div>
      <div class="entity-sub">{entity sub-label}</div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <div class="nav-section">Main</div>
  <a class="nav-item active" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    {Nav item 1}
  </a>
  <!-- Add 3–4 more nav-item entries following the same pattern -->
  <!-- Use .nav-badge for count indicators -->

  <div class="sidebar-footer">
    <div class="avatar-sm">{XX}</div>
    <div>
      <div class="footer-name">{User Name}</div>
      <div class="footer-role">{Role}</div>
    </div>
    <div class="footer-logout" title="Log out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="page-title">{Page title}</div>
    <div class="topbar-spacer"></div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Search {entities}…" type="text" readonly/>
    </div>
    <div class="range-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      {Date range}
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="notif-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="notif-dot"></div>
    </div>
    <div class="avatar-ring">{XX}</div>
  </header>

  <!-- CONTENT — drop region skeletons from references/layouts.md here -->
  <div class="content">
    <!-- TODO: paste KPI row, chart+ranked grid, or records table from layouts.md -->
  </div>

</main>

</body>
</html>
