<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Screen title}</title>
<style>
  /* ─────────────────────────────────────────────────────────────
     Circle Admin — shell template
     Copy this file, drop a region skeleton from references/layouts.md
     into <main class="main">, and fill in domain content.
  ──────────────────────────────────────────────────────────────── */

  :root {
    /* Accent */
    --accent-blue:        #3b82f6;
    --accent-violet:      #8b5cf6;
    --accent-blue-soft:   #eff6ff;
    --accent-violet-soft: #f5f3ff;
    /* Status */
    --status-green:       #22c55e;
    --status-amber:       #f59e0b;
    --status-red:         #ef4444;
    --status-green-soft:  #dcfce7;
    --status-amber-soft:  #fef3c7;
    --status-red-soft:    #fee2e2;
    /* Chart */
    --chart-line:         #3b82f6;
    --chart-area:         rgba(59,130,246,0.12);
    --chart-violet:       #8b5cf6;
    --chart-violet-area:  rgba(139,92,246,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #334155;
    background: #f8f9fc;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar (220px) ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #e8eaf2;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 18px 16px 14px;
    border-bottom: 1px solid #e8eaf2;
  }

  .brand-icon { width: 32px; height: 32px; flex-shrink: 0; }
  .brand-name { font-size: 15px; font-weight: 700; color: #0f172a; letter-spacing: -0.01em; }

  .context-switcher {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    margin: 12px 10px 4px;
    background: var(--accent-blue-soft);
    border: 1px solid #bfdbfe;
    border-radius: 8px;
    cursor: pointer;
  }

  .context-switcher-name {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--accent-blue);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-section { padding: 14px 10px 0; }

  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: #94a3b8;
    text-transform: uppercase;
    padding: 0 6px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    color: #64748b;
    font-size: 13.5px;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: background 0.12s, color 0.12s;
    text-decoration: none;
  }

  .nav-item:hover  { background: #f1f5f9; color: #334155; }
  .nav-item.active { border-left-color: var(--accent-blue); background: var(--accent-blue-soft); color: var(--accent-blue); font-weight: 600; }
  .nav-item svg    { flex-shrink: 0; }

  .nav-badge {
    margin-left: auto;
    background: var(--status-red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 6px;
    min-width: 18px;
    text-align: center;
  }

  .sidebar-footer {
    margin-top: auto;
    border-top: 1px solid #e8eaf2;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Avatar helpers ── */
  .avatar-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .av-blue   { background: var(--accent-blue-soft);  color: var(--accent-blue); }
  .av-violet { background: var(--accent-violet-soft); color: var(--accent-violet); }
  .av-green  { background: var(--status-green-soft);  color: #16a34a; }
  .av-amber  { background: var(--status-amber-soft);  color: #d97706; }
  .av-slate  { background: #f1f5f9;                   color: #475569; }

  .sidebar-user-info  { flex: 1; min-width: 0; }
  .sidebar-user-name  { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-role  { font-size: 11px; color: #94a3b8; }

  /* ── Main column ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  /* ── Topbar (56px) ── */
  .topbar {
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #e8eaf2;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .breadcrumb       { font-size: 13px; color: #94a3b8; white-space: nowrap; }
  .breadcrumb strong { color: #0f172a; font-weight: 600; }

  .search-wrap    { flex: 1; max-width: 340px; position: relative; margin-left: auto; }
  .search-icon    { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }
  .search-input   { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid #e8eaf2; border-radius: 8px; font-size: 13px; font-family: inherit; color: #334155; background: #f8f9fc; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent-blue); background: #fff; }
  .search-input::placeholder { color: #94a3b8; }

  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .date-chip      { font-size: 12px; font-weight: 600; color: #475569; background: #f1f5f9; border: 1px solid #e8eaf2; border-radius: 6px; padding: 5px 10px; white-space: nowrap; }

  .icon-btn { position: relative; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; border: 1px solid #e8eaf2; background: #fff; }
  .icon-btn:hover { background: #f8f9fc; }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--status-red); border-radius: 50%; border: 1.5px solid #fff; }

  /* ── Page body ── */
  .page-body {
    padding: 24px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .page-header    { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .page-title     { font-size: 20px; font-weight: 700; color: #0f172a; }
  .page-subtitle  { font-size: 13px; color: #64748b; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }

  /* ── Button helpers ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; line-height: 1; white-space: nowrap; }
  .btn-primary  { background: var(--accent-blue); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: #93c5fd; cursor: default; }
  .btn-ghost    { background: transparent; border: 1px solid #e8eaf2; color: #475569; }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-danger   { background: transparent; border: 1px solid var(--status-red); color: #dc2626; }
  .btn-danger:hover { background: var(--status-red-soft); }
  .btn-sm       { padding: 5px 10px; font-size: 12px; }

  /* ── Card ── */
  .card { background: #fff; border: 1px solid #e8eaf2; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; }
  .card-header  { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #e8eaf2; }
  .card-title   { font-size: 15px; font-weight: 700; color: #0f172a; }

  /* ── Badge / pill ── */
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .badge-blue   { background: var(--accent-blue-soft);  color: var(--accent-blue); }
  .badge-violet { background: var(--accent-violet-soft); color: var(--accent-violet); }
  .badge-red    { background: var(--status-red-soft);   color: #dc2626; }
  .badge-amber  { background: var(--status-amber-soft); color: #d97706; }
  .badge-green  { background: var(--status-green-soft); color: #16a34a; }
  .badge-slate  { background: #f1f5f9;                  color: #64748b; }

  .pill { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #94a3b8; padding: 10px 20px; border-bottom: 1px solid #e8eaf2; background: #fafbfc; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fc; }
  td { padding: 13px 20px; color: #334155; vertical-align: middle; }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 13px; font-weight: 600; color: #334155; }
  .req { color: var(--status-red); margin-left: 2px; }
  .control { padding: 9px 12px; border: 1px solid #e8eaf2; border-radius: 8px; font-size: 13.5px; font-family: inherit; color: #334155; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; }
  .control:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .control::placeholder { color: #94a3b8; }
  .helper { font-size: 12px; color: #94a3b8; }
  .field.invalid .control { border-color: var(--status-red); background: #fff8f8; }
  .error-msg { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #dc2626; }
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <!-- Replace SVG icon with domain's brand mark -->
    <svg class="brand-icon" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" fill="var(--accent-blue-soft)" stroke="var(--accent-blue)" stroke-width="1.5"/>
      <circle cx="16" cy="7"  r="2.5" fill="var(--accent-blue)"/>
      <circle cx="23.5" cy="10.5" r="2.5" fill="var(--accent-violet)"/>
      <circle cx="23.5" cy="21.5" r="2.5" fill="var(--accent-blue)"/>
      <circle cx="16" cy="25" r="2.5" fill="var(--accent-violet)"/>
      <circle cx="8.5" cy="21.5" r="2.5" fill="var(--accent-blue)"/>
      <circle cx="8.5" cy="10.5" r="2.5" fill="var(--accent-violet)"/>
      <circle cx="16" cy="16" r="3"   fill="var(--accent-blue)"/>
    </svg>
    <span class="brand-name">{Brand}</span>
  </div>

  <div class="context-switcher">
    <span class="context-switcher-name">{Active context}</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:var(--accent-blue);flex-shrink:0">
      <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Repeat nav-section blocks for each nav group -->
  <nav class="nav-section">
    <div class="nav-section-label">{Group label}</div>
    <a class="nav-item active" href="#">
      <!-- inline SVG icon 16×16 -->
      {Nav item}
    </a>
    <a class="nav-item" href="#">
      <!-- inline SVG icon 16×16 -->
      {Nav item}
      <!-- optional: <span class="nav-badge">{N}</span> -->
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="avatar-circle av-blue">{Initials}</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name">{Operator name}</div>
      <div class="sidebar-user-role">{Role}</div>
    </div>
    <!-- sign-out icon -->
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:#94a3b8;flex-shrink:0;cursor:pointer">
      <path d="M5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h2M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</aside>

<!-- ── Main column ─────────────────────────────────────────────── -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <span class="breadcrumb">{Brand}&ensp;/&ensp;<strong>{Screen}</strong></span>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" type="text" placeholder="Search {entities}…">
    </div>
    <div class="topbar-actions">
      <span class="date-chip">{Date range}</span>
      <div class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2a5 5 0 00-5 5c0 3-1.5 4-1.5 4h13S13 10 13 7a5 5 0 00-5-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9.7 13.5a2 2 0 01-3.4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="notif-dot"></span>
      </div>
      <div class="avatar-circle av-blue" style="width:34px;height:34px;font-size:13px;cursor:pointer">{Initials}</div>
    </div>
  </header>

  <!-- Page body — drop region skeletons from references/layouts.md here -->
  <div class="page-body">

    <div class="page-header">
      <div>
        <div class="page-title">{Screen title}</div>
        <div class="page-subtitle">{Context · scope · timestamp}</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost">{Secondary action}</button>
        <button class="btn btn-primary">+ {Primary action}</button>
      </div>
    </div>

    <!-- ↓ paste region skeleton from references/layouts.md ↓ -->

  </div>

</div>
</body>
</html>
