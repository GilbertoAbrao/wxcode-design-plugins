<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title}</title>
<style>
/* ── Design tokens — COPY THESE to every screen ── */
:root {
  --accent:        #ea580c;   /* deep orange — CTAs, active nav, key figures */
  --accent-hover:  #c2410c;
  --accent-light:  #fff7ed;   /* tint for hover rows, pill bg, focus ring */
  --amber:         #f59e0b;   /* secondary highlight, warn state */
  --amber-light:   #fffbeb;
  --success:       #16a34a;
  --success-light: #f0fdf4;
  --danger:        #dc2626;
  --danger-light:  #fef2f2;
  --warn:          #d97706;
  --surface:       #ffffff;   /* card bg */
  --bg:            #f8f9fb;   /* page canvas */
  --border:        #e6e9ee;
  --text:          #1e293b;
  --muted:         #64748b;
  --sidebar-bg:    #1a2235;   /* dark navy sidebar */
  --sidebar-text:  #94a3b8;
  --sidebar-active:#ffffff;
  --radius-sm:     6px;
  --radius-md:     10px;
  --shadow-card:   0 1px 4px rgba(0,0,0,.06);
  --shadow-hover:  0 4px 12px rgba(0,0,0,.10);
  --font:          "Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;display:flex}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}

/* ── Sidebar (240px, dark navy) ── */
.sidebar{
  width:240px;flex-shrink:0;background:var(--sidebar-bg);
  display:flex;flex-direction:column;min-height:100vh;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
/* Brand block */
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
/* Entity switcher */
.entity-switcher{margin:14px 12px 8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
/* Nav group */
.nav-group{margin-top:18px}
.nav-group-label{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:rgba(148,163,184,.55);padding:0 18px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;font-size:13px;font-weight:500;color:var(--sidebar-text);cursor:pointer;border-left:3px solid transparent;transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.04);color:#fff}
.nav-item.active{background:rgba(234,88,12,.15);border-left-color:var(--accent);color:var(--sidebar-active)}
/* Footer */
.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}

/* ── Main column ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar (60px, white, sticky) ── */
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:20}
/* search pill: rounded input, left magnifier icon, focus => border var(--accent) */
/* context filter: pill button with caret */
/* notification bell: round border button with amber dot */
/* avatar: round gradient circle with initials */

/* ── Page body ── */
.page-body{flex:1;padding:24px;display:flex;flex-direction:column;gap:22px}

/* ── Page header (every screen) ── */
.page-header{display:flex;align-items:center;justify-content:space-between}
/* .page-title: 18px / weight 800 / letter-spacing -.02em */
/* .page-sub: 12px / muted */
/* .header-actions: flex row of .btn-ghost + .btn-primary */

/* ── Buttons ── */
.btn-ghost{height:32px;padding:0 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--border);display:flex;align-items:center;gap:5px;transition:border-color .15s,color .15s}
.btn-ghost:hover{border-color:var(--muted);color:var(--text)}
.btn-primary{height:32px;padding:0 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;color:#fff;background:var(--accent);display:flex;align-items:center;gap:5px;transition:background .15s}
.btn-primary:hover{background:var(--accent-hover)}

/* ── KPI card row (4 × 1fr grid) ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px 14px;box-shadow:var(--shadow-card);display:flex;flex-direction:column;gap:6px}
/* kpi-value: 26px / weight 800 / tabular-nums */
/* kpi-delta chips: delta-up (success), delta-down (danger), delta-warn (amber) */
/* sparkline: inline SVG polyline 56×22 */
/* optional kpi-progress-wrap: 4px bar, gradient accent→amber */

/* ── Middle grid (7fr / 5fr) ── */
.mid-grid{display:grid;grid-template-columns:7fr 5fr;gap:16px;align-items:start}

/* ── Card shell ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-card);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-action{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}

/* ── Kanban status board ── */
/* .board-columns: grid 4 × 1fr, gap 12px, padding 16px */
/* each .board-col: col label (uppercase 11px) + count badge + item cards */
/* .item-card: white border card, 3px left-color stripe (pending=slate, loading=amber, transit=orange, delivered=green) */
/* hover: box-shadow var(--shadow-hover) + translateY(-1px) */

/* ── Network visualization ── */
/* SVG graph: nodes (circles) + bezier arcs; active=orange, busy=amber, idle=slate */
/* animated traveler: <circle> + <animateMotion> on a named <path id="route-p"> */
/* legend row: dot + label pairs */

/* ── Records table ── */
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:10px 20px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
tbody tr{transition:background .1s;border-bottom:1px solid var(--border)}
tbody tr:nth-child(odd){background:var(--bg)}
tbody tr:hover{background:var(--accent-light)}
tbody td{padding:10px 20px;font-size:13px;color:var(--text);white-space:nowrap}
/* .td-id: accent color, monospace, weight 700 */
/* .td-mono: monospace chip with bg+border */
/* numeric cells: font-variant-numeric: tabular-nums */

/* ── Status pills ── */
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
/* .pill-pending: bg #f1f5f9, color #475569 */
/* .pill-loading: bg amber-light, color warn */
/* .pill-transit: bg accent-light, color accent */
/* .pill-delayed: bg danger-light, color danger */
/* .pill-delivered: bg success-light, color success */

/* ── Form fields ── */
/* .field-input / .field-select: 36px, 1px border, radius-sm, focus => accent border + accent-light shadow */
/* .field-input.error / .field-select.error: danger border */
/* .field-label: 12px weight 600; .req: accent '*' */
/* .field-helper: 11px muted; .field-error: 11px danger */

/* ── Pager ── */
.pager{display:flex;gap:4px}
.pager-btn{height:28px;min-width:28px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--surface);color:var(--text);cursor:pointer}
.pager-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<!-- ══ Sidebar ══ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <!-- Replace: inline SVG brand glyph (32–36px) + wordmark + sub-label -->
    <div style="width:34px;height:34px;border-radius:6px;background:var(--accent);flex-shrink:0"></div>
    <div>
      <div style="color:#fff;font-size:15px;font-weight:700">{Brand}</div>
      <div style="color:var(--sidebar-text);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase">{Sub}</div>
    </div>
  </div>

  <!-- Entity switcher -->
  <div class="entity-switcher">
    <div>
      <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--sidebar-text);margin-bottom:2px">{SWITCHER LABEL}</div>
      <div style="font-size:13px;font-weight:600;color:#fff">{Current entity}</div>
    </div>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="color:var(--sidebar-text)">
      <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Nav group — repeat for each group -->
  <nav class="nav-group">
    <div class="nav-group-label">{GROUP}</div>
    <!-- Repeat .nav-item; add .active to current page -->
    <div class="nav-item active">
      <!-- inline SVG icon 16×16 -->
      {Nav item}
    </div>
    <div class="nav-item">{Nav item}</div>
  </nav>

  <!-- Sidebar footer -->
  <div class="sidebar-footer">
    <div style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">{IN}</div>
    <div>
      <div style="font-size:13px;font-weight:600;color:#fff">{Name}</div>
      <div style="font-size:10px;color:var(--sidebar-text)">{Role}</div>
    </div>
  </div>
</aside>

<!-- ══ Main ══ -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <div>
      <div style="font-size:15px;font-weight:700">{Page title}</div>
      <div style="font-size:12px;color:var(--muted)">{Breadcrumb}</div>
    </div>
    <!-- search pill: position:relative wrapper, input with left padding 36px, SVG icon absolute left 11px -->
    <div style="flex:1;max-width:380px;margin-left:20px;position:relative">
      <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Search&hellip;" style="width:100%;height:36px;border:1px solid var(--border);border-radius:20px;background:var(--bg);padding:0 14px 0 36px;font-size:13px;color:var(--text)">
    </div>
    <div style="flex:1"></div>
    <!-- context filter, bell, avatar — see dashboard.html for full markup -->
    <button class="btn-ghost">{Context} <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 3.5l2.5 3 2.5-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </header>

  <!-- Page body -->
  <div class="page-body">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <div style="font-size:18px;font-weight:800;letter-spacing:-.02em">{Screen title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">{Subtitle / context}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost">{Secondary action}</button>
        <button class="btn-primary">+ {Primary action}</button>
      </div>
    </div>

    <!--
      Drop region skeletons here — see references/layouts.md for:
      - KPI card row
      - 2-column grid (Kanban status board + network visualization)
      - Full-width records table
      - List screen (filter bar + table)
      - Form screen (sectioned field cards)
      - Detail screen (header band + meta grid + sub-panels)
    -->

  </div>
</div>

</body>
</html>
