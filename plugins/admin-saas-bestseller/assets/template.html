<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Screen Title}</title>
<style>
/* ─────────────────────────────────────────────
   SaaS Admin Bestseller — token + shell seed
   Copy this file. Replace {placeholders}.
   ───────────────────────────────────────────── */
:root {
  /* Accent */
  --accent: #5369f8;
  --accent-dark: #3d52d5;
  --accent-light: #eef0fe;
  /* Surfaces */
  --surface: #f5f7fa;
  --white: #ffffff;
  --border: #e8eaed;
  /* Text */
  --text-1: #111827;
  --text-2: #6b7280;
  --text-3: #9ca3af;
  /* Semantic */
  --green: #10b981;  --green-light: #d1fae5;
  --red: #ef4444;    --red-light: #fee2e2;
  --orange: #f59e0b; --orange-light: #fef3c7;
  /* Structure */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --shadow: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.04);
  --radius-card: 12px;
  --radius-btn: 8px;
  --radius-pill: 20px;
  --radius-ctrl: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--surface); font-family: var(--font); color: var(--text-1); font-size: 14px; line-height: 1.5; }

/* ── SHELL ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.brand-row { height: var(--topbar-h); display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.brand-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-mark svg { color: #fff; }
.brand-name { font-size: 15px; font-weight: 700; color: var(--text-1); letter-spacing: -0.3px; }
.nav-section { padding: 20px 12px 4px; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-btn); color: var(--text-2); text-decoration: none; font-size: 13.5px; font-weight: 500; position: relative; cursor: pointer; transition: background .15s, color .15s; }
.nav-item:hover { background: var(--surface); color: var(--text-1); }
.nav-item.active { background: var(--accent-light); color: var(--accent); }
.nav-item.active::before { content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0; }
.nav-item svg { flex-shrink: 0; opacity: .7; }
.nav-item.active svg { opacity: 1; }
.nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; line-height: 16px; }
.sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }
.user-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-btn); cursor: pointer; transition: background .15s; }
.user-row:hover { background: var(--surface); }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.avatar-sm { width: 24px; height: 24px; font-size: 10px; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text-3); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOPBAR ── */
.topbar { height: var(--topbar-h); background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-3); }
.breadcrumb a { color: var(--text-3); text-decoration: none; }
.breadcrumb a:hover { color: var(--accent); }
.bc-sep { color: var(--border); }
.bc-cur { color: var(--text-1); font-weight: 500; }
.search-wrap { flex: 1; max-width: 320px; margin: 0 auto; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
.search-input { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 6px; padding: 0 12px 0 34px; font-size: 13px; color: var(--text-1); background: var(--surface); outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--accent); background: var(--white); }
.search-input::placeholder { color: var(--text-3); }
.tb-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.icon-btn { width: 36px; height: 36px; border: none; background: transparent; border-radius: var(--radius-btn); display: flex; align-items: center; justify-content: center; color: var(--text-2); cursor: pointer; position: relative; transition: background .15s; }
.icon-btn:hover { background: var(--surface); }
.notif-dot { position: absolute; top: 7px; right: 7px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 1.5px solid #fff; }
.tb-divider { width: 1px; height: 24px; background: var(--border); }
.tb-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-btn); transition: background .15s; }
.tb-user:hover { background: var(--surface); }
.tb-username { font-size: 13px; font-weight: 600; color: var(--text-1); }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── BUTTONS ── */
.btn { height: 36px; padding: 0 16px; border-radius: var(--radius-btn); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .15s, border-color .15s; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); }
.btn-ghost:hover { background: var(--surface); }
.btn-primary { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

/* ── CARD ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow); }
.card-head { padding: 18px 20px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.card-title { font-size: 15px; font-weight: 700; color: var(--text-1); }
.view-all { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }

/* ── PILLS ── */
.status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; }
.st-active { background: var(--green-light); color: #065f46; }
.st-pending { background: var(--orange-light); color: #92400e; }
.st-inactive { background: var(--red-light); color: #991b1b; }
.st-dot { width: 5px; height: 5px; border-radius: 50%; }
.st-active .st-dot { background: var(--green); }
.st-pending .st-dot { background: var(--orange); }
.st-inactive .st-dot { background: var(--red); }
.cat-pill { display: inline-block; padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; }

/* ── FIELDS (form screens) ── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 13px; font-weight: 600; color: var(--text-1); }
.req { color: var(--red); }
.control { height: 38px; border: 1.5px solid var(--border); border-radius: var(--radius-ctrl); padding: 0 12px; font-size: 13px; color: var(--text-1); background: var(--white); font-family: var(--font); outline: none; transition: border-color .15s, box-shadow .15s; }
.control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(83,105,248,.12); }
.control::placeholder { color: var(--text-3); }
.helper { font-size: 11px; color: var(--text-3); }
.error-msg { display: flex; align-items: flex-start; gap: 5px; font-size: 11px; color: var(--red); }
.field.invalid .control { border-color: var(--red); }

/* ── TABLE (list/dashboard) ── */
table { width: 100%; border-collapse: collapse; }
thead th { padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); background: var(--surface); border-bottom: 1px solid var(--border); }
thead th:first-child { padding-left: 20px; }
thead th:last-child { padding-right: 20px; }
tbody tr { transition: background .12s; }
tbody tr:hover { background: #f9fafb; }
tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
tbody td { padding: 12px 16px; font-size: 13px; color: var(--text-1); vertical-align: middle; }
tbody td:first-child { padding-left: 20px; }
.num-cell { font-variant-numeric: tabular-nums; font-weight: 600; }
.tbl-foot { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
.tbl-count { font-size: 12px; color: var(--text-3); }
.pagination { display: flex; gap: 4px; }
.page-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); font-size: 12px; font-weight: 500; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s; }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── ADD SCREEN-SPECIFIC STYLES BELOW ── */
</style>
</head>
<body>
<div class="shell">

  <!-- Sidebar (copy and adjust nav-item.active to match current screen) -->
  <aside class="sidebar">
    <div class="brand-row">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Replace with domain brand glyph -->
          <path d="M3 9h5M9 3v5M9 9l4 4"/><circle cx="9" cy="9" r="7"/>
        </svg>
      </div>
      <span class="brand-name">{Brand Name}</span>
    </div>

    <div class="nav-section">
      <div class="nav-label">{Group Label}</div>
      <a class="nav-item active" href="#">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <!-- icon glyph -->
        </svg>
        {Nav Item}
      </a>
      <!-- repeat nav items -->
    </div>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" style="background:#dbeafe;color:#1d4ed8;">{IN}</div>
        <div class="user-info">
          <div class="user-name">{User Name}</div>
          <div class="user-role">{Role}</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#9ca3af" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l4 4-4 4"/></svg>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <nav class="breadcrumb">
        <a href="#">Home</a><span class="bc-sep">/</span>
        <span class="bc-cur">{Screen Title}</span>
      </nav>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="4"/><path d="M9.5 9.5l3 3"/>
        </svg>
        <input class="search-input" type="text" placeholder="Search…">
      </div>
      <div class="tb-actions">
        <button class="icon-btn" title="Notifications">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 1a5 5 0 0 1 5 5v2l1.5 2.5H1.5L3 8V6a5 5 0 0 1 5-5z"/>
            <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="tb-divider"></div>
        <div class="tb-user">
          <div class="avatar avatar-sm" style="background:#dbeafe;color:#1d4ed8;">{IN}</div>
          <span class="tb-username">{User Name}</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#9ca3af" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5l3 3 3-3"/></svg>
        </div>
      </div>
    </header>

    <main class="content">
      <!-- Drop region skeletons from references/layouts.md here -->
    </main>
  </div>

</div>
</body>
</html>
