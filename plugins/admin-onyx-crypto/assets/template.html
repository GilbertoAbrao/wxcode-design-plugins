<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onyx Admin — Screen Title</title>
<style>
/* ── Onyx Admin Token Set ────────────────────────────────────────────────────
   Copy this block into every screen you build with this skin.
   Replace placeholder labels (in curly braces) with real domain content.
   ────────────────────────────────────────────────────────────────────────── */
:root {
  /* Canvas */
  --bg-base:      #0a0a0f;   /* page background */
  --bg-surface:   #14141c;   /* rail, topbar, card surface */
  --bg-elevated:  #1c1c28;   /* raised panels, KPI cards */
  --bg-hover:     #222232;   /* row hover, control hover */
  --border:       #262633;   /* hairline separator */
  --border-light: #2e2e40;   /* stronger hover border */

  /* Text ramp */
  --text-primary: #e8e8f0;
  --text-muted:   #8a8aa0;
  --text-dim:     #55556a;

  /* Primary accent — emerald */
  --accent:        #10b981;
  --accent-dim:    #0d9166;
  --accent-bg:     rgba(16,185,129,.10);
  --accent-glow:   rgba(16,185,129,.18);

  /* Secondary accent — violet */
  --accent2:       #8b5cf6;
  --accent2-bg:    rgba(139,92,246,.12);

  /* Gain / Loss */
  --gain:    #10b981;
  --gain-bg: rgba(16,185,129,.12);
  --loss:    #f43f5e;
  --loss-bg: rgba(244,63,94,.12);

  /* Error (forms) */
  --error:    #f43f5e;
  --error-bg: rgba(244,63,94,.12);

  /* Layout */
  --font:        "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --radius-card: 10px;
  --rail-w:      220px;
  --topbar-h:    60px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Body ── */
body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg-base);
  color: var(--text-primary);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Left Rail (220px, fixed) ───────────────────────────────────────────── */
.rail {
  width: var(--rail-w); min-height: 100vh;
  background: var(--bg-surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
}
.rail-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px; border-bottom: 1px solid var(--border);
}
.rail-brand-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.rail-brand-name { font-weight: 700; font-size: 15px; letter-spacing: -.3px; }
.rail-brand-name em { color: var(--accent); font-style: normal; }
.rail-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-dim);
  padding: 16px 18px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; cursor: pointer; color: var(--text-muted);
  font-size: 13.5px; font-weight: 500; position: relative;
  transition: background .15s, color .15s; text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { color: var(--accent); background: var(--accent-bg); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-item svg { flex-shrink: 0; opacity: .8; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 20px;
  background: var(--accent2-bg); color: var(--accent2);
}
.rail-nav { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.rail-footer {
  border-top: 1px solid var(--border); padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
}
.rail-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}

/* ── Main wrapper ── */
.main { margin-left: var(--rail-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Topbar (60px, sticky) ──────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h); background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
/* Context-switcher pill */
.ctx-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--text-primary);
}
.ctx-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 6px var(--accent);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
/* Entity address pill */
.entity-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer;
}
.entity-addr { font-variant-numeric: tabular-nums; font-family: monospace; font-size: 11.5px; }
/* Search */
.topbar-search { flex: 1; max-width: 320px; margin: 0 auto; }
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
}
.search-wrap input { background: none; border: none; outline: none; color: var(--text-primary); font-family: var(--font); font-size: 13px; width: 100%; }
.search-wrap input::placeholder { color: var(--text-dim); }
/* Icon buttons + avatar */
.topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.icon-btn {
  width: 36px; height: 36px; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted); position: relative;
}
.icon-btn:hover { color: var(--text-primary); }
.notif-dot {
  position: absolute; top: 7px; right: 7px; width: 6px; height: 6px;
  border-radius: 50%; background: var(--loss); border: 1px solid var(--bg-surface);
}
.top-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; cursor: pointer;
}

/* ── Page content ── */
.page { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

/* Page header */
.page-header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -.4px; }
.page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
.page-actions { display: flex; gap: 10px; }

/* Buttons */
.btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover { border-color: var(--border-light); color: var(--text-primary); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dim); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

/* Card */
.card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.card-title { font-size: 14px; font-weight: 700; }
.card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* KPI card */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.kpi-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 18px 20px 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color .2s, box-shadow .2s; }
.kpi-card:hover { border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
.kpi-label { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); }
.kpi-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
.kpi-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.5px; line-height: 1; }
.kpi-footer { display: flex; align-items: center; gap: 6px; }
.delta-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11.5px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 2px 7px; border-radius: 20px; }
.delta-chip.gain { background: var(--gain-bg); color: var(--gain); }
.delta-chip.loss { background: var(--loss-bg); color: var(--loss); }
.kpi-sub { font-size: 11.5px; color: var(--text-muted); }

/* Dense table */
table { width: 100%; border-collapse: collapse; }
thead th { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg-hover); }
tbody td { padding: 12px 16px; font-size: 13.5px; font-variant-numeric: tabular-nums; vertical-align: middle; }

/* Status pill */
.status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 700; }
.status-pill.active  { background: rgba(16,185,129,.13); color: var(--gain); }
.status-pill.pending { background: rgba(245,158,11,.13); color: #f59e0b; }
.status-pill.closed  { background: rgba(138,138,160,.13); color: var(--text-muted); }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* Form field */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12.5px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 4px; }
.req { color: var(--accent); font-weight: 700; }
.control { background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text-primary); font-size: 13.5px; font-family: var(--font); outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; font-variant-numeric: tabular-nums; }
.control::placeholder { color: var(--text-dim); }
.control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.field.invalid .control { border-color: var(--error); }
.field.invalid .control:focus { box-shadow: 0 0 0 3px var(--error-bg); }
.helper { font-size: 11.5px; color: var(--text-dim); }
.error-msg { font-size: 11.5px; color: var(--error); display: flex; align-items: center; gap: 5px; }

/* Pager */
.table-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
.pagination { display: flex; gap: 4px; }
.page-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); font-family: var(--font); }
.page-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
.page-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- ── Left Rail ── Replace section labels and nav items with the domain's nav structure ── -->
<nav class="rail" role="navigation" aria-label="Primary navigation">
  <div class="rail-brand">
    <div class="rail-brand-mark">
      <!-- Brand glyph: inline SVG, white stroke/fill -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <polygon points="9,2 16,6 16,12 9,16 2,12 2,6" fill="none" stroke="white" stroke-width="1.6"/>
        <circle cx="9" cy="9" r="2.5" fill="white"/>
      </svg>
    </div>
    <div><div class="rail-brand-name">{Brand}<em>{Accent}</em></div></div>
  </div>
  <div class="rail-nav">
    <!-- Section 1 -->
    <div class="rail-section-label">{Section Label}</div>
    <a class="nav-item active" href="#" aria-current="page">
      <!-- Inline SVG icon (16×16, stroke="currentColor") -->
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
      {Active Item}
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><polyline points="1,11 5,6 9,8 14,3"/></svg>
      {Item}
    </a>
    <a class="nav-item" href="#">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v3.5l2.5 1.5"/></svg>
      {Item with badge}
      <span class="nav-badge">{N}</span>
    </a>
    <!-- Repeat sections as needed -->
  </div>
  <div class="rail-footer">
    <div class="rail-avatar" aria-hidden="true">{XX}</div><!-- initials -->
    <div>
      <div style="font-size:13px;font-weight:600">{User Name}</div>
      <div style="font-size:11px;color:var(--text-muted)">{Role}</div>
    </div>
  </div>
</nav>

<!-- ── Main ── -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar" role="banner">
    <div class="ctx-pill" title="{Context label}">
      <span class="ctx-dot"></span>
      {Context Name}
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true"><path d="M2 3.5l3 3 3-3"/></svg>
    </div>
    <div class="entity-pill" title="{Entity label}">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><rect x=".5" y="2.5" width="12" height="9" rx="1"/><path d="M.5 5.5h12"/><circle cx="9.5" cy="8" r="1.2" fill="currentColor" stroke="none"/></svg>
      <span class="entity-addr">{entity-id}</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true"><path d="M2 3.5l3 3 3-3"/></svg>
    </div>
    <div class="topbar-search">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="6" cy="6" r="4"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
        <input type="search" placeholder="Search…" aria-label="Search">
      </div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" title="Notifications" role="button" tabindex="0">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M8 1a5 5 0 0 1 5 5v3l1 2H2l1-2V6a5 5 0 0 1 5-5z"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/></svg>
        <span class="notif-dot" aria-label="{N} unread"></span>
      </div>
      <div class="top-avatar" title="{User Name}" role="button" tabindex="0" aria-label="User menu">{XX}</div>
    </div>
  </header>

  <!-- Page Content — drop region skeletons from references/layouts.md here -->
  <main class="page" id="main-content">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">{Screen Title}</h1>
        <div class="page-sub">{scope · context · timestamp}</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost">{Secondary Action}</button>
        <button class="btn btn-primary">+ {Primary Action}</button>
      </div>
    </div>

    <!-- ── Paste region skeletons from references/layouts.md below ────────── -->

  </main>
</div>

</body>
</html>
