<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statute Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen in the
  Statute warm-white / burgundy-gold professional skin. It carries the :root
  token block, the dark sidebar (brand + entity-switcher + grouped nav + user
  footer), the sticky topbar (title + search + period selector + avatar), and
  an empty .page-body slot.

  Replace:
  - Sidebar monogram, org name, and tagline with the real org's equivalents.
  - Entity-switcher options with the domain's scope categories.
  - Nav section labels and nav items with the domain's sections.
  - Topbar title and period labels with the screen's context.
  - Drop screen content into <div class="page-body">.
  - Mark the active nav item with .active.
  - Keep the :root token block intact.
-->
<style>
:root {
  /* ── Primary accent (burgundy) ────────────────────────────────── */
  --clr-accent:        #9f1239;
  --clr-accent-hi:     #be123c;
  --clr-accent-subtle: #fdf2f4;
  --clr-accent-muted:  #fce7eb;
  /* ── Secondary accent (gold) ──────────────────────────────────── */
  --clr-gold:          #b45309;
  --clr-gold-hi:       #d97706;
  --clr-gold-subtle:   #fffbeb;
  /* ── Status ramp — adapt to the domain's state vocabulary ──────── */
  --status-active-bg:  #dcfce7;  --status-active-fg:  #15803d;
  --status-pending-bg: #fef3c7;  --status-pending-fg: #b45309;
  --status-closed-bg:  #f1f5f9;  --status-closed-fg:  #64748b;
  --status-urgent-bg:  #ffe4e6;  --status-urgent-fg:  #be123c;
  /* ── Deltas ───────────────────────────────────────────────────── */
  --delta-up-bg:       #dcfce7;  --delta-up-fg:       #15803d;
  --delta-dn-bg:       #ffe4e6;  --delta-dn-fg:       #be123c;
  --delta-wn-bg:       #fef3c7;  --delta-wn-fg:       #b45309;
  /* ── Urgency dots (for feed lists) ───────────────────────────── */
  --dot-urgent: #be123c;  --dot-warn: #d97706;  --dot-ok: #16a34a;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  background: #faf8f6;   /* warm-white page canvas */
  color: #334155;         /* body text */
  min-height: 100vh;
  display: flex;
  line-height: 1.5;
}

/* Neutral warm-white ramp (hardcoded): #faf8f6 canvas / #ffffff raised card
   / #e8e2dc border / #f4f0ec inner row / sidebar: #1e1714 bg / #2d2420 hover
   / #3a2820 active. Text: #1e293b headings / #334155 body / #64748b muted.
   Mono IDs: ui-monospace, "Cascadia Code", "Fira Code", monospace. */

/* ── SIDEBAR ──────────────────────────────────────────────────── */
.sidebar {
  width: 240px; min-width: 240px;
  background: #1e1714;
  display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0; overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 16px;
  border-bottom: 1px solid #2d2420;
}
.sidebar-mono {
  width: 36px; height: 36px;
  background: var(--clr-accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  letter-spacing: -0.03em; flex-shrink: 0;
}
.sidebar-org { font-size: 13px; font-weight: 600; color: #f5f0ec; line-height: 1.25; }
.sidebar-org span { display: block; font-size: 11px; font-weight: 400; color: #8b7f78; letter-spacing: 0.03em; }

/* entity switcher */
.switcher-wrap { padding: 14px 12px 10px; }
.switcher-label {
  font-size: 10px; font-weight: 500; color: #8b7f78;
  letter-spacing: 0.08em; text-transform: uppercase;
  display: block; margin-bottom: 6px; padding-left: 6px;
}
.switcher-select {
  width: 100%; background: #2d2420; border: 1px solid #3a2820;
  border-radius: 6px; color: #d6cfc8; font-size: 13px;
  padding: 7px 10px; appearance: none; cursor: pointer; outline: none;
}

.nav-section { padding: 10px 12px 4px; }
.nav-section-label {
  font-size: 10px; font-weight: 500; color: #8b7f78;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0 6px; margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 6px;
  color: #d6cfc8; font-size: 13px;
  text-decoration: none; transition: background 0.15s;
  position: relative; margin-bottom: 1px; cursor: pointer;
}
.nav-item:hover { background: #2d2420; color: #f5f0ec; }
.nav-item.active { background: #3a2820; color: #fff; }
.nav-item.active::before {
  content: ""; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: var(--clr-accent-hi); border-radius: 0 3px 3px 0;
}
.nav-item svg { flex-shrink: 0; opacity: 0.75; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--clr-accent); color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}

.sidebar-footer { margin-top: auto; padding: 14px 12px; border-top: 1px solid #2d2420; }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #2d2420; border-radius: 8px; }
.user-avatar {
  width: 28px; height: 28px;
  background: var(--clr-accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-info { font-size: 12px; font-weight: 500; color: #e8e2dc; line-height: 1.2; }
.user-info span { display: block; font-size: 11px; font-weight: 400; color: #8b7f78; }

/* ── TOPBAR ───────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 60px; background: #ffffff;
  border-bottom: 1px solid #e8e2dc;
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 16px; font-weight: 600; color: #1e293b; white-space: nowrap; }
.search-wrap { flex: 1; max-width: 340px; position: relative; }
.search-wrap input {
  width: 100%; border: 1px solid #e8e2dc; border-radius: 8px;
  background: #faf8f6; padding: 8px 12px 8px 36px;
  font-size: 13px; color: #334155; outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--clr-accent); box-shadow: 0 0 0 3px var(--clr-accent-muted); }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
.period-group {
  display: flex; background: #faf8f6; border: 1px solid #e8e2dc; border-radius: 8px; overflow: hidden;
}
.period-btn {
  padding: 7px 13px; font-size: 12px; font-weight: 500; color: #64748b;
  cursor: pointer; background: transparent; border: none; transition: background 0.12s, color 0.12s;
}
.period-btn.active { background: var(--clr-accent); color: #fff; }
.topbar-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid #e8e2dc; background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; color: #64748b;
}
.icon-btn:hover { border-color: var(--clr-accent); color: var(--clr-accent); }
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; background: var(--clr-accent-hi);
  border-radius: 50%; border: 1.5px solid #fff;
}
.topbar-avatar {
  width: 36px; height: 36px; background: var(--clr-accent);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; cursor: pointer;
}

/* ── MAIN CONTENT SLOT ────────────────────────────────────────── */
.page-body { padding: 24px; overflow-y: auto; flex: 1; }

/* ── REUSABLE PRIMITIVES ──────────────────────────────────────── */
.card {
  background: #ffffff; border: 1px solid #e8e2dc;
  border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
}
.btn-ghost {
  padding: 7px 14px; font-size: 13px; font-weight: 500;
  border: 1px solid #e8e2dc; border-radius: 8px;
  background: transparent; color: #334155; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-ghost:hover { border-color: var(--clr-accent); color: var(--clr-accent); }
.btn-primary {
  padding: 7px 16px; font-size: 13px; font-weight: 600;
  border: none; border-radius: 8px;
  background: var(--clr-accent); color: #fff; cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--clr-accent-hi); }
.btn-primary:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.pill-active  { background: var(--status-active-bg);  color: var(--status-active-fg); }
.pill-pending { background: var(--status-pending-bg); color: var(--status-pending-fg); }
.pill-closed  { background: var(--status-closed-bg);  color: var(--status-closed-fg); }
.pill-urgent  { background: var(--status-urgent-bg);  color: var(--status-urgent-fg); }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>

<!-- SIDEBAR: brand → entity-switcher → grouped nav sections → user footer -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <!-- Replace monogram + org name with the real org's equivalents -->
    <div class="sidebar-mono">AB</div>
    <div class="sidebar-org">Org Name
      <span>Suite Tagline</span>
    </div>
  </div>

  <!-- ENTITY SWITCHER — relabel to the domain's primary scope categories -->
  <div class="switcher-wrap">
    <label class="switcher-label">Scope / Category</label>
    <select class="switcher-select">
      <option>All Categories</option>
      <option>Category A</option>
      <option>Category B</option>
      <option>Category C</option>
    </select>
  </div>

  <nav>
    <!-- NAV SECTION — replace section labels and items with the domain's sections -->
    <div class="nav-section">

        <span class="nav-badge">0</span>
      </a>
      <a class="nav-item" href="#">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>

      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Operations</div>
      <a class="nav-item" href="#">

        Schedule
      </a>
      <a class="nav-item" href="#">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>

    </div>
    <div class="nav-section">
      <div class="nav-section-label">Settings</div>
      <a class="nav-item" href="#">

        Settings
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <!-- USER CHIP — replace initials and name with the real user's equivalents -->
    <div class="user-chip">
      <div class="user-avatar">··</div>
      <div class="user-info">User Name
        <span>Role</span>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN AREA -->
<div class="main">

  <!-- TOPBAR: page title → search → period selector → notifications → avatar -->
  <header class="topbar">
    <div class="topbar-title">{Screen Title}</div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="search" placeholder="Search…">
    </div>
    <div class="period-group">
      <button class="period-btn">24H</button>
      <button class="period-btn active">This Month</button>
      <button class="period-btn">Q2</button>
      <button class="period-btn">YTD</button>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" title="Notifications">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </button>
      <div class="topbar-avatar">··</div>
    </div>
  </header>

  <!-- MAIN CONTENT SLOT — drop KPI tiles, tables, forms, or detail view here.
       See assets/*.html and references/layouts.md for ready-made section skeletons. -->
  <div class="page-body">
    <!-- content goes here -->
  </div>

</div>

</body>
</html>
