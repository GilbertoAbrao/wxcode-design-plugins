<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Domain} Admin — {Screen}</title>
<style>
/*
 * Pixel LiveOps Admin — template seed
 *
 * Copy this file, fill in the {placeholders}, drop one of the region
 * skeletons from references/layouts.md into <div class="content">.
 *
 * Token recap:
 *   Canvas:  --bg #0c0a14 | --surface #15101f | --card #1e1730
 *   Border:  --border #2c2440
 *   Text:    --text #ece8f5 | --text-muted #968fb0
 *   Accent:  --accent #a855f7 | --accent-soft #c084fc
 *   Second:  --cyan #22d3ee
 *   States:  --green #4ade80 | --red #f87171 | --amber #fbbf24
 */
:root {
  --accent:      #a855f7;
  --accent-soft: #c084fc;
  --accent-dim:  rgba(168,85,247,.14);
  --cyan:        #22d3ee;
  --green:       #4ade80;
  --red:         #f87171;
  --amber:       #fbbf24;
  --text:        #ece8f5;
  --text-muted:  #968fb0;
  --bg:          #0c0a14;
  --surface:     #15101f;
  --card:        #1e1730;
  --border:      #2c2440;
  --sidebar-w:   220px;
  --topbar-h:    56px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:0 0 16px}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo svg{color:var(--accent)}
.sidebar-logo-text{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);line-height:1.3}

/* entity switcher */
.entity-sw{margin:12px 12px 4px;background:#110e1c;border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.entity-sw-name{font-size:12px;font-weight:600;color:var(--text)}
.entity-sw-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.entity-sw svg{color:var(--text-muted)}

/* nav sections */
.nav-section{margin-top:14px;padding:0 12px}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:0 4px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--text-muted);font-size:12.5px;font-weight:500;position:relative;margin-bottom:1px;transition:background .15s,color .15s}
.nav-item:hover{background:#261e3a;color:var(--text)}
.nav-item.active{background:rgba(168,85,247,.12);color:var(--accent-soft);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item svg{flex-shrink:0;color:currentColor;opacity:.85}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px}

/* sidebar footer */
.sidebar-footer{margin-top:auto;padding:12px 12px 0;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:8px;padding:8px 6px}
.avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,#7c3aed 100%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text-muted)}

/* ── MAIN ─────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* ── TOPBAR ───────────────────────────────────────────────────── */
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.topbar-title span{color:var(--text-muted);font-weight:400}
.search-wrap{flex:1;max-width:320px;margin:0 auto;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-input{width:100%;background:#110e1c;border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 32px;font-size:12px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--accent)}
.period-pills{display:flex;gap:2px;background:#110e1c;border:1px solid var(--border);border-radius:8px;padding:3px}
.period-pill{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:background .15s,color .15s;font-variant-numeric:tabular-nums}
.period-pill.active{background:var(--accent);color:#fff}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,#7c3aed 100%);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}
.topbar-user{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap}

/* ── CONTENT SLOT ────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}

/* ── SHARED COMPONENTS ───────────────────────────────────────── */

/* page header */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.page-title{font-size:18px;font-weight:700;color:var(--text)}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}

/* buttons */
.btn-ghost{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s}
.btn-ghost:hover{border-color:#3a2e5a;color:var(--text)}
.btn-primary{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;border-radius:7px;padding:8px 14px;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--accent-soft);color:#fff}
.btn-primary:disabled{background:var(--border);border-color:var(--border);color:var(--text-muted);cursor:not-allowed}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;color:var(--text)}
.card-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.card-link{font-size:11px;font-weight:600;color:var(--accent-soft);text-decoration:none;cursor:pointer}
.card-link:hover{color:var(--accent)}

/* kpi strip */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s,box-shadow .2s}
.kpi-card:hover{border-color:var(--accent);box-shadow:0 0 18px rgba(168,85,247,.18)}
.kpi-header{display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.kpi-icon{width:28px;height:28px;background:rgba(168,85,247,.15);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--accent-soft)}
.kpi-icon.cyan{background:rgba(34,211,238,.12);color:var(--cyan)}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
.kpi-footer{display:flex;align-items:center;justify-content:space-between}
.kpi-delta{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px}
.kpi-delta.up{color:var(--green)}
.kpi-delta.down{color:var(--red)}
.kpi-delta.warn{color:var(--amber)}

/* status pills */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap}
.pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill.live{background:rgba(34,211,238,.12);color:var(--cyan)}
.pill.scheduled{background:rgba(168,85,247,.12);color:var(--accent-soft)}
.pill.ended{background:var(--border);color:var(--text-muted)}

/* table basics */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid var(--border);color:var(--text);font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.025)}
.record-id{font-family:"Courier New",monospace;font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* form fields */
.card-section-title{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.card-section-title svg{color:var(--accent)}
.card-body{padding:18px;display:flex;flex-direction:column;gap:16px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1 / -1}
.field-label{font-size:12.5px;font-weight:600;color:#c5cdd7;display:flex;align-items:center;gap:4px}
.req{color:var(--accent);font-weight:700}
.control{background:#0c0a14;border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;font-variant-numeric:tabular-nums}
.control::placeholder{color:#64748b}
.control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.field.invalid .control{border-color:#ef4444}
.helper{font-size:11.5px;color:#64748b;line-height:1.4}
.error-msg{font-size:11.5px;color:#ef4444;display:flex;align-items:center;gap:5px;line-height:1.4}

/* pager */
.rec-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border)}
.rec-footer-count{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.pagination{display:flex;gap:4px}
.page-btn{width:28px;height:28px;background:transparent;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:12px;font-family:inherit;transition:border-color .15s,color .15s}
.page-btn:hover{border-color:#3a2e5a;color:var(--text)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a2e5a}
</style>
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <!-- replace with domain logo SVG or keep the glyph + brand name -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <rect x="4" y="4" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5" fill="currentColor" opacity=".12"/>
      <path d="M10 14h8M14 10v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="sidebar-logo-text">{Brand}<br>{Sub}</div>
  </div>

  <!-- entity switcher: replace label with domain entity name -->
  <div class="entity-sw">
    <div>
      <div class="entity-sw-name">{Active entity name}</div>
      <div class="entity-sw-sub">{Entity sub-line}</div>
    </div>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <path d="M3 4.5 6 7.5 9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- nav: one section per domain area; replace labels with domain nav items -->
  <nav class="nav-section">
    <div class="nav-label">{Section A}</div>
    <div class="nav-item active">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="5" height="5" rx="1.5" fill="currentColor"/>
        <rect x="8" y="1" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="1" y="8" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="8" y="8" width="5" height="5" rx="1.5" fill="currentColor"/>
      </svg>
      {Nav item 1}
    </div>
    <div class="nav-item">
      <!-- replace icon SVG inline per item -->
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M2 7a5 5 0 1 0 10 0A5 5 0 0 0 2 7Z" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7 4v3l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      {Nav item 2}
      <!-- optional badge: <span class="nav-badge">{n}</span> -->
    </div>
    <div class="nav-item">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <rect x="1.5" y="3" width="11" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M5 3V1.5M9 3V1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M1.5 5.5h11" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      {Nav item 3}
    </div>
  </nav>

  <!-- repeat .nav-section blocks for each domain area -->

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar-sm">{XX}</div><!-- initials -->
      <div>
        <div class="user-name">{Full Name}</div>
        <div class="user-role">{Role}</div>
      </div>
    </div>
  </div>
</aside>

<!-- ── MAIN ─────────────────────────────────────────────────────── -->
<div class="main">

  <!-- topbar -->
  <header class="topbar">
    <div class="topbar-title">{Section title} <span>· {Sub-section}</span></div>
    <!-- optional search -->
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9.5 9.5 12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input class="search-input" type="search" placeholder="Search {entities}…" aria-label="Search">
    </div>
    <!-- optional period selector -->
    <div class="period-pills" role="group" aria-label="Period">
      <div class="period-pill">7D</div>
      <div class="period-pill">14D</div>
      <div class="period-pill active">30D</div>
      <div class="period-pill">90D</div>
    </div>
    <div class="topbar-avatar" aria-label="User menu">{XX}</div>
    <div class="topbar-user">{Full Name}</div>
  </header>

  <!-- scrollable content — paste region skeletons from references/layouts.md here -->
  <div class="content">

    <!-- ↓ PASTE REGION SKELETON HERE ↓ -->

  </div>
</div>

</body>
</html>
