<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen
  in the Vault deep-navy / amber-gold admin skin. It carries the :root
  token block and the full app shell (labeled rail nav + topbar + main slot).

  Replace:
  - rail brand name / sub-label with the domain's product name
  - nav group labels and nav items with the domain's sections and entities
  - entity-switcher label with the domain's primary scoping unit (org / account / entity)
  - period tabs if the domain uses a different time-range model
  - avatar initials / name / role with the active user
  - <main class="content"> with the screen's region stack

  Keep the :root token block intact. Do NOT load external fonts or CDNs.
-->
<style>
  :root {
    /* Backgrounds — cool deep navy ramp */
    --bg-shell:  #0a0f1e;   /* page canvas */
    --bg-panel:  #121a2e;   /* raised panels, rail, topbar */
    --bg-raised: #1b2640;   /* inset, hover, active nav bg */
    --bg-hover:  #1e2e4a;   /* deep hover */
    /* Borders */
    --border:    #243049;   /* hairline separators */
    /* Text ramp */
    --text-primary:   #e5e9f0;
    --text-secondary: #c5cdd7;
    --text-muted:     #8b97ad;
    --text-faint:     #4e5e7a;
    /* Accent — amber/gold */
    --accent:    #f59e0b;
    --accent-hi: #fbbf24;
    --accent-dk: #b45309;
    --accent-dim: rgba(245,158,11,0.14);
    /* Semantic signals */
    --green:     #34d399;   /* positive, settled, up-delta */
    --red:       #f87171;   /* negative, rejected, alert */
    --amber:     #f59e0b;   /* pending, warning (same as accent) */
    /* Pill backgrounds (signal color @ ~12-14% alpha) */
    --pill-green-bg: rgba(52,211,153,0.12);
    --pill-amber-bg: rgba(245,158,11,0.14);
    --pill-red-bg:   rgba(248,113,113,0.12);
    /* Donut / chart slice tokens */
    --slice-1: #f59e0b;  /* amber */
    --slice-2: #34d399;  /* green */
    --slice-3: #60a5fa;  /* blue */
    --slice-4: #a78bfa;  /* violet */
    --slice-5: #fb923c;  /* orange */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    background: var(--bg-shell);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── LEFT RAIL NAV (220px labeled) ─────────────────────────────── */
  .rail {
    width: 220px; min-width: 220px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  /* Brand / logo slot */
  .rail-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 20px 18px 18px;
    border-bottom: 1px solid var(--border);
  }
  .rail-brand-mark { width: 32px; height: 32px; flex-shrink: 0; }
  .rail-brand-name { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.2; }
  .rail-brand-sub  { font-size: 10px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  /* Scrollable nav body */
  .rail-nav { flex: 1; overflow-y: auto; padding: 12px 0; scrollbar-width: none; }
  .rail-nav::-webkit-scrollbar { display: none; }
  /* Section group header */
  .nav-group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); padding: 14px 18px 4px; }
  /* Nav item */
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px; color: var(--text-muted); cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.14s, color 0.14s, border-color 0.14s;
    font-size: 13.5px;
  }
  .nav-item:hover { background: var(--bg-raised); color: var(--text-primary); }
  .nav-item.active { border-left-color: var(--accent); background: var(--bg-raised); color: var(--accent-hi); font-weight: 600; }
  .nav-item svg { flex-shrink: 0; opacity: 0.75; }
  .nav-item.active svg { opacity: 1; color: var(--accent-hi); }
  /* Badge count on a nav item */
  .nav-badge { margin-left: auto; background: var(--accent); color: #0a0f1e; font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 6px; line-height: 1.6; }
  /* Bottom user slot */
  .rail-bottom { border-top: 1px solid var(--border); padding: 12px 0; }

  /* ── MAIN COLUMN ─────────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── TOPBAR (60px) ───────────────────────────────────────────────── */
  .topbar {
    height: 60px; min-height: 60px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  /* Entity switcher pill */
  .entity-switcher {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
  }
  .entity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .entity-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
  .entity-chevron { color: var(--text-muted); }
  /* Period selector tabs */
  .period-tabs { display: flex; gap: 2px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .period-tab { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: background 0.12s, color 0.12s; }
  .period-tab.active { background: var(--bg-panel); color: var(--accent-hi); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  /* Right side spacer + icon buttons + avatar */
  .topbar-spacer { flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .topbar-icon-btn { position: relative; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); background: var(--bg-raised); border: 1px solid var(--border); }
  .topbar-icon-btn:hover { color: var(--text-primary); }
  .notif-dot { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; border-radius: 50%; background: var(--red); border: 1.5px solid var(--bg-panel); }
  .avatar-group { display: flex; align-items: center; gap: 9px; cursor: pointer; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0a0f1e; flex-shrink: 0; }
  .avatar-info { line-height: 1.3; }
  .avatar-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .avatar-role  { font-size: 11px; color: var(--text-muted); }

  /* ── MAIN CONTENT SLOT ───────────────────────────────────────────── */
  .content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SHARED PRIMITIVES (panels + buttons) ────────────────────────── */
  .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-family: inherit;
    transition: color 0.12s, border-color 0.12s;
  }
  .btn-ghost:hover { color: var(--text-primary); border-color: var(--text-muted); }

  .btn-primary {
    background: var(--accent); border: none; color: #0a0f1e;
    font-size: 13px; font-weight: 700; padding: 7px 16px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-family: inherit;
    transition: background 0.12s;
  }
  .btn-primary:hover { background: var(--accent-hi); }
  .btn-primary:disabled { background: var(--bg-raised); color: var(--text-muted); cursor: not-allowed; }

  /* Status pills */
  .status-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.02em; }
  .status-settled  { background: var(--pill-green-bg); color: var(--green); }
  .status-pending  { background: var(--pill-amber-bg); color: var(--accent-hi); }
  .status-rejected { background: var(--pill-red-bg);   color: var(--red); }
</style>
</head>
<body>

<!-- ══ LEFT RAIL NAV ════════════════════════════════════════════════ -->
<!-- Replace brand mark SVG, brand name, brand sub, and all nav items
     with the real domain's product name, sections, and entities. -->
<nav class="rail" aria-label="Primary navigation">
  <div class="rail-brand">
    <!-- Brand mark: replace with domain's logo/icon SVG -->
    <svg class="rail-brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <rect width="32" height="32" rx="8" fill="#1b2640"/>
      <rect x="6" y="6" width="20" height="20" rx="5" stroke="var(--accent)" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="5" stroke="var(--accent-hi)" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="2" fill="var(--accent)"/>
      <path d="M16 8v2M16 22v2M8 16h2M22 16h2" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="rail-brand-name">{Product}</div>
      <div class="rail-brand-sub">{Domain}</div>
    </div>
  </div>

  <div class="rail-nav">
    <!-- Nav group 1 — replace label + items -->
    <div class="nav-group-label">{Section A}</div>

    <div class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <!-- replace with appropriate glyph -->
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.6"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.6"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.6"/>
      </svg>
      {Item 1}
    </div>

    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {Item 2}
      <!-- Add .nav-badge if the item has a count -->
    </div>

    <!-- Nav group 2 — repeat pattern -->
    <div class="nav-group-label">{Section B}</div>

    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 7h14" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      {Item 3}
    </div>

  </div>

  <!-- Bottom user slot -->
  <div class="rail-bottom">
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {User Name}
    </div>
  </div>
</nav>

<!-- ══ MAIN COLUMN ══════════════════════════════════════════════════ -->
<div class="main">

  <!-- TOPBAR: entity switcher → period tabs → spacer → icon actions + avatar -->
  <header class="topbar">
    <div class="entity-switcher" role="button" aria-label="Switch entity">
      <div class="entity-dot"></div>
      <span class="entity-name">{Entity Name}</span>
      <svg class="entity-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Remove period tabs if the domain doesn't use time-range segmentation -->
    <div class="period-tabs" role="group" aria-label="Reporting period">
      <div class="period-tab">MTD</div>
      <div class="period-tab active">QTD</div>
      <div class="period-tab">YTD</div>
      <div class="period-tab">Custom</div>
    </div>

    <div class="topbar-spacer"></div>

    <div class="topbar-actions">
      <div class="topbar-icon-btn" role="button" aria-label="Notifications">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 1a5 5 0 015 5v2.5l1.5 2H1.5L3 8.5V6a5 5 0 015-5zM6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="notif-dot"></span>
      </div>
      <div class="avatar-group" role="button" aria-label="Account menu">
        <div class="avatar" aria-hidden="true">{Initials}</div>
        <div class="avatar-info">
          <div class="avatar-name">{User Name}</div>
          <div class="avatar-role">{User Role}</div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT SLOT — drop region skeletons from references/layouts.md here -->
  <main class="content">
    <!-- page-header goes here -->
    <!-- kpi-grid goes here -->
    <!-- mid-grid (chart + donut) goes here -->
    <!-- table card goes here -->
  </main>

</div>

</body>
</html>
