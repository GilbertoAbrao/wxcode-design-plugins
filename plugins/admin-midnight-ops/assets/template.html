<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title}</title>
<style>
/* ── Midnight Ops tokens ── copy this block verbatim, then add screen styles below */
:root {
  --bg-base:      #0b1120;
  --surface-1:    #111827;
  --surface-2:    #1e293b;
  --surface-3:    #263347;
  --border:       #1f2937;
  --border-hi:    #2d3f56;
  --accent-teal:  #14b8a6;
  --accent-cyan:  #22d3ee;
  --accent-glow:  rgba(20,184,166,.18);
  --accent-teal-glow25: rgba(20,184,166,.25);
  --text-primary: #e2e8f0;
  --text-muted:   #94a3b8;
  --text-dim:     #64748b;
  --green:        #22c55e;
  --green-light:  #4ade80;
  --green-glow:   rgba(34,197,94,.5);
  --green-bg:     rgba(34,197,94,.12);
  --red:          #f43f5e;
  --red-light:    #fb7185;
  --red-glow:     rgba(244,63,94,.5);
  --red-bg:       rgba(244,63,94,.12);
  --red-border:   rgba(244,63,94,.3);
  --amber:        #f59e0b;
  --amber-light:  #fbbf24;
  --amber-glow:   rgba(245,158,11,.5);
  --amber-bg:     rgba(245,158,11,.12);
  --amber-border: rgba(245,158,11,.3);
  --blue:         #3b82f6;
  --blue-light:   #93c5fd;
  --blue-bg:      rgba(59,130,246,.12);
  --blue-border:  rgba(59,130,246,.3);
  --rail-w:       48px;
  --nav-h:        56px;
  --radius-sm:    6px;
  --radius-md:    10px;
  --font:         "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --shadow-card:  0 1px 3px rgba(0,0,0,.45), 0 0 0 1px var(--border);
  --shadow-glow:  0 0 18px var(--accent-glow);
}
/* ── reset ── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body { font-family:var(--font); font-size:13px; background:var(--bg-base); color:var(--text-primary); line-height:1.5; -webkit-font-smoothing:antialiased; }
a { color:inherit; text-decoration:none; }
svg { display:block; }
.shell { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── navbar (56px, sticky) ── */
.navbar { height:var(--nav-h); background:var(--surface-1); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px 0 0; gap:12px; flex-shrink:0; }
.navbar-logo { width:var(--rail-w); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.navbar-search { flex:1; max-width:320px; position:relative; }
.navbar-search input { width:100%; height:32px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text-primary); font-family:var(--font); font-size:12px; padding:0 10px 0 30px; outline:none; transition:border-color .15s; }
.navbar-search input::placeholder { color:var(--text-dim); }
.navbar-search input:focus { border-color:var(--accent-teal); }
.search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--text-dim); }
.navbar-spacer { flex:1; }
.ctx-switcher { display:flex; gap:4px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:3px; }
.ctx-btn { height:24px; padding:0 10px; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--text-muted); transition:background .12s,color .12s; }
.ctx-btn.active { background:var(--accent-teal); color:#0b1120; }
.nav-icon-btn { width:32px; height:32px; border-radius:var(--radius-sm); border:none; background:transparent; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; transition:background .12s,color .12s; }
.nav-icon-btn:hover { background:var(--surface-2); color:var(--text-primary); }
.notif-badge { position:absolute; top:4px; right:4px; width:8px; height:8px; border-radius:50%; background:var(--red); border:1.5px solid var(--surface-1); }
.avatar-btn { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--accent-teal),var(--accent-cyan)); border:2px solid var(--border-hi); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#0b1120; flex-shrink:0; }

/* ── body split ── */
.body-split { display:flex; flex:1; overflow:hidden; }

/* ── left rail (48px) ── */
.rail { width:var(--rail-w); background:var(--surface-1); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; flex-shrink:0; overflow-y:auto; scrollbar-width:none; }
.rail::-webkit-scrollbar { display:none; }
.rail-btn { width:36px; height:36px; border-radius:var(--radius-sm); border:none; background:transparent; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s,color .12s; position:relative; }
.rail-btn:hover { background:var(--surface-2); color:var(--text-muted); }
.rail-btn.active { background:var(--accent-glow); color:var(--accent-teal); box-shadow:0 0 0 1px var(--accent-teal-glow25); }
/* active left-edge bar */
.rail-btn.active::before { content:''; position:absolute; left:-1px; top:50%; transform:translateY(-50%); width:3px; height:20px; background:var(--accent-teal); border-radius:0 2px 2px 0; }
.rail-sep { width:24px; height:1px; background:var(--border); margin:4px 0; }

/* ── main scroll area ── */
.main { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-track { background:transparent; }
.main::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:3px; }

/* ── common page-header ── */
.page-header { display:flex; align-items:center; justify-content:space-between; }
.page-title { font-size:15px; font-weight:600; }
.page-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
.header-actions { display:flex; gap:8px; align-items:center; }

/* ── buttons ── */
.btn-outline { height:28px; padding:0 12px; border:1px solid var(--border-hi); border-radius:var(--radius-sm); background:transparent; color:var(--text-muted); font-family:var(--font); font-size:11px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:5px; transition:border-color .12s,color .12s; }
.btn-outline:hover { border-color:var(--accent-teal); color:var(--accent-teal); }
.btn-accent { height:28px; padding:0 12px; border:none; border-radius:var(--radius-sm); background:var(--accent-teal); color:#0b1120; font-family:var(--font); font-size:11px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; box-shadow:var(--shadow-glow); transition:background .12s; }
.btn-accent:hover { background:var(--accent-cyan); }

/* ── card panel ── */
.card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-card); }
.card-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.card-title { font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
.card-title svg { color:var(--accent-teal); }

/* ── status pills ── */
.state-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; }
.state-active     { background:var(--red-bg);    color:var(--red-light); }
.state-monitoring { background:var(--amber-bg);  color:var(--amber-light); }
.state-resolved   { background:var(--green-bg);  color:var(--green-light); }
.state-queued     { background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); }

/* ── severity pills ── */
.sev-pill { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.04em; }
.sev-p1 { background:var(--red-bg);   color:var(--red-light);   border:1px solid var(--red-border); }
.sev-p2 { background:var(--amber-bg); color:var(--amber-light); border:1px solid var(--amber-border); }
.sev-p3 { background:var(--blue-bg);  color:var(--blue-light);  border:1px solid var(--blue-border); }

/* ── status dots ── */
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-healthy  { background:var(--green); box-shadow:0 0 5px var(--green-glow); }
.dot-degraded { background:var(--amber); box-shadow:0 0 5px var(--amber-glow); }
.dot-down     { background:var(--red);   box-shadow:0 0 5px var(--red-glow); }

/* ── rec-id mono ── */
.rec-id { font-family:"SF Mono","Fira Code",monospace; font-size:11px; color:var(--text-muted); }

/* ── live pulse dot ── */
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── ADD SCREEN-SPECIFIC STYLES BELOW ── */

</style>
</head>
<body>
<div class="shell">

  <!-- NAVBAR — keep as-is; swap ctx-btn labels for domain context values -->
  <nav class="navbar">
    <div class="navbar-logo">
      <!-- Replace with the domain logo glyph (inline SVG, 24×24) -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="8" height="8" rx="2" fill="var(--accent-teal)"/>
        <rect x="14" y="2" width="8" height="8" rx="2" fill="var(--accent-cyan)" opacity=".7"/>
        <rect x="2" y="14" width="8" height="8" rx="2" fill="var(--accent-cyan)" opacity=".7"/>
        <rect x="14" y="14" width="8" height="8" rx="2" fill="var(--accent-teal)" opacity=".4"/>
      </svg>
    </div>
    <div class="navbar-search">
      <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search…" aria-label="Search">
    </div>
    <div class="navbar-spacer"></div>
    <!-- Context switcher: replace "prod / staging / canary" with domain context values -->
    <div class="ctx-switcher" role="group" aria-label="{Context label}">
      <button class="ctx-btn active">{ctx-1}</button>
      <button class="ctx-btn">{ctx-2}</button>
      <button class="ctx-btn">{ctx-3}</button>
    </div>
    <button class="nav-icon-btn" title="{Alerts}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1.5A4.5 4.5 0 003.5 6v3.5l-1.25 1.5h11.5L12.5 9.5V6A4.5 4.5 0 008 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="notif-badge"></span>
    </button>
    <button class="nav-icon-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="2.25" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 1.5v1.25M8 13.25V14.5M1.5 8h1.25M13.25 8H14.5M3.52 3.52l.88.88M11.6 11.6l.88.88M3.52 12.48l.88-.88M11.6 4.4l.88-.88" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="avatar-btn" title="{User name}">{XX}</div>
  </nav>

  <div class="body-split">

    <!-- RAIL — add rail-btn items matching domain nav sections -->
    <aside class="rail" aria-label="Navigation">
      <!-- Example pattern (repeat for each nav item): -->
      <button class="rail-btn active" title="{Nav item}">
        <!-- 18×18 inline SVG icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1.5" y="1.5" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/>
          <rect x="10.5" y="1.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <rect x="1.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <rect x="10.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
      <!-- add more rail-btn items; separate groups with .rail-sep -->
      <div class="rail-sep"></div>
      <button class="rail-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9 1.5v1.5M9 15v1.5M1.5 9H3M15 9h1.5M3.4 3.4l1.06 1.06M13.54 13.54l1.06 1.06M3.4 14.6l1.06-1.06M13.54 4.46l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </aside>

    <!-- MAIN — drop dashboard/list/form/detail content here -->
    <main class="main">

      <div class="page-header">
        <div>
          <div class="page-title">{Screen title}</div>
          <div class="page-sub">{Context · timestamp}</div>
        </div>
        <div class="header-actions">
          <!-- optional: live dot + label -->
          <div class="live-dot" aria-hidden="true"></div>
          <span style="font-size:11px;color:var(--text-muted)">Live</span>
          <button class="btn-outline">{Secondary action}</button>
          <button class="btn-accent">{Primary action}</button>
        </div>
      </div>

      <!-- DROP SCREEN CONTENT HERE -->
      <!-- See assets/dashboard.html, assets/list.html, assets/form.html, assets/detail.html
           and references/layouts.md for copy-paste skeletons -->

    </main>

  </div>
</div>
</body>
</html>
