<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Screen Title}</title>
<style>
/*
  Quartz Admin — template seed
  Copy this file, replace every {placeholder}, add your screen content.
  All design tokens are in :root. Do NOT change the token values.
  Only add content between <!-- SCREEN CONTENT START --> and <!-- SCREEN CONTENT END -->.
*/
:root {
  /* Accent (purple) */
  --accent:        #9333ea;
  --accent-light:  #a855f7;
  --accent-deep:   #7e22ce;
  --accent-dim:    #f3e8ff;
  --accent-mid:    #e9d5ff;
  --accent-border: #d8b4fe;

  /* Secondary chart line */
  --clr-teal-600:  #0d9488;
  --clr-teal-100:  #ccfbf1;

  /* Status tokens */
  --state-active-bg: #dcfce7; --state-active-fg: #15803d;
  --state-draft-bg:  #fef3c7; --state-draft-fg:  #b45309;
  --state-arch-bg:   #f1f5f9; --state-arch-fg:   #64748b;

  /* Delta tokens */
  --delta-up-bg: #dcfce7; --delta-up-fg: #15803d;
  --delta-dn-bg: #fee2e2; --delta-dn-fg: #dc2626;

  /* Category color ramp — use these for tag pills & chart lines */
  --clr-cat-science:       #0d9488; --clr-cat-science-bg:    #ccfbf1;
  --clr-cat-arts:          #ea580c; --clr-cat-arts-bg:       #ffedd5;
  --clr-cat-tech:          #4f46e5; --clr-cat-tech-bg:       #e0e7ff;
  --clr-cat-language:      #e11d48; --clr-cat-language-bg:   #ffe4e6;
  --clr-cat-math:          #2563eb; --clr-cat-math-bg:       #dbeafe;
  --clr-cat-humanities:    #16a34a; --clr-cat-humanities-bg: #dcfce7;

  /* Surfaces */
  --surface:    #faf9fc;
  --card:       #ffffff;
  --sidebar-bg: #ffffff;
  --border:     #ebe7f1;

  /* Text ramp */
  --text-900: #1e293b;
  --text-600: #475569;
  --text-400: #94a3b8;

  --sidebar-w: 260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--surface);
  color: var(--text-900);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--sidebar-bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0; overflow-y: auto;
}
.sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.brand-mark { width: 34px; height: 34px; flex-shrink: 0; }
.brand-name { font-size: 16px; font-weight: 700; color: var(--text-900); }
.brand-sub  { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.6px; }

.entity-switcher { margin: 14px 16px 8px; background: var(--accent-dim); border: 1px solid var(--accent-mid); border-radius: 8px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.switcher-icon  { width: 28px; height: 28px; flex-shrink: 0; }
.switcher-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); font-weight: 600; }
.switcher-name  { font-size: 13px; font-weight: 600; color: var(--text-900); }

.nav-section { padding: 16px 16px 4px; }
.nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-400); font-weight: 700; padding: 0 6px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: var(--text-600); font-size: 13.5px; font-weight: 500; transition: background .15s, color .15s; position: relative; margin-bottom: 1px; text-decoration: none; }
.nav-item:hover { background: var(--accent-dim); color: var(--accent); }
.nav-item.active { background: var(--accent-dim); color: var(--accent-deep); font-weight: 600; }
.nav-item.active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
.nav-icon  { width: 16px; height: 16px; flex-shrink: 0; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 6px; min-width: 18px; text-align: center; }

.sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-footer a { font-size: 12px; color: var(--text-400); text-decoration: none; }
.sidebar-footer a:hover { color: var(--accent); }
.version-tag { font-size: 11px; color: var(--text-400); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }

/* ── MAIN WRAPPER ── */
.main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

/* ── TOPBAR ── */
.topbar { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text-900); }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-400); }
.breadcrumb a { color: var(--text-400); text-decoration: none; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .crumb-cur { color: var(--accent); font-weight: 500; }
.topbar-search { flex: 1; max-width: 320px; margin: 0 auto; position: relative; }
.topbar-search input { width: 100%; padding: 8px 14px 8px 34px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-family: inherit; color: var(--text-900); background: var(--surface); outline: none; transition: border-color .15s; }
.topbar-search input:focus { border-color: var(--accent-light); }
.topbar-search input::placeholder { color: var(--text-400); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-400); }
.period-sel { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12.5px; color: var(--text-600); font-weight: 500; cursor: pointer; white-space: nowrap; }
.period-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 36px; height: 36px; border: none; background: none; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-600); position: relative; transition: background .15s; }
.icon-btn:hover { background: var(--accent-dim); color: var(--accent); }
.notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: #dc2626; border-radius: 50%; border: 1.5px solid #fff; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.avatar-name { font-size: 13px; font-weight: 600; color: var(--text-900); line-height: 1.2; }
.avatar-role { font-size: 11px; color: var(--text-400); }

/* ── PAGE BODY ── */
.page-body { padding: 24px; flex: 1; overflow-y: auto; }

/* ── CARD BASE ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.04); overflow: hidden; margin-bottom: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.card-title    { font-size: 14px; font-weight: 700; color: var(--text-900); }
.card-subtitle { font-size: 12px; color: var(--text-400); margin-top: 1px; }
.card-body     { padding: 16px 20px; }

/* ── BUTTONS ── */
.btn-ghost   { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text-600); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: border-color .15s, color .15s; }
.btn-ghost:hover { border-color: var(--accent-light); color: var(--accent); }
.btn-primary { padding: 8px 16px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 6px; }
.btn-primary:hover { background: var(--accent-deep); }

/* ── STATUS PILL ── */
.status-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.status-pill.active   { background: var(--state-active-bg); color: var(--state-active-fg); }
.status-pill.draft    { background: var(--state-draft-bg);  color: var(--state-draft-fg);  }
.status-pill.archived { background: var(--state-arch-bg);   color: var(--state-arch-fg);   }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ── CATEGORY TAG PILL ── */
.cat-tag { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 1px 7px; border-radius: 20px; }
.cat-tag.science    { background: var(--clr-cat-science-bg);    color: var(--clr-cat-science);    }
.cat-tag.arts       { background: var(--clr-cat-arts-bg);        color: var(--clr-cat-arts);        }
.cat-tag.tech       { background: var(--clr-cat-tech-bg);        color: var(--clr-cat-tech);        }
.cat-tag.language   { background: var(--clr-cat-language-bg);    color: var(--clr-cat-language);    }
.cat-tag.math       { background: var(--clr-cat-math-bg);        color: var(--clr-cat-math);        }
.cat-tag.humanities { background: var(--clr-cat-humanities-bg);  color: var(--clr-cat-humanities);  }

/* ── LINK ── */
.view-all { font-size: 12.5px; color: var(--accent); text-decoration: none; font-weight: 500; }
.view-all:hover { text-decoration: underline; }

/* Add screen-specific styles below this line */
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <!-- Replace with your brand mark SVG -->
    <svg class="brand-mark" viewBox="0 0 34 34" fill="none" aria-hidden="true">
      <rect width="34" height="34" rx="9" fill="var(--accent)"/>
      <circle cx="17" cy="17" r="8" stroke="#fff" stroke-width="2"/>
      <circle cx="17" cy="17" r="3.5" fill="#fff"/>
    </svg>
    <div>
      <div class="brand-name">{Brand Name}</div>
      <div class="brand-sub">{Portal Subtitle}</div>

  <div class="entity-switcher" role="button" aria-label="Switch {entity type}">
    <!-- Replace icon -->
    <svg class="switcher-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <rect width="28" height="28" rx="7" fill="var(--accent-mid)"/>
      <rect x="7" y="7" width="6" height="6" rx="1.5" fill="var(--accent)"/>
      <rect x="15" y="7" width="6" height="6" rx="1.5" fill="var(--accent)" opacity=".6"/>
      <rect x="7" y="15" width="6" height="6" rx="1.5" fill="var(--accent)" opacity=".6"/>
      <rect x="15" y="15" width="6" height="6" rx="1.5" fill="var(--accent)" opacity=".3"/>
    </svg>
    <div>
      <div class="switcher-label">{Active Entity Label}</div>

    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 4.5l3 3 3-3" stroke="var(--text-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <!-- Repeat .nav-section blocks as needed -->
  <div class="nav-section">
    <div class="nav-section-label">{SECTION LABEL}</div>
    <a class="nav-item active" href="#">
      <!-- Replace icon path -->
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/></svg>
      {Nav Item}
    </a>
    <!-- Add more .nav-item rows as needed; add .nav-badge for count chips -->
  </div>

  <div class="sidebar-footer">
    <a href="#">{Support Link}</a>
    <span class="version-tag">v{X.Y.Z}</span>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div>
      <div class="topbar-title">{Page Title}</div>
      <div class="breadcrumb">
        <a href="#">Home</a>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M3.5 2l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="crumb-cur">{Current Section}</span>
      </div>
    </div>

    <div class="topbar-search" role="search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="search" placeholder="Search {items}…" aria-label="Search">
    </div>

    <div class="period-sel" role="button" aria-label="Select period">
      <span class="period-dot" aria-hidden="true"></span>
      {Period Label}
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M2.5 4l2.5 2.5L7.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2a5 5 0 0 0-5 5v3l-1.5 2.5h13L14 10V7a5 5 0 0 0-5-5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7.5 15a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="notif-dot" aria-label="{N} unread"></span>
      </button>
      <div class="avatar" role="button" aria-label="User menu" tabindex="0">{XX}</div>
      <div>
        <div class="avatar-name">{User Name}</div>
        <div class="avatar-role">{Role}</div>
      </div>
    </div>
  </header>

  <main class="page-body">
