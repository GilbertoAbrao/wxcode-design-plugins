<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurora Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen in the
  Aurora light/indigo skin. It carries the :root token block and the app shell
  (fixed sidebar + sticky topbar + main content slot).
  Replace the brand text, sidebar nav labels, breadcrumb trail, and <main>
  content with the real domain's equivalents. Mark the active nav item with
  .active. Keep the token block intact.
-->
<style>
:root {
  /* Canvas / surfaces */
  --c-bg:          #f8fafc;
  --c-surface:     #ffffff;
  --c-border:      #e2e8f0;
  --c-border-soft: #f1f5f9;

  /* Text ramp */
  --c-text:        #0f172a;
  --c-muted:       #475569;
  --c-faint:       #94a3b8;

  /* Accent — indigo / violet */
  --c-indigo:      #6366f1;
  --c-indigo-lt:   #eef2ff;
  --c-indigo-mid:  #818cf8;
  --c-indigo-pale: #a5b4fc;
  --c-indigo-pale2:#e0e7ff;
  --c-violet:      #7c3aed;
  --c-violet-lt:   #f5f3ff;
  --c-violet-lt2:  #faf5ff;

  /* Status / delta tokens — add/remove to match the domain */
  --c-green:       #10b981;  --c-green-lt:  #ecfdf5;
  --c-red:         #ef4444;  --c-red-lt:    #fef2f2;
  --c-amber:       #f59e0b;  --c-amber-lt:  #fffbeb;
  --c-sky:         #0ea5e9;  --c-sky-lt:    #f0f9ff;

  /* Supplemental hues */
  --c-blue:        #3b82f6;  --c-blue-lt:   #eff6ff;
  --c-orange:      #f97316;  --c-orange-lt: #fff7ed;
  --c-rose:        #f43f5e;  --c-rose-lt:   #fff1f2;
  --c-pink:        #db2777;

  /* Layout */
  --sidebar-w:     240px;
  --topbar-h:      60px;
  --radius-sm:     8px;
  --radius-md:     12px;
  --radius-lg:     16px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:     0 4px 12px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);

  --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); font-size: 14px; line-height: 1.5; color: var(--c-text); background: var(--c-bg); min-height: 100vh; display: flex; }

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--c-surface); border-right: 1px solid var(--c-border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 20; overflow-y: auto; overflow-x: hidden;
}

/* Logo slot — replace SVG mark + brand text */
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--c-border-soft);
}
.sidebar-logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.3px; color: var(--c-text); }
.sidebar-logo-text span { color: var(--c-indigo); }

/* Nav sections */
.sidebar-section { padding: 20px 12px 4px; }
.sidebar-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .8px;
  text-transform: uppercase; color: var(--c-faint);
  padding: 0 8px; margin-bottom: 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  color: var(--c-muted); font-size: 13.5px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: background .12s, color .12s; margin-bottom: 1px;
}
.nav-item:hover { background: var(--c-bg); color: var(--c-text); }
.nav-item.active { background: var(--c-indigo-lt); color: var(--c-indigo); font-weight: 600; }
.nav-item svg { flex-shrink: 0; opacity: .7; }
.nav-item.active svg { opacity: 1; }
.nav-badge { margin-left: auto; background: var(--c-indigo); color: #fff; font-size: 10px; font-weight: 700; border-radius: 100px; padding: 1px 6px; }

/* User row */
.sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid var(--c-border-soft); }
.sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; }
.sidebar-user:hover { background: var(--c-bg); }
.avatar-sm {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--c-indigo), var(--c-violet));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 13px; font-weight: 600; color: var(--c-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-role { font-size: 11px; color: var(--c-faint); }

/* ── MAIN LAYOUT ─────────────────────────────────────────────── */
.main-wrap { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ──────────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--c-surface); border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
/* Replace breadcrumb labels with the real section path */
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--c-muted); }
.breadcrumb-sep { color: var(--c-faint); }
.breadcrumb-current { color: var(--c-text); font-weight: 600; }

.topbar-search {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  background: var(--c-bg); border: 1px solid var(--c-border);
  border-radius: var(--radius-sm); padding: 6px 12px; width: 220px;
}
.topbar-search input { border: none; background: transparent; font-family: var(--font); font-size: 13px; color: var(--c-text); outline: none; width: 100%; }
.topbar-search input::placeholder { color: var(--c-faint); }

.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--c-muted); transition: background .12s, color .12s; }
.icon-btn:hover { background: var(--c-bg); color: var(--c-text); }
.notif-wrap { position: relative; }
.notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--c-red); border-radius: 50%; border: 1.5px solid var(--c-surface); }
.topbar-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--c-indigo), var(--c-violet)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

/* ── MAIN CONTENT SLOT ───────────────────────────────────────── */
/* Drop your screen region skeletons from references/layouts.md here */
.main { flex: 1; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; }

/* Reusable primitives */
.card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
.btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--c-indigo); border: none; border-radius: var(--radius-sm); color: #fff; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s; }
.btn-primary:hover { background: var(--c-indigo-mid); }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }
.btn-ghost { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-muted); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .12s, color .12s; }
.btn-ghost:hover { background: var(--c-bg); color: var(--c-text); }
.status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; border-radius: 100px; padding: 3px 9px; }
.status-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-active   { background: var(--c-green-lt); color: var(--c-green); }   .status-active   .status-pill-dot { background: var(--c-green); }
.status-pending  { background: var(--c-amber-lt); color: var(--c-amber); }   .status-pending  .status-pill-dot { background: var(--c-amber); }
.status-inactive { background: var(--c-border-soft); color: var(--c-faint); } .status-inactive .status-pill-dot { background: var(--c-faint); }
</style>
</head>
<body>

<!-- SIDEBAR: logo → grouped nav → user row at bottom -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <!-- Replace SVG mark with the real domain's logo mark -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">

    </div>
  </div>
</aside>

<!-- MAIN WRAP -->
<div class="main-wrap">

  <!-- TOPBAR: breadcrumb → search → notifications → avatar -->
  <header class="topbar">
    <nav class="breadcrumb">
      <!-- Replace with the real section path -->

    </nav>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--c-faint)" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="6" r="4"/><path d="M10 10l2.5 2.5"/></svg>
      <input type="text" placeholder="Search…">

    <div class="topbar-actions">

        <button class="icon-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 2a5 5 0 0 1 5 5c0 3 1 4 2 5H2c1-1 2-2 2-5a5 5 0 0 1 5-5z"/><path d="M7 14a2 2 0 0 0 4 0"/></svg>

        <span class="notif-dot"></span>
      </div>
      <!-- Replace initials with the real user -->
      <div class="topbar-avatar">AB</div>
    </div>
  </header>

  <!-- MAIN CONTENT SLOT — drop region skeletons from references/layouts.md here -->
  <main class="main">
    <!-- page-header, kpi-row, charts, tables, right-rail… -->
  </main>

</div><!-- /main-wrap -->

</body>
