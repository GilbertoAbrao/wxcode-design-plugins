<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relay Admin — {Screen title}</title>
<style>
/* ══════════════════════════════════════════════════════════════════
   RELAY ADMIN — TEMPLATE SEED
   Copy this file; replace {placeholder} with real domain content.
   All :root tokens are authoritative — do not change them.
   ══════════════════════════════════════════════════════════════════ */

:root {
  /* Accent */
  --accent:          #7c3aed;
  --accent-light:    #8b5cf6;
  --accent-tint:     #ede9fe;
  --accent-bar:      #6d28d9;

  /* Status tokens */
  --status-green:    #16a34a;
  --status-green-bg: #dcfce7;
  --status-amber:    #d97706;
  --status-amber-bg: #fef3c7;
  --status-red:      #dc2626;
  --status-red-bg:   #fee2e2;
  --status-slate:    #475569;
  --status-slate-bg: #f1f5f9;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 13px; color: #334155; background: #f1f5f9;
  height: 100vh; display: flex; overflow: hidden;
}

/* ── Sidebar (240px) ─────────────────────────── */
.sidebar {
  width: 240px; min-width: 240px; background: #fff;
  border-right: 1px solid #e2e8f0;
  display: flex; flex-direction: column; overflow-y: auto;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 20px 16px; border-bottom: 1px solid #e2e8f0;
}
.sidebar-logo-text { font-size: 15px; font-weight: 700; color: #1e293b; letter-spacing: -0.01em; }
.sidebar-section { padding: 16px 12px 4px; }
.sidebar-section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: #94a3b8; padding: 0 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 7px; cursor: pointer;
  color: #475569; font-size: 13px; font-weight: 500;
  margin-bottom: 1px; position: relative; text-decoration: none;
}
.nav-item:hover { background: #f8fafc; color: #1e293b; }
.nav-item.active { background: var(--accent-tint); color: var(--accent); }
.nav-item.active::before {
  content: ""; position: absolute; left: -12px; top: 4px; bottom: 4px;
  width: 3px; border-radius: 0 2px 2px 0; background: var(--accent);
}
.nav-item svg { flex-shrink: 0; opacity: 0.75; }
.nav-item.active svg { opacity: 1; color: var(--accent); }
.nav-badge {
  margin-left: auto; background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 10px; min-width: 20px; text-align: center;
}
.sidebar-footer {
  margin-top: auto; padding: 12px 16px;
  border-top: 1px solid #e2e8f0;
  display: flex; align-items: center; gap: 10px;
}
.footer-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent-tint); color: var(--accent);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.footer-name { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.2; }
.footer-role { font-size: 11px; color: #94a3b8; }
.presence-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--status-green); margin-left: auto;
  flex-shrink: 0; border: 1.5px solid #fff;
}

/* ── Main shell ──────────────────────────────── */
.main-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Topbar (56px) ───────────────────────────── */
.topbar {
  height: 56px; background: #fff; border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 700; color: #1e293b; }
.topbar-breadcrumb { font-size: 12px; color: #94a3b8; margin-top: 1px; }
.topbar-title-block { display: flex; flex-direction: column; }
.topbar-search { flex: 1; max-width: 340px; position: relative; margin: 0 16px; }
.topbar-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
.topbar-search input {
  width: 100%; padding: 7px 12px 7px 32px;
  border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; color: #334155; background: #f8fafc; outline: none;
}
.topbar-search input:focus { border-color: var(--accent-light); background: #fff; }
.filter-dropdown {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px; border: 1px solid #e2e8f0;
  border-radius: 8px; background: #f8fafc;
  cursor: pointer; font-size: 13px; color: #475569;
  font-weight: 500; white-space: nowrap;
}
.filter-dropdown:hover { border-color: #cbd5e1; background: #fff; }
.topbar-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #475569; background: transparent; border: none;
  position: relative;
}
.icon-btn:hover { background: #f1f5f9; }
.notif-dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; background: var(--status-amber);
  border-radius: 50%; border: 1.5px solid #fff;
}
.topbar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-tint); color: var(--accent);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 2px solid var(--accent-light);
}

/* ── Content ─────────────────────────────────── */
.content {
  flex: 1; overflow-y: auto; padding: 24px;
  display: flex; gap: 20px;
}
.content-main { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.content-aside { width: 260px; min-width: 260px; }

/* ── Card ────────────────────────────────────── */
.card {
  background: #fff; border-radius: 10px;
  border: 1px solid #e9ecf3;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.card-title    { font-size: 14px; font-weight: 700; color: #1e293b; }
.card-subtitle { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.card-link     { font-size: 12px; color: var(--accent-light); font-weight: 500; text-decoration: none; }
.card-link:hover { text-decoration: underline; }

/* ── KPI row (×4) ────────────────────────────── */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.kpi-card { padding: 18px 20px 16px; }
.kpi-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 10px;
}
.kpi-value-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1; letter-spacing: -0.02em; }
.kpi-value span { font-size: 14px; font-weight: 500; color: #64748b; }
.kpi-chip { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; white-space: nowrap; }
.kpi-chip.up      { color: var(--status-green); background: var(--status-green-bg); }
.kpi-chip.down    { color: var(--status-red);   background: var(--status-red-bg);   }
.kpi-chip.neutral { color: var(--status-slate); background: var(--status-slate-bg); }
.kpi-sparkline { margin-top: 10px; }

/* ── Priority-tier bar strip ─────────────────── */
.tier-card { padding: 18px 20px; }
.tier-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.tier-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.tier-row:last-child { margin-bottom: 0; }
.tier-label { font-size: 11px; font-weight: 700; width: 22px; flex-shrink: 0; color: #475569; }
.tier-row-inner { display: flex; flex-direction: column; flex: 1; gap: 3px; }
.tier-meta { display: flex; justify-content: space-between; font-size: 10px; color: #94a3b8; }
.bar-track { flex: 1; height: 7px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; transition: width .3s; }
.bar-fill.green { background: var(--status-green); }
.bar-fill.amber { background: var(--status-amber); }
.bar-fill.red   { background: var(--status-red);   }
.tier-pct { font-size: 11px; font-weight: 700; width: 34px; text-align: right; flex-shrink: 0; }
.tier-pct.green { color: var(--status-green); }
.tier-pct.amber { color: var(--status-amber); }
.tier-pct.red   { color: var(--status-red);   }

/* ── Records table ───────────────────────────── */
.table-card { overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: #94a3b8; text-align: left;
  padding: 0 12px 8px; border-bottom: 1px solid #f1f5f9;
}
thead th:first-child { padding-left: 20px; }
thead th:last-child  { padding-right: 20px; }
tbody tr { border-bottom: 1px solid #f8fafc; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #fafbfe; }
tbody td { padding: 10px 12px; vertical-align: middle; font-size: 13px; color: #334155; }
tbody td:first-child { padding-left: 20px; }
tbody td:last-child  { padding-right: 20px; }

/* Pill variants */
.pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.pill-t1   { color: var(--status-red);   background: var(--status-red-bg);   }
.pill-t2   { color: var(--status-amber); background: var(--status-amber-bg); }
.pill-t3   { color: var(--accent);       background: var(--accent-tint);     }
.pill-a    { color: var(--status-slate); background: var(--status-slate-bg); } /* state A (open/neutral) */
.pill-b    { color: var(--status-amber); background: var(--status-amber-bg); } /* state B (pending/warn) */
.pill-c    { color: var(--status-green); background: var(--status-green-bg); } /* state C (done/ok) */
.pill-d    { color: var(--status-red);   background: var(--status-red-bg);   } /* state D (breached/error) */

/* Mono ID */
.rec-id { font-family: "SF Mono","Fira Code",monospace; font-size: 12px; color: var(--accent); font-weight: 600; }

/* Avatar initials */
.av { width: 26px; height: 26px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.av-blue   { background: #dbeafe; color: #1d4ed8; }
.av-green  { background: #dcfce7; color: #15803d; }
.av-rose   { background: #ffe4e6; color: #be123c; }
.av-teal   { background: #ccfbf1; color: #0f766e; }
.av-amber  { background: #fef3c7; color: #b45309; }
.av-violet { background: var(--accent-tint); color: var(--accent); }
.av-slate  { background: #f1f5f9; color: #475569; }
.av-indigo { background: #e0e7ff; color: #4338ca; }

/* Table footer + pager */
.table-footer { padding: 12px 20px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.table-footer-info { font-size: 12px; color: #94a3b8; }
.table-footer-pager { display: flex; align-items: center; gap: 4px; }
.pager-btn { width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; color: #475569; font-size: 12px; }
.pager-btn:hover { background: #f8fafc; }
.pager-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

/* ── Right load panel (260px) ────────────────── */
.aside-card { padding: 18px 20px; }
.aside-header { margin-bottom: 16px; }
.item-list { display: flex; flex-direction: column; gap: 2px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 8px; }
.item-row:hover { background: #f8fafc; }
.presence-indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.online  { background: var(--status-green); }
.away    { background: var(--status-amber); }
.offline { background: #cbd5e1; }
.item-av { width: 30px; height: 30px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-name { font-size: 13px; font-weight: 500; color: #1e293b; }
.item-role { font-size: 11px; color: #94a3b8; }
.item-count { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-tint); padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
.aside-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f1f5f9; text-align: center; }
.aside-footer a { font-size: 12px; color: var(--accent-light); font-weight: 500; text-decoration: none; }
.aside-footer a:hover { text-decoration: underline; }

/* ── Buttons ─────────────────────────────────── */
.btn-ghost {
  padding: 8px 16px; background: transparent; border: 1px solid #e2e8f0;
  border-radius: 7px; color: #475569; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.btn-ghost:hover { border-color: #cbd5e1; color: #1e293b; }
.btn-primary {
  padding: 8px 16px; background: var(--accent); border: 1px solid var(--accent);
  border-radius: 7px; color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-primary:hover { background: var(--accent-light); }
.btn-primary:disabled { background: #e2e8f0; border-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     SIDEBAR — replace {placeholder} text with domain content
     ══════════════════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <!-- replace SVG with domain logo mark; keep violet fill -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="var(--accent)"/>
      <!-- domain glyph here -->
    </svg>
    <span class="sidebar-logo-text">{Product name}</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">{Section A}</div>
    <a class="nav-item active" href="#">
      <!-- inline SVG icon -->
      {Nav item 1}
      <span class="nav-badge">{N}</span>
    </a>
    <a class="nav-item" href="#"><!-- icon -->{Nav item 2}</a>
    <a class="nav-item" href="#"><!-- icon -->{Nav item 3}</a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">{Section B}</div>
    <a class="nav-item" href="#"><!-- icon -->{Nav item 4}</a>
    <a class="nav-item" href="#"><!-- icon -->{Nav item 5}</a>
  </div>

  <div class="sidebar-footer">
    <div class="footer-avatar">{XX}</div>
    <div>
      <div class="footer-name">{User name}</div>
      <div class="footer-role">{Role}</div>
    </div>
    <div class="presence-dot"></div>
  </div>
</aside>

<!-- ══════════════════════════════════════════════════════════
     MAIN SHELL
     ══════════════════════════════════════════════════════════ -->
<div class="main-shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-title-block">
      <span class="topbar-title">{Page title}</span>
      <span class="topbar-breadcrumb">{Section} / {Page title}</span>
    </div>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.25" stroke="currentColor" stroke-width="1.25"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Search {entities}…">
    </div>
    <div class="filter-dropdown">
      <!-- avatar chip -->
      {Filter label}
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2.25C6.38 2.25 4.25 4.38 4.25 7v.5L3 10h12l-1.25-2.5V7c0-2.62-2.13-4.75-4.75-4.75z" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 13.5a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span class="notif-dot"></span>
      </button>
      <div class="topbar-avatar">{XX}</div>
    </div>
  </header>

  <!-- CONTENT — paste region skeletons from references/layouts.md here -->
  <div class="content">
    <div class="content-main">
      <!-- KPI row, tier bars, table card, etc. -->
    </div>
    <aside class="content-aside">
      <!-- right load panel -->
    </aside>
  </div>

</div><!-- /main-shell -->

</body>
</html>
