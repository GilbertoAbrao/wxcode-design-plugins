<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title}</title>
<style>
  /* ─────────────────────────────────────────────────────────────
     KINETIC ADMIN — template seed
     Copy this file, drop content into <main class="main">.
     Replace every {placeholder} with the real domain's equivalent.
     ───────────────────────────────────────────────────────────── */
  :root {
    --accent:          #84cc16;   /* lime — primary CTA, active nav, key figures */
    --accent-bright:   #a3e635;
    --accent-dim:      rgba(132,204,22,.18);
    --accent-muted:    rgba(132,204,22,.08);
    --state-active:    #84cc16;
    --state-active-bg: rgba(132,204,22,.13);
    --state-frozen:    #60a5fa;
    --state-frozen-bg: rgba(96,165,250,.13);
    --state-overdue:   #f87171;
    --state-overdue-bg:rgba(248,113,113,.13);
    --state-pending:   #f59e0b;
    --state-pending-bg:rgba(245,158,11,.13);
    --delta-up:        #84cc16;
    --delta-down:      #f87171;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px; background: #0f1410; color: #e6efe6;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── TOPBAR ──────────────────────────────────────────────────── */
  /* height:48px; bg:#19211a; 1px bottom #2c3a2f; sticky */
  .topbar { height: 48px; background: #19211a; border-bottom: 1px solid #2c3a2f; display: flex; align-items: center; padding: 0 16px 0 12px; gap: 14px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
  .topbar-brand-icon { width: 28px; height: 28px; background: var(--accent-dim); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .topbar-brand-name { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: -0.01em; white-space: nowrap; }
  .topbar-search { flex: 1; max-width: 320px; position: relative; }
  .topbar-search input { width: 100%; height: 32px; background: #232e25; border: 1px solid #2c3a2f; border-radius: 7px; color: #e6efe6; font-size: 12px; font-family: inherit; padding: 0 10px 0 30px; outline: none; transition: border-color .15s; }
  .topbar-search input::placeholder { color: #93a392; }
  .topbar-search input:focus { border-color: var(--accent); }
  .topbar-search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #93a392; pointer-events: none; }
  .topbar-spacer { flex: 1; }
  .topbar-location { display: flex; align-items: center; gap: 6px; background: #232e25; border: 1px solid #2c3a2f; border-radius: 7px; padding: 4px 10px; font-size: 12px; color: #e6efe6; cursor: pointer; white-space: nowrap; }
  .topbar-location svg { color: var(--accent); }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .topbar-bell { position: relative; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #93a392; cursor: pointer; }
  .topbar-bell-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; border: 1.5px solid #19211a; }
  .topbar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dim); border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .topbar-avatar-name { font-size: 12px; color: #e6efe6; white-space: nowrap; cursor: pointer; }
  .topbar-chevron { color: #93a392; }

  /* ── SHELL + RAIL ────────────────────────────────────────────── */
  /* width:52px; bg:#19211a; 1px right #2c3a2f */
  .app-body { display: flex; flex: 1; overflow: hidden; }
  .rail { width: 52px; background: #19211a; border-right: 1px solid #2c3a2f; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; flex-shrink: 0; }
  .rail-item { width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #93a392; cursor: pointer; position: relative; transition: background .12s, color .12s; }
  .rail-item:hover { background: #232e25; color: #e6efe6; }
  .rail-item.active { background: #232e25; color: var(--accent); }
  .rail-item.active::before { content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
  .rail-divider { width: 24px; height: 1px; background: #2c3a2f; margin: 4px 0; }

  /* ── MAIN ────────────────────────────────────────────────────── */
  .main { flex: 1; overflow-y: auto; padding: 20px 24px 32px; display: flex; flex-direction: column; gap: 16px; }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: #2c3a2f; border-radius: 2px; }

  /* ── PAGE HEADER ─────────────────────────────────────────────── */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .page-title { font-size: 17px; font-weight: 700; color: #e6efe6; letter-spacing: -0.02em; }
  .page-subtitle { font-size: 12px; color: #93a392; margin-top: 2px; }
  .page-actions { display: flex; align-items: center; gap: 8px; }

  /* ── BUTTONS ─────────────────────────────────────────────────── */
  .btn-ghost { height: 32px; padding: 0 12px; border: 1px solid #2c3a2f; border-radius: 7px; background: transparent; color: #93a392; font-family: inherit; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: border-color .12s, color .12s; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { height: 32px; padding: 0 14px; border: none; border-radius: 7px; background: var(--accent); color: #0f1410; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .12s; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-bright); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  /* ── CARD ────────────────────────────────────────────────────── */
  /* bg:#19211a; border:1px solid #2c3a2f; radius:10px */
  .card { background: #19211a; border: 1px solid #2c3a2f; border-radius: 10px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #2c3a2f; }
  .card-title { font-size: 13px; font-weight: 600; color: #e6efe6; letter-spacing: -0.01em; }
  .card-link { font-size: 11px; color: var(--accent); text-decoration: none; opacity: .85; transition: opacity .12s; }
  .card-link:hover { opacity: 1; }

  /* ── KPI TILE ROW ────────────────────────────────────────────── */
  /* 4 equal columns; each tile: raised panel + icon chip + big figure + delta */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kpi-tile { background: #19211a; border: 1px solid #2c3a2f; border-radius: 10px; padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .kpi-icon { position: absolute; top: 16px; right: 18px; width: 36px; height: 36px; background: var(--accent-muted); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #93a392; }
  .kpi-value { font-size: 28px; font-weight: 800; color: #e6efe6; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi-meta { font-size: 11px; color: #93a392; }
  .kpi-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
  .kpi-delta.up   { background: var(--accent-dim); color: var(--accent); }
  .kpi-delta.down { background: rgba(248,113,113,.13); color: var(--delta-down); }

  /* ── STATUS PILL ─────────────────────────────────────────────── */
  .status-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; }
  .status-pill.active  { background: var(--state-active-bg);  color: var(--state-active); }
  .status-pill.frozen  { background: var(--state-frozen-bg);  color: var(--state-frozen); }
  .status-pill.overdue { background: var(--state-overdue-bg); color: var(--state-overdue); }
  .status-pill.pending { background: var(--state-pending-bg); color: var(--state-pending); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ── CAPACITY BAR ────────────────────────────────────────────── */
  /* 5–6px tall lime fill; "Full" pill when at capacity */
  .cap-bar-wrap { width: 100%; height: 5px; background: #232e25; border-radius: 3px; overflow: hidden; }
  .cap-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s; }
  .cap-full-pill { font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; background: var(--accent-dim); color: var(--accent); padding: 1px 5px; border-radius: 10px; }

  /* ── TABLE ───────────────────────────────────────────────────── */
  /* font-variant-numeric:tabular-nums on every numeric cell */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #93a392; text-align: left; padding: 10px 18px; border-bottom: 1px solid #232e25; }
  .tbl td { padding: 10px 18px; font-size: 12px; color: #e6efe6; border-bottom: 1px solid #232e25; vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover td { background: #232e25; }

  /* ── FORM FIELD ──────────────────────────────────────────────── */
  /* required mark(*), helper, inline error; no rules panel */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; font-weight: 600; color: #c5d5c5; }
  .req { color: var(--accent); margin-left: 2px; }
  .control { height: 34px; width: 100%; background: #232e25; border: 1px solid #2c3a2f; border-radius: 7px; color: #e6efe6; font-family: inherit; font-size: 12px; padding: 0 11px; outline: none; transition: border-color .15s; }
  .control::placeholder { color: #93a392; }
  .control:focus { border-color: var(--accent); }
  .helper { font-size: 11px; color: #5a6e5a; }
  .field.invalid .control { border-color: var(--state-overdue); background: rgba(248,113,113,.06); }
  .error-msg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--state-overdue); }
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-brand" href="#">
    <div class="topbar-brand-icon">
      <!-- Replace with domain-appropriate icon SVG -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="10" width="4" height="4" rx="1"/><rect x="18" y="10" width="4" height="4" rx="1"/>
        <rect x="6" y="8" width="2" height="8" rx="1"/><rect x="16" y="8" width="2" height="8" rx="1"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
    <span class="topbar-brand-name">{BRAND}</span>
  </a>
  <div class="topbar-search">
    <svg class="topbar-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search {entities}…" aria-label="Search">
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-location">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/>
    </svg>
    {Entity / Location}
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="topbar-actions">
    <div class="topbar-bell" aria-label="Notifications">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="topbar-bell-dot"></span>
    </div>
    <div class="topbar-avatar" aria-label="Account">{XX}</div>
    <span class="topbar-avatar-name">{User Name}</span>
    <svg class="topbar-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</header>

<div class="app-body">

  <nav class="rail" aria-label="Primary navigation">
    <!-- Add 4–6 icon-only nav items. Active item: class="rail-item active" -->
    <!-- Use native title attr for tooltip. No text labels. -->
    <div class="rail-item active" title="{Screen name}">
      <!-- inline SVG icon -->
    </div>
    <!-- more rail items … -->
    <div class="rail-divider"></div>
    <div class="rail-item" title="Settings">
      <!-- settings gear SVG -->
    </div>
  </nav>

  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">{Screen Title}</div>
        <div class="page-subtitle">{scope · context}</div>
      </div>
      <div class="page-actions">
        <button class="btn-ghost">{Secondary action}</button>
        <button class="btn-primary">+ {Primary action}</button>
      </div>
    </div>

    <!-- Drop screen content here using the archetype regions from SKILL.md -->
    <!-- See assets/ for completed examples of dashboard, list, form, detail -->

  </main>
</div>

</body>
</html>
