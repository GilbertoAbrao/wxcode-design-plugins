<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sprout Admin — {Screen Title}</title>
<style>
/* ─────────────────────────────────────────────
   SPROUT ADMIN — TOKEN + SHELL SEED
   Copy this file, drop region skeletons from
   references/layouts.md into <main class="content">.
   Replace ALL {placeholder} labels with real domain content.
───────────────────────────────────────────── */
:root {
  /* Canvas / surfaces */
  --c-bg-deep:    #0c1118;
  --c-bg-surface: #131b26;
  --c-bg-raised:  #1a2533;
  --c-border:     #223040;

  /* Text ramp */
  --c-text:       #dfe7ef;
  --c-text-2:     #b0bdca;
  --c-muted:      #8597a8;

  /* Dual accent */
  --c-lime:       #84cc16;
  --c-lime-dim:   rgba(132,204,22,.10);
  --c-cyan:       #22d3ee;
  --c-cyan-dim:   rgba(34,211,238,.08);

  /* Severity */
  --c-amber:      #f59e0b;
  --c-amber-dim:  rgba(245,158,11,.12);
  --c-red:        #ef4444;
  --c-red-dim:    rgba(239,68,68,.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--c-bg-deep);color:var(--c-text);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── APP SHELL ──────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── LEFT RAIL (220px) ──────────────────────── */
.rail{
  width:220px;flex-shrink:0;
  background:var(--c-bg-surface);
  border-right:1px solid var(--c-border);
  display:flex;flex-direction:column;
  padding:0 0 16px;overflow-y:auto;
}
.rail-brand{
  display:flex;align-items:center;gap:10px;
  padding:18px 18px 14px;
  border-bottom:1px solid var(--c-border);
}
.rail-brand-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--c-lime);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.rail-brand-icon svg{color:#0c1118}
.rail-brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--c-text)}
.rail-brand-sub{font-size:10px;color:var(--c-muted);letter-spacing:.04em;text-transform:uppercase}
.rail-section{
  padding:20px 12px 4px;
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--c-muted);
}
.rail-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;margin:1px 6px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--c-muted);
  cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.rail-item:hover{background:var(--c-bg-raised);color:var(--c-text)}
.rail-item.active{background:var(--c-bg-raised);color:var(--c-text)}
.rail-item.active::before{
  content:"";position:absolute;left:0;top:6px;bottom:6px;
  width:3px;border-radius:0 3px 3px 0;background:var(--c-lime);
}
.rail-item svg{flex-shrink:0;color:inherit}
.rail-badge{
  margin-left:auto;background:var(--c-red);color:#fff;
  font-size:10px;font-weight:700;border-radius:10px;
  padding:1px 6px;min-width:18px;text-align:center;
}
.rail-footer{
  margin-top:auto;padding:14px 16px 0;
  border-top:1px solid var(--c-border);
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--c-muted);
}
.rail-status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--c-lime);flex-shrink:0;
  box-shadow:0 0 6px var(--c-lime);
}

/* ── MAIN COLUMN ────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR (56px) ──────────────────────────── */
.topbar{
  height:56px;flex-shrink:0;
  background:var(--c-bg-surface);
  border-bottom:1px solid var(--c-border);
  display:flex;align-items:center;gap:12px;padding:0 20px;
}
.ctx-switcher{
  display:flex;align-items:center;gap:6px;
  background:var(--c-bg-raised);border:1px solid var(--c-border);
  border-radius:6px;padding:6px 12px;
  font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--c-text);
}
.ctx-switcher svg{color:var(--c-muted)}
.topbar-search{
  flex:1;max-width:340px;
  display:flex;align-items:center;gap:8px;
  background:var(--c-bg-raised);border:1px solid var(--c-border);
  border-radius:6px;padding:6px 12px;
}
.topbar-search input{
  background:transparent;border:none;outline:none;
  font-family:inherit;font-size:13px;color:var(--c-text);width:100%;
}
.topbar-search input::placeholder{color:var(--c-muted)}
.topbar-search svg{color:var(--c-muted);flex-shrink:0}
.topbar-spacer{flex:1}
.topbar-icon-btn{
  width:36px;height:36px;border-radius:6px;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--c-muted);cursor:pointer;position:relative;
  transition:background .15s,color .15s;
}
.topbar-icon-btn:hover{background:var(--c-bg-raised);color:var(--c-text)}
.notif-dot{
  position:absolute;top:6px;right:6px;
  width:8px;height:8px;border-radius:50%;
  background:var(--c-red);border:2px solid var(--c-bg-surface);
}
.topbar-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--c-bg-raised);border:2px solid var(--c-border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--c-cyan);
  cursor:pointer;flex-shrink:0;
}
.topbar-user{font-size:13px;font-weight:500;color:var(--c-text);white-space:nowrap}
.topbar-role{font-size:11px;color:var(--c-muted)}

/* ── CONTENT AREA ───────────────────────────── */
.content{flex:1;overflow-y:auto;padding:20px}

/* ── SHARED PRIMITIVES ──────────────────────── */
.card{background:var(--c-bg-surface);border:1px solid var(--c-border);border-radius:10px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--c-border)}
.card-title{font-size:13px;font-weight:600;color:var(--c-text)}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:700;color:var(--c-text)}
.page-sub{font-size:12px;color:var(--c-muted);margin-top:2px}
.btn-ghost{background:transparent;border:1px solid var(--c-border);border-radius:6px;padding:7px 14px;font-size:13px;color:var(--c-muted);cursor:pointer;transition:all .12s}
.btn-ghost:hover{color:var(--c-text);border-color:var(--c-cyan)}
.btn-primary{background:var(--c-lime);border:none;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;color:#0c1118;cursor:pointer;transition:opacity .12s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.status-pill{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-radius:4px;padding:3px 8px;display:inline-block}
.status-pill.ok{background:var(--c-lime-dim);color:var(--c-lime)}
.status-pill.err{background:var(--c-red-dim);color:var(--c-red)}
.status-pill.warn{background:var(--c-amber-dim);color:var(--c-amber)}
.status-pill.info{background:var(--c-cyan-dim);color:var(--c-cyan)}
</style>
</head>
<body>
<div class="shell">

  <!-- RAIL: replace brand name, nav items, and footer label with real domain -->
  <nav class="rail">
    <div class="rail-brand">
      <div class="rail-brand-icon">
        <!-- Replace with domain brand mark SVG -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 5V9L11.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="rail-brand-name">{Brand Name}</div>
        <div class="rail-brand-sub">{App subtitle}</div>
      </div>
    </div>

    <div class="rail-section">{Section label}</div>
    <!-- Add .active to the current screen's item -->
    <div class="rail-item active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".8"/><rect x="9.5" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".8"/><rect x="1" y="9.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".8"/><rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".5"/></svg>
      {Nav item}
    </div>
    <div class="rail-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2V4M8 12V14M2 8H4M12 8H14M3.5 3.5L5 5M11 11L12.5 12.5M3.5 12.5L5 11M11 5L12.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      {Nav item}
    </div>
    <!-- Add badge for pending items: <span class="rail-badge">{n}</span> -->

    <div class="rail-footer">
      <div class="rail-status-dot"></div>
      {Status label}
    </div>
  </nav>

  <!-- MAIN COLUMN -->
  <div class="main">

    <!-- TOPBAR: replace context label, placeholder text, and user info -->
    <header class="topbar">
      <button class="ctx-switcher">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 3V2C4 1.45 4.45 1 5 1H9C9.55 1 10 1.45 10 2V3" stroke="currentColor" stroke-width="1.3"/></svg>
        {Context name}
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="topbar-search">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Search {entities}…">
      </div>
      <div class="topbar-spacer"></div>
      <button class="topbar-icon-btn" title="Refresh">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8C2 4.69 4.69 2 8 2C10.13 2 12 3.04 13.15 4.65" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 8C14 11.31 11.31 14 8 14C5.87 14 4 12.96 2.85 11.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 2V5H10M3 14V11H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="topbar-icon-btn" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2C5.79 2 4 3.79 4 6V10L2.5 11.5V12.5H13.5V11.5L12 10V6C12 3.79 10.21 2 8 2Z" stroke="currentColor" stroke-width="1.4"/><path d="M6.5 12.5C6.5 13.33 7.17 14 8 14C8.83 14 9.5 13.33 9.5 12.5" stroke="currentColor" stroke-width="1.4"/></svg>
        <!-- Add <span class="notif-dot"></span> when alerts exist -->
      </button>
      <div class="topbar-avatar">{XY}</div>
      <div>
        <div class="topbar-user">{Full Name}</div>
        <div class="topbar-role">{Role}</div>
      </div>
    </header>

    <!-- CONTENT: paste region skeletons from references/layouts.md here -->
    <main class="content">

      <!-- PAGE HEADER (every screen) -->
      <div class="page-hdr">
        <div>
          <div class="page-title">{Screen title}</div>
          <div class="page-sub">{context · scope · last updated}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost">{Secondary action}</button>
          <button class="btn-primary">+ {Primary action}</button>
        </div>
      </div>

      <!-- Drop your region skeleton(s) here -->

    </main>
  </div>
</div>
</body>
</html>
