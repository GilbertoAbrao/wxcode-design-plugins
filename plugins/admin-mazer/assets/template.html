<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Title — Admin Console</title>
<style>
/* ── Design tokens ── */
:root{
  /* Backgrounds */
  --bg:#f2f7ff;
  --card:#ffffff;
  --sidebar-hover:#f0f4ff;
  --input-bg:#f8faff;

  /* Borders */
  --border:#e0e6ed;
  --divider:#eef1f6;

  /* Text */
  --text-body:#25396f;
  --text-secondary:#6b7ea8;
  --text-muted:#9daec8;
  --text-inv:#ffffff;

  /* Primary / accent */
  --primary:#435ebe;
  --primary-hover:#3a52aa;
  --primary-soft:#eef1fb;
  --primary-ring:rgba(67,94,190,.25);

  /* Status */
  --success:#28c76f;  --success-soft:#e6f9ef;
  --warn:#ff9f43;     --warn-soft:#fff4e5;
  --danger:#ea5455;   --danger-soft:#fce8e8;
  --info:#00cfe8;     --info-soft:#e0f9fc;
  --neutral:#82868b;  --neutral-soft:#f0f0f0;

  /* Layout */
  --sidebar-w:260px;
  --topbar-h:60px;

  /* Shape */
  --radius-card:11px;
  --radius-btn:8px;
  --radius-pill:20px;

  /* Elevation */
  --shadow-card:0 4px 24px rgba(67,94,190,.08);
  --shadow-sidebar:2px 0 8px rgba(67,94,190,.06);
  --shadow-dropdown:0 8px 24px rgba(0,0,0,.12);

  /* Motion */
  --transition:.18s ease;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Nunito","Segoe UI",system-ui,-apple-system,sans-serif;
  font-size:14px;line-height:1.5;
  color:var(--text-body);background:var(--bg);
  display:flex;min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
ul{list-style:none}
input,select,textarea{font-family:inherit}

/* ── Sidebar shell ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  height:100vh;position:sticky;top:0;
  background:var(--card);box-shadow:var(--shadow-sidebar);
  overflow-y:auto;display:flex;flex-direction:column;
}
.sidebar-brand{
  height:var(--topbar-h);display:flex;align-items:center;gap:10px;
  padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand-icon{
  width:34px;height:34px;border-radius:8px;background:var(--primary);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.brand-name{font-size:17px;font-weight:700;color:var(--text-body)}

/* Nav group */
.nav-section{padding:16px 0 4px}
.nav-label{
  font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
  color:var(--text-muted);padding:0 20px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:9px 20px;
  font-size:13px;font-weight:600;color:var(--text-secondary);
  transition:var(--transition);position:relative;cursor:pointer;
}
.nav-item:hover{background:var(--sidebar-hover);color:var(--text-body)}
.nav-item.active{background:var(--primary-soft);color:var(--primary)}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--primary);border-radius:0 2px 2px 0;
}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.75}
.nav-item.active .nav-icon{opacity:1}

/* Sidebar footer */
.sidebar-footer{
  margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;background:var(--primary-soft);
  border:2px solid var(--primary);display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;
}

/* ── Main area ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Topbar */
.topbar{
  height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 24px;
  position:sticky;top:0;z-index:10;
}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}
.breadcrumb-active{font-weight:700;color:var(--text-body)}
.topbar-spacer{flex:1}
.search-pill{
  display:flex;align-items:center;gap:8px;background:var(--input-bg);
  border:1px solid var(--border);border-radius:var(--radius-pill);
  padding:6px 14px;font-size:13px;color:var(--text-muted);
}
.icon-btn{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:var(--text-secondary);transition:var(--transition);
  position:relative;
}
.icon-btn:hover{background:var(--sidebar-hover)}

/* Page content */
.content{flex:1;padding:24px;display:flex;flex-direction:column;gap:20px}
.page-header{display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:700;color:var(--text-body)}
.page-sub{font-size:13px;color:var(--text-secondary);margin-top:2px}

/* Cards */
.card{
  background:var(--card);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:20px;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:var(--text-body)}

/* Buttons */
.btn-primary{
  background:var(--primary);color:var(--text-inv);padding:8px 18px;
  border-radius:var(--radius-btn);font-size:13px;font-weight:700;
  transition:var(--transition);
}
.btn-primary:hover{background:var(--primary-hover)}
.btn-ghost{
  background:transparent;color:var(--primary);padding:7px 16px;
  border:1px solid var(--primary);border-radius:var(--radius-btn);
  font-size:13px;font-weight:600;transition:var(--transition);
}
.btn-ghost:hover{background:var(--primary-soft)}

/* Badge / pill */
.badge{
  display:inline-flex;align-items:center;padding:3px 10px;
  border-radius:var(--radius-pill);font-size:11px;font-weight:700;
}
.badge.success{background:var(--success-soft);color:var(--success)}
.badge.warn{background:var(--warn-soft);color:var(--warn)}
.badge.danger{background:var(--danger-soft);color:var(--danger)}
.badge.info{background:var(--info-soft);color:var(--info)}
.badge.neutral{background:var(--neutral-soft);color:var(--neutral)}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:18px}
.grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  padding:10px 14px;text-align:left;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);
  border-bottom:2px solid var(--divider);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--divider);transition:var(--transition)}
tbody tr:hover{background:var(--sidebar-hover)}
tbody td{padding:11px 14px;vertical-align:middle}

/* Form */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
label{font-size:13px;font-weight:700;color:var(--text-body)}
.required-mark{color:var(--danger);margin-left:2px}
.form-control{
  background:var(--input-bg);border:1.5px solid var(--border);
  border-radius:var(--radius-btn);padding:9px 12px;font-size:14px;
  color:var(--text-body);outline:none;transition:var(--transition);width:100%;
}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-ring)}
.form-control.error{border-color:var(--danger);background:#fff8f8}
.form-control.valid{border-color:var(--success)}
.helper-text{font-size:11px;color:var(--text-muted)}
.error-msg{font-size:11px;color:var(--danger);display:flex;align-items:center;gap:4px}
</style>
</head>
<body>

  <nav>
    <!-- Nav group (repeat as needed) -->

  </div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="breadcrumb">
      <span>Home</span>

  <!-- Content -->
  <div class="content">
    <div class="page-header">

    <div class="card">

</div>

</body>
</html>
