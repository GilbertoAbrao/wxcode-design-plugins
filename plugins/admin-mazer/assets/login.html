<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Admin Console</title>
<style>
:root{
  --bg:#f2f7ff;--card:#fff;--input-bg:#f8faff;--border:#e0e6ed;
  --text-body:#25396f;--text-secondary:#6b7ea8;--text-muted:#9daec8;
  --primary:#435ebe;--primary-hover:#3a52aa;--primary-soft:#eef1fb;
  --danger:#ea5455;--danger-soft:#fce8e8;
  --success:#28c76f;--success-soft:#e6f9ef;
  --radius-card:11px;--radius-btn:8px;--radius-pill:20px;
  --shadow-card:0 4px 24px rgba(67,94,190,.08);
  --transition:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;font-size:14px;
  color:var(--text-body);background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
input{font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.auth-wrap{width:100%;max-width:420px}
.brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.brand-icon{width:40px;height:40px;border-radius:10px;background:var(--primary);
  display:flex;align-items:center;justify-content:center}
.brand-name{font-size:20px;font-weight:700;color:var(--text-body)}
.card{background:var(--card);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:36px 32px}
.card-heading{font-size:22px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text-secondary);margin-bottom:24px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
label{font-size:13px;font-weight:700}
.required-mark{color:var(--danger);margin-left:2px}
.form-control{background:var(--input-bg);border:1.5px solid var(--border);
  border-radius:var(--radius-btn);padding:10px 14px;font-size:14px;
  color:var(--text-body);outline:none;transition:var(--transition);width:100%}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(67,94,190,.18)}
.form-control.error{border-color:var(--danger);background:#fff8f8}
.helper-text{font-size:11px;color:var(--text-muted)}
.error-msg{font-size:11px;color:var(--danger);display:flex;align-items:center;gap:4px}
.label-row{display:flex;align-items:center;justify-content:space-between}
.forgot-link{font-size:12px;font-weight:600;color:var(--primary);text-decoration:none}
.forgot-link:hover{text-decoration:underline}
.password-wrap{position:relative}
.password-wrap .form-control{padding-right:40px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);cursor:pointer;padding:2px}
.btn-primary{width:100%;background:var(--primary);color:#fff;padding:11px;
  border-radius:var(--radius-btn);font-size:15px;font-weight:700;
  transition:var(--transition);margin-top:8px}
.btn-primary:hover{background:var(--primary-hover)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.sso-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  border:1.5px solid var(--border);border-radius:var(--radius-btn);padding:10px;
  font-size:13px;font-weight:700;color:var(--text-secondary);transition:var(--transition)}
.sso-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.register-row{text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)}
.register-row a{font-weight:700;color:var(--primary)}
.register-row a:hover{text-decoration:underline}
.alert-banner{display:flex;align-items:center;gap:10px;background:var(--danger-soft);
  border-left:3px solid var(--danger);border-radius:6px;padding:10px 14px;
  margin-bottom:20px;font-size:13px;color:var(--danger);font-weight:600}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="brand-row">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <span class="brand-name">Vantage</span>
  </div>

  <div class="card">
    <div class="card-heading">Welcome back</div>
    <div class="card-sub">Sign in to your account to continue.</div>

    <div class="alert-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Incorrect email or password. Please try again.
    </div>

    <div class="form-group">
      <label for="email">Email Address <span class="required-mark">*</span></label>
      <input id="email" type="email" class="form-control error" value="jordan.davis@vantagexyz" autocomplete="email">
      <span class="error-msg">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Enter a valid email address.
      </span>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="password">Password <span class="required-mark">*</span></label>
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>
      <div class="password-wrap">
        <input id="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
        <span class="pw-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
    </div>

    <button class="btn-primary">Sign In</button>

    <div class="divider">or continue with</div>

    <button class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="register-row">
    Don't have an account? <a href="#">Sign up for free</a>
  </div>
</div>
</body>
</html>
