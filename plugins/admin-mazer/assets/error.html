<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 Not Found — Admin Console</title>
<style>
:root{
  --bg:#f2f7ff;--card:#fff;--border:#e0e6ed;
  --text-body:#25396f;--text-secondary:#6b7ea8;--text-muted:#9daec8;
  --primary:#435ebe;--primary-hover:#3a52aa;--primary-soft:#eef1fb;
  --danger:#ea5455;
  --radius-card:11px;--radius-btn:8px;
  --shadow-card:0 4px 24px rgba(67,94,190,.08);
  --transition:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito","Segoe UI",system-ui,sans-serif;font-size:14px;
  color:var(--text-body);background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;text-align:center}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

.error-wrap{max-width:500px;width:100%}
.brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px}
.brand-icon{width:36px;height:36px;border-radius:9px;background:var(--primary);
  display:flex;align-items:center;justify-content:center}
.brand-name{font-size:18px;font-weight:700}
.error-illustration{margin:0 auto 32px;width:200px;height:160px}
.error-code{font-size:72px;font-weight:700;color:var(--primary);line-height:1;margin-bottom:12px;letter-spacing:-2px}
.error-title{font-size:22px;font-weight:700;margin-bottom:10px}
.error-message{font-size:15px;color:var(--text-secondary);margin-bottom:32px;line-height:1.6}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;
  padding:12px 28px;border-radius:var(--radius-btn);font-size:15px;font-weight:700;
  transition:var(--transition)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--primary);
  padding:11px 24px;border:1.5px solid var(--primary);border-radius:var(--radius-btn);
  font-size:14px;font-weight:700;transition:var(--transition)}
.btn-ghost:hover{background:var(--primary-soft)}
.btn-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.error-links{margin-top:36px;font-size:13px;color:var(--text-secondary)}
.error-links a{color:var(--primary);font-weight:600}
.error-links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="error-wrap">
  <div class="brand-row">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <span class="brand-name">Vantage</span>
  </div>

  <!-- Illustration -->
  <div class="error-illustration">
    <svg width="200" height="160" viewBox="0 0 200 160" fill="none">
      <!-- ground shadow -->
      <ellipse cx="100" cy="148" rx="70" ry="10" fill="#e0e6ed"/>
      <!-- document body -->
      <rect x="52" y="20" width="96" height="120" rx="10" fill="#fff" stroke="#e0e6ed" stroke-width="2"/>
      <!-- page fold -->
      <path d="M128 20 L148 40 L128 40 Z" fill="#eef1fb"/>
      <path d="M128 20 L148 40" stroke="#e0e6ed" stroke-width="2"/>
      <!-- lines -->
      <rect x="66" y="50" width="68" height="6" rx="3" fill="#eef1fb"/>
      <rect x="66" y="64" width="50" height="6" rx="3" fill="#eef1fb"/>
      <rect x="66" y="78" width="60" height="6" rx="3" fill="#eef1fb"/>
      <!-- magnifier -->
      <circle cx="124" cy="106" r="22" fill="#eef1fb" stroke="#435ebe" stroke-width="3"/>
      <line x1="140" y1="122" x2="156" y2="138" stroke="#435ebe" stroke-width="4" stroke-linecap="round"/>
      <!-- question mark in magnifier -->
      <text x="124" y="114" text-anchor="middle" font-size="22" font-weight="700" fill="#435ebe" font-family="Nunito,sans-serif">?</text>
    </svg>
  </div>

  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <div class="error-message">
    The page you're looking for doesn't exist or has been moved.<br>
    Double-check the URL or return to the dashboard.
  </div>

  <div class="btn-row">
    <button class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Dashboard
    </button>
    <button class="btn-ghost">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
  </div>

  <div class="error-links">
    <p>Looking for something? Try <a href="#">Projects</a>, <a href="#">Tasks</a>, or <a href="#">Team</a>.</p>
    <p style="margin-top:10px">Need help? <a href="#">Contact support</a></p>
  </div>
</div>
</body>
</html>
