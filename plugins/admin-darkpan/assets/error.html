<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page Not Found</title>
<style>
  :root {
    --page:        #000000;
    --panel:       #191c24;
    --border:      #2a2e38;
    --text-1:      #ffffff;
    --text-2:      #b1b7c1;
    --text-3:      #6c7293;
    --text-4:      #454865;
    --accent:      #009688;
    --accent-hov:  #00b09c;
    --accent-dim:  rgba(0,150,136,.15);
    --s-danger:    #ff4c61;
    --font: "Open Sans","Helvetica Neue",Arial,sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page); color: var(--text-1); font-family: var(--font);
    font-size: 14px; line-height: 1.5; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }

  /* ERROR ILLUSTRATION */
  .error-code {
    font-size: clamp(80px, 18vw, 140px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
    /* subtle grid texture via CSS */
    position: relative;
    display: inline-block;
  }
  .error-code::after {
    content: "404";
    position: absolute; inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px rgba(0,150,136,.2);
    transform: translate(4px, 4px);
    z-index: -1;
  }

  /* SVG ILLUSTRATION */
  .error-svg { margin-bottom: 24px; opacity: .7; }

  .error-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .error-sub { font-size: 14px; color: var(--text-3); max-width: 380px; margin: 0 auto 28px; }

  /* ACTIONS */
  .actions { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .13s, border-color .13s; border: 1px solid transparent; text-decoration: none; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hov); border-color: var(--accent-hov); }
  .btn-ghost { background: none; border-color: var(--border); color: var(--text-2); }
  .btn-ghost:hover { background: var(--panel); color: var(--text-1); }

  /* BREADCRUMB TRAIL */
  .error-detail { margin-top: 40px; padding: 16px 24px; background: var(--panel); border: 1px solid var(--border); max-width: 440px; width: 100%; text-align: left; }
  .detail-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-4); margin-bottom: 8px; }
  .detail-row { display: flex; gap: 10px; font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
  .detail-label { color: var(--text-4); width: 80px; flex-shrink: 0; }
  .detail-value { color: var(--text-2); font-family: "Courier New", monospace; word-break: break-all; }

  /* BACK LINK TOP */
  .back-link { position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); text-decoration: none; transition: color .13s; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<a class="back-link" href="#">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  Back to Dashboard
</a>

<!-- SVG ILLUSTRATION -->

  <circle cx="120" cy="60" r="2" fill="#2a2e38"/>
  <circle cx="140" cy="60" r="2" fill="#2a2e38"/>

  <circle cx="40" cy="80" r="2" fill="#2a2e38"/>
  <circle cx="60" cy="80" r="2" fill="#2a2e38"/>
  <circle cx="80" cy="80" r="2" fill="#009688" opacity=".4"/>

  <line x1="83" y1="47" x2="77" y2="53" stroke="#ff4c61" stroke-width="1.5" opacity=".7"/>
</svg>

<!-- 404 -->
<div class="error-code" aria-label="404">404</div>

<div class="error-title">Page not found</div>
<div class="error-sub">The resource you requested does not exist or has been moved. Check the URL or return to the dashboard.</div>

<div class="actions">
  <a class="btn btn-primary" href="#">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    Go to Dashboard
  </a>
  <button class="btn btn-ghost" onclick="history.back()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Go Back
  </button>
</div>

<!-- ERROR DETAIL -->
<div class="error-detail" role="complementary" aria-label="Error details">
  <div class="detail-title">Error Details</div>
  <div class="detail-row">
    <span class="detail-label">Code</span>
    <span class="detail-value">HTTP 404 Not Found</span>
  </div>
  <div class="detail-row">
    <span class="detail-label">Path</span>
    <span class="detail-value">/console/resources/unknown-id</span>
  </div>
  <div class="detail-row">
    <span class="detail-label">Timestamp</span>
    <span class="detail-value">2025-06-03T14:22:08Z</span>
  </div>
  <div class="detail-row">
    <span class="detail-label">Request ID</span>
    <span class="detail-value">req_7xk9pQm2R4</span>
  </div>
</div>

</body>
</html>
