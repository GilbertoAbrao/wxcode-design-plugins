<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title><!-- page title --></title>
<style>
  /* ============================================================
     Admin Console — Shell Seed Template
     Tokens + App Shell only. No domain content.
     Copy this file, add your page content inside <main class="content">.
     ============================================================ */

  :root {
    /* --- Canvas --- */
    --page:        #000000;   /* page / body background */
    --panel:       #191c24;   /* card / sidebar / topbar surface */
    --panel-hover: #212535;   /* hovered panel row */
    --active-bg:   #2a2e38;   /* selected / active / input background */
    --border:      #2a2e38;   /* hairline border */
    --divider:     #1e2130;   /* inner row divider (lighter than border) */

    /* --- Text ramp --- */
    --text-1:      #ffffff;   /* primary / headings */
    --text-2:      #b1b7c1;   /* body / cell text */
    --text-3:      #6c7293;   /* muted / labels */
    --text-4:      #454865;   /* faint / disabled */

    /* --- Accent --- */
    --accent:      #009688;   /* teal — primary CTAs, active nav, figures */
    --accent-hov:  #00b09c;   /* hovered accent */
    --accent-dim:  rgba(0,150,136,.15); /* accent tint for active nav bg */

    /* --- Status tokens --- */
    --s-success:   #00c897;
    --s-success-d: rgba(0,200,151,.14);
    --s-warn:      #ffab00;
    --s-warn-d:    rgba(255,171,0,.14);
    --s-danger:    #ff4c61;
    --s-danger-d:  rgba(255,76,97,.14);
    --s-info:      #5b73e8;
    --s-info-d:    rgba(91,115,232,.14);
    --s-neutral:   #6c7293;
    --s-neutral-d: rgba(108,114,147,.14);

    /* --- Typography --- */
    --font: "Open Sans","Helvetica Neue",Arial,sans-serif;
    --mono: "Courier New",monospace;

    /* --- Geometry --- */
    --radius: 0px; /* ZERO radius everywhere */
  }

  /* ----- Reset ----- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ----- Body ----- */
  body {
    background: var(--page);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ==================== SIDEBAR ==================== */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    /* Collapsed state: add class .collapsed to body or .sidebar */
    transition: width .25s ease;
  }

  /* Logo zone */
  .sidebar-logo {
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo .logo-icon { color: var(--accent); flex-shrink: 0; }
  .sidebar-logo .logo-name {
    font-size: 16px; font-weight: 700; margin-left: 10px;
    white-space: nowrap; overflow: hidden;
  }

  /* Section group */
  .sidebar-section { padding: 20px 0 4px; }
  .sidebar-label {
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .7px;
    padding: 0 20px 6px;
    white-space: nowrap; overflow: hidden;
  }

  /* Nav item */
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    color: var(--text-2); font-size: 13.5px;
    cursor: pointer;
    transition: background .13s, color .13s;
    border-left: 3px solid transparent;
    text-decoration: none;
    white-space: nowrap; overflow: hidden;
  }
  .nav-item:hover { background: var(--panel-hover); color: var(--text-1); }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .nav-item .nav-label { overflow: hidden; text-overflow: ellipsis; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--s-danger); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 1px 6px;
    flex-shrink: 0;
  }

  /* Spacer + bottom pinned item */
  .sidebar-spacer { flex: 1; }
  .sidebar-bottom { padding: 12px 0; border-top: 1px solid var(--border); }

  /* ==================== MAIN ==================== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ==================== TOPBAR ==================== */
  .topbar {
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }

  .hamburger {
    background: none; border: none;
    cursor: pointer; color: var(--text-2);
    display: flex; align-items: center;
  }

  .search-wrap { flex: 1; max-width: 320px; position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--active-bg); border: 1px solid var(--border);
    color: var(--text-1); font-family: var(--font); font-size: 13px;
    padding: 7px 12px 7px 34px;
    border-radius: var(--radius); outline: none;
  }
  .search-wrap input::placeholder { color: var(--text-3); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--text-3);
  }

  .topbar-spacer { flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    background: none; border: 1px solid var(--border); color: var(--text-2);
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .13s, color .13s;
    position: relative;
  }
  .icon-btn:hover { background: var(--panel-hover); color: var(--text-1); }
  .notif-dot {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; background: var(--s-danger);
    border-radius: 50%; border: 2px solid var(--panel);
  }

  .avatar-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    background: var(--active-bg); border: 1px solid var(--border);
    cursor: pointer;
  }
  .avatar-circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .avatar-info { display: flex; flex-direction: column; line-height: 1.2; }
  .avatar-name { font-size: 12px; font-weight: 600; color: var(--text-1); }
  .avatar-role { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .4px; }

  /* ==================== CONTENT ==================== */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Page header */
  .page-header { display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: 20px; font-weight: 700; color: var(--text-1); }
  .page-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

  /* ==================== COMMON ATOMS ==================== */

  /* Panel */
  .panel { background: var(--panel); border: 1px solid var(--border); }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .panel-title { font-size: 14px; font-weight: 700; color: var(--text-1); }
  .panel-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; font-family: var(--font); font-size: 13px; font-weight: 600;
    border-radius: var(--radius); cursor: pointer;
    transition: background .13s, border-color .13s;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hov); border-color: var(--accent-hov); }
  .btn-primary:disabled { background: var(--active-bg); border-color: var(--border); color: var(--text-4); cursor: not-allowed; }
  .btn-ghost { background: none; border-color: var(--border); color: var(--text-2); }
  .btn-ghost:hover { background: var(--panel-hover); color: var(--text-1); }

  /* Status pills */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    padding: 3px 8px; border-radius: var(--radius);
  }
  .pill-success { background: var(--s-success-d); color: var(--s-success); }
  .pill-warn    { background: var(--s-warn-d);    color: var(--s-warn); }
  .pill-danger  { background: var(--s-danger-d);  color: var(--s-danger); }
  .pill-info    { background: var(--s-info-d);    color: var(--s-info); }
  .pill-neutral { background: var(--s-neutral-d); color: var(--s-neutral); }

  /* KPI tile */
  .kpi-tile { background: var(--panel); border: 1px solid var(--border); padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .kpi-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .kpi-icon { width: 40px; height: 40px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .kpi-delta { font-size: 11px; font-weight: 700; padding: 2px 7px; display: flex; align-items: center; gap: 3px; }
  .delta-up   { background: var(--s-success-d); color: var(--s-success); }
  .delta-down { background: var(--s-danger-d);  color: var(--s-danger); }
  .delta-warn { background: var(--s-warn-d);    color: var(--s-warn); }
  .kpi-figure { font-size: 28px; font-weight: 700; color: var(--text-1); letter-spacing: -.5px; font-variant-numeric: tabular-nums; }
  .kpi-label  { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
  .kpi-sub    { font-size: 11px; color: var(--text-4); }

  /* Table basics */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; color: var(--text-3);
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--divider); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--panel-hover); }
  td { padding: 10px 14px; font-size: 13px; color: var(--text-2); vertical-align: middle; }
  td.id-cell { font-family: var(--mono); font-size: 12px; color: var(--text-3); }
  td.right { text-align: right; font-variant-numeric: tabular-nums; }
  td.primary { color: var(--text-1); font-weight: 600; }

  /* Form field */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text-2); }
  .required-mark { color: var(--s-danger); }
  .field-control input, .field-control select, .field-control textarea {
    width: 100%; background: var(--active-bg); border: 1px solid var(--border);
    color: var(--text-1); font-family: var(--font); font-size: 13px;
    padding: 9px 12px; outline: none; transition: border-color .13s; appearance: none;
  }
  .field-control input:focus, .field-control select:focus, .field-control textarea:focus { border-color: var(--accent); }
  .field.invalid .field-control input { border-color: var(--s-danger); }
  .field.valid .field-control input { border-color: var(--s-success); }
  .field-helper { font-size: 11px; color: var(--text-3); }
  .field-error  { font-size: 11px; color: var(--s-danger); display: flex; align-items: center; gap: 4px; }
</style>
</head>
