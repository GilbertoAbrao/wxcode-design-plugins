<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Admin Console</title>
<style>
  :root {
    --page:        #000000;
    --panel:       #191c24;
    --panel-hover: #212535;
    --active-bg:   #2a2e38;
    --border:      #2a2e38;
    --text-1:      #ffffff;
    --text-2:      #b1b7c1;
    --text-3:      #6c7293;
    --text-4:      #454865;
    --accent:      #009688;
    --accent-hov:  #00b09c;
    --accent-dim:  rgba(0,150,136,.15);
    --s-danger:    #ff4c61;
    --s-danger-d:  rgba(255,76,97,.14);
    --font: "Open Sans","Helvetica Neue",Arial,sans-serif;
    --radius: 0px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page); color: var(--text-1); font-family: var(--font);
    font-size: 14px; line-height: 1.5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .auth-wrap {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
  }

  /* LOGO */
  .auth-logo { display: flex; align-items: center; gap: 10px; }
  .auth-logo svg { color: var(--accent); }
  .auth-logo span { font-size: 22px; font-weight: 700; letter-spacing: .3px; }

  /* CARD */
  .auth-card { width: 100%; background: var(--panel); border: 1px solid var(--border); }
  .auth-card-head { padding: 28px 28px 0; }
  .auth-title { font-size: 20px; font-weight: 700; }
  .auth-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }
  .auth-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }

  /* FIELD */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
  .required-mark { color: var(--s-danger); font-weight: 700; }
  .field-control { position: relative; }
  .field-control input {
    width: 100%; background: var(--active-bg); border: 1px solid var(--border);
    color: var(--text-1); font-family: var(--font); font-size: 13px;
    padding: 10px 12px; outline: none; transition: border-color .13s;
  }
  .field-control input::placeholder { color: var(--text-4); }
  .field-control input:focus { border-color: var(--accent); }
  .field-error { font-size: 11px; color: var(--s-danger); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .field.invalid .field-control input { border-color: var(--s-danger); background: color-mix(in srgb, var(--active-bg) 95%, var(--s-danger) 5%); }

  /* EYE TOGGLE */
  .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-3); cursor: pointer; display: flex; align-items: center; }
  .eye-btn:hover { color: var(--text-2); }

  /* HELPER ROW */
  .field-row { display: flex; align-items: center; justify-content: space-between; }
  .checkbox-label { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-3); cursor: pointer; }
  .checkbox-label input { accent-color: var(--accent); width: 13px; height: 13px; }
  .forgot-link { font-size: 12px; color: var(--accent); text-decoration: none; }
  .forgot-link:hover { color: var(--accent-hov); text-decoration: underline; }

  /* ALERT BANNER */
  .auth-alert { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: var(--s-danger-d); border-left: 3px solid var(--s-danger); font-size: 12px; color: var(--text-2); }
  .auth-alert svg { flex-shrink: 0; margin-top: 1px; color: var(--s-danger); }

  /* BTN */
  .btn-primary {
    width: 100%; padding: 11px; background: var(--accent); border: 1px solid var(--accent);
    color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background .13s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--accent-hov); }
  .btn-primary:disabled { background: var(--active-bg); border-color: var(--border); color: var(--text-4); cursor: not-allowed; }

  /* DIVIDER */
  .auth-divider { display: flex; align-items: center; gap: 12px; }
  .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .auth-divider span { font-size: 11px; color: var(--text-4); text-transform: uppercase; letter-spacing: .6px; }

  /* FOOTER */
  .auth-card-foot { padding: 16px 28px 24px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text-3); }
  .auth-card-foot a { color: var(--accent); text-decoration: none; }
  .auth-card-foot a:hover { color: var(--accent-hov); text-decoration: underline; }

  /* BOTTOM NOTE */
  .auth-bottom { font-size: 11px; color: var(--text-4); text-align: center; }
  .auth-bottom a { color: var(--text-3); text-decoration: none; }
  .auth-bottom a:hover { color: var(--text-2); }
</style>
</head>
<body>

<div class="auth-wrap">
  <!-- LOGO -->
  <div class="auth-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 5h2v-2h2v2h2v2h-2v2h-2v-2h-2z"/>
    </svg>
    <span>Nexus Console</span>
  </div>

  <!-- CARD -->
  <div class="auth-card">
    <div class="auth-card-head">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your account to continue</div>
    </div>
    <div class="auth-body">

      <!-- DEMO: show an error state for illustration -->
      <div class="auth-alert" role="alert">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        The credentials you entered do not match our records. Please try again.
      </div>

      <div class="field invalid">
        <label class="field-label" for="email">Email address <span class="required-mark">*</span></label>
        <div class="field-control">
          <input id="email" type="email" value="rivera@example" placeholder="you@company.com" autocomplete="email" aria-describedby="email-error" aria-invalid="true">
        </div>
        <div class="field-error" id="email-error" role="alert">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          Enter a valid email address.
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password <span class="required-mark">*</span></label>
        <div class="field-control">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye-btn" type="button" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>

      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox" checked>
          Remember me for 30 days
        </label>
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>

      <button class="btn-primary" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
        Sign In
      </button>
    </div>

    <div class="auth-card-foot">
      Don't have an account? <a href="#">Create one →</a>
    </div>
  </div>

  <div class="auth-bottom">
    <a href="#">Terms of Service</a> · <a href="#">Privacy Policy</a> · <a href="#">Support</a>
  </div>
</div>

</body>
</html>
