<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account — Admin Console</title>
<style>
  :root {
    --page:        #000000;
    --panel:       #191c24;
    --panel-hover: #212535;
    --active-bg:   #2a2e38;
    --border:      #2a2e38;
    --text-1:      #ffffff;
    --text-2:      #b1b7c1;
    --text-3:      #6c7293;
    --text-4:      #454865;
    --accent:      #009688;
    --accent-hov:  #00b09c;
    --s-success:   #00c897;
    --s-success-d: rgba(0,200,151,.14);
    --s-danger:    #ff4c61;
    --font: "Open Sans","Helvetica Neue",Arial,sans-serif;
    --radius: 0px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page); color: var(--text-1); font-family: var(--font);
    font-size: 14px; line-height: 1.5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }

  .auth-wrap { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; gap: 28px; }

  .auth-logo { display: flex; align-items: center; gap: 10px; }
  .auth-logo svg { color: var(--accent); }
  .auth-logo span { font-size: 22px; font-weight: 700; }

  .auth-card { width: 100%; background: var(--panel); border: 1px solid var(--border); }
  .auth-card-head { padding: 28px 28px 0; }
  .auth-title { font-size: 20px; font-weight: 700; }
  .auth-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }
  .auth-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
  .required-mark { color: var(--s-danger); }
  .field-control { position: relative; }
  .field-control input {
    width: 100%; background: var(--active-bg); border: 1px solid var(--border);
    color: var(--text-1); font-family: var(--font); font-size: 13px;
    padding: 10px 12px; outline: none; transition: border-color .13s;
  }
  .field-control input::placeholder { color: var(--text-4); }
  .field-control input:focus { border-color: var(--accent); }

  .field-helper { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .field-error { font-size: 11px; color: var(--s-danger); display: flex; align-items: center; gap: 4px; margin-top: 2px; }

  .field.invalid .field-control input { border-color: var(--s-danger); background: color-mix(in srgb, var(--active-bg) 95%, var(--s-danger) 5%); }
  .field.valid .field-control input { border-color: var(--s-success); }
  .valid-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--s-success); }

  /* PASSWORD STRENGTH */
  .pwd-strength { margin-top: 4px; }
  .strength-bar { height: 3px; background: var(--active-bg); display: flex; gap: 3px; }
  .strength-seg { flex: 1; height: 3px; }
  .strength-seg.filled-strong  { background: var(--s-success); }
  .strength-seg.filled-medium  { background: var(--accent); }
  .strength-seg.filled-weak    { background: var(--s-danger); }
  .strength-label { font-size: 10px; color: var(--text-4); margin-top: 3px; }
  .strength-label.strong { color: var(--s-success); }
  .strength-label.medium { color: var(--accent); }
  .strength-label.weak   { color: var(--s-danger); }

  .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-3); cursor: pointer; }

  .terms-label { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--text-3); cursor: pointer; }
  .terms-label input { accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }
  .terms-label a { color: var(--accent); text-decoration: none; }
  .terms-label a:hover { color: var(--accent-hov); text-decoration: underline; }

  .btn-primary { width: 100%; padding: 11px; background: var(--accent); border: 1px solid var(--accent); color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: background .13s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: var(--accent-hov); }
  .btn-primary:disabled { background: var(--active-bg); border-color: var(--border); color: var(--text-4); cursor: not-allowed; }

  .auth-card-foot { padding: 16px 28px 24px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text-3); }
  .auth-card-foot a { color: var(--accent); text-decoration: none; }
  .auth-card-foot a:hover { color: var(--accent-hov); text-decoration: underline; }

  .auth-bottom { font-size: 11px; color: var(--text-4); text-align: center; }
  .auth-bottom a { color: var(--text-3); text-decoration: none; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 5h2v-2h2v2h2v2h-2v2h-2v-2h-2z"/>
    </svg>
    <span>Nexus Console</span>
  </div>

  <div class="auth-card">
    <div class="auth-card-head">
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Access the admin console in seconds</div>
    </div>
    <div class="auth-body">

      <div class="form-row">
        <div class="field valid">
          <label class="field-label" for="first-name">First name <span class="required-mark">*</span></label>
          <div class="field-control">
            <input id="first-name" type="text" value="Ana" placeholder="Ana" autocomplete="given-name">
            <svg class="valid-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
        </div>
        <div class="field valid">
          <label class="field-label" for="last-name">Last name <span class="required-mark">*</span></label>
          <div class="field-control">
            <input id="last-name" type="text" value="Rivera" placeholder="Rivera" autocomplete="family-name">
            <svg class="valid-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
        </div>
      </div>

      <div class="field valid">
        <label class="field-label" for="email">Work email <span class="required-mark">*</span></label>
        <div class="field-control">
          <input id="email" type="email" value="ana.rivera@company.com" placeholder="you@company.com" autocomplete="email">
          <svg class="valid-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password <span class="required-mark">*</span></label>
        <div class="field-control">
          <input id="password" type="password" value="Secure@Pass1!" placeholder="Min. 8 characters" autocomplete="new-password" aria-describedby="pwd-helper pwd-strength-label">
          <button class="eye-btn" type="button" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <div class="field-helper" id="pwd-helper">Use 8+ characters with uppercase, numbers, and symbols.</div>
        <div class="pwd-strength">
          <div class="strength-bar">
            <div class="strength-seg filled-strong"></div>
            <div class="strength-seg filled-strong"></div>
            <div class="strength-seg filled-strong"></div>
            <div class="strength-seg filled-strong"></div>
          </div>
          <div class="strength-label strong" id="pwd-strength-label">Strong password</div>
        </div>
      </div>

      <div class="field invalid">
        <label class="field-label" for="confirm-password">Confirm password <span class="required-mark">*</span></label>
        <div class="field-control">
          <input id="confirm-password" type="password" value="Secure@Pass1" placeholder="Repeat your password" autocomplete="new-password" aria-describedby="confirm-error" aria-invalid="true">
          <button class="eye-btn" type="button" aria-label="Show confirm password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <div class="field-error" id="confirm-error" role="alert">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          Passwords do not match.
        </div>
      </div>

      <label class="terms-label">
        <input type="checkbox">
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>

      <button class="btn-primary" type="button" disabled aria-disabled="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Create Account
      </button>
    </div>

    <div class="auth-card-foot">
      Already have an account? <a href="#">Sign in →</a>
    </div>
  </div>

  <div class="auth-bottom">
    <a href="#">Terms</a> · <a href="#">Privacy</a> · <a href="#">Support</a>
  </div>
</div>

</body>
</html>
