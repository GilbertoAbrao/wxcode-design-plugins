<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title}</title>
<style>
/* ── Meridian Admin — token seed ── */
:root {
  /* Accent */
  --color-accent:       #4f46e5;
  --color-accent-mid:   #6366f1;
  --color-accent-bg:    #eef2ff;
  /* State */
  --color-success:      #16a34a;
  --color-success-bg:   #dcfce7;
  --color-warn:         #d97706;
  --color-warn-bg:      #fef3c7;
  --color-danger:       #dc2626;
  --color-danger-bg:    #fee2e2;
  --color-probation:    #4338ca;
  --color-probation-bg: #e0e7ff;
  /* Category bar palette */
  --color-cat-a:        #6366f1;
  --color-cat-b:        #ec4899;
  --color-cat-c:        #f59e0b;
  --color-cat-d:        #10b981;
  --color-cat-e:        #8b5cf6;
  --color-cat-f:        #0ea5e9;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px;color:#1e1e2d;background:#f8f8fb;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit}
svg{display:block}

/* ── App shell ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar (240px, fixed) ── */
.sidebar{width:240px;min-width:240px;background:#fff;border-right:1px solid #e8e8ef;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
/* Logo area */
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;border-bottom:1px solid #e8e8ef}
.sidebar-logo-text{font-size:15px;font-weight:700;color:#1e1e2d;letter-spacing:-0.01em}
.sidebar-logo-text span{color:var(--color-accent)}
/* Entity-switcher card */
.org-switcher{margin:12px 12px 8px;padding:10px 12px;background:#f8f8fb;border:1px solid #e8e8ef;border-radius:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.org-switcher-inner{display:flex;align-items:center;gap:8px}
.org-avatar{width:28px;height:28px;border-radius:6px;background:var(--color-accent-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--color-accent);flex-shrink:0}
.org-name{font-size:12px;font-weight:600;color:#1e1e2d}
.org-sub{font-size:11px;color:#9ca3af}
/* Nav */
.nav-section{padding:8px 0 4px}
.nav-section-label{padding:6px 20px 4px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:13px;color:#6b7280;position:relative;cursor:pointer;transition:background .12s,color .12s}
.nav-item:hover{background:#f8f8fb;color:#1e1e2d}
.nav-item.active{background:var(--color-accent-bg);color:var(--color-accent);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 3px 3px 0;background:var(--color-accent)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--color-accent-bg);color:var(--color-accent);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
/* Footer */
.sidebar-footer{margin-top:auto;border-top:1px solid #e8e8ef;padding:14px 16px;display:flex;align-items:center;gap:10px}
.sidebar-footer-avatar{width:32px;height:32px;border-radius:50%;background:var(--color-accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-footer-info{flex:1;min-width:0}
.sidebar-footer-name{font-size:12px;font-weight:600;color:#1e1e2d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer-role{font-size:11px;color:#9ca3af}

/* ── Main column ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Topbar (60px) ── */
.topbar{height:60px;min-height:60px;background:#fff;border-bottom:1px solid #e8e8ef;display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{display:flex;flex-direction:column;line-height:1.2;min-width:0;flex-shrink:0}
.topbar-page{font-size:15px;font-weight:700;color:#1e1e2d;white-space:nowrap}
.topbar-breadcrumb{font-size:11px;color:#9ca3af}
.topbar-breadcrumb span{color:var(--color-accent)}
/* Search */
.topbar-search{flex:1;max-width:300px;position:relative}
.topbar-search input{width:100%;height:34px;padding:0 12px 0 34px;border:1px solid #e8e8ef;border-radius:8px;background:#f8f8fb;font-size:13px;color:#1e1e2d;outline:none}
.topbar-search input::placeholder{color:#9ca3af}
.topbar-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none}
/* Period tabs */
.topbar-period{display:flex;gap:2px;margin-left:auto;background:#f8f8fb;border:1px solid #e8e8ef;border-radius:8px;padding:3px}
.period-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#6b7280;transition:background .12s,color .12s}
.period-btn.active{background:#fff;color:var(--color-accent);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.06)}
/* Bell */
.topbar-bell{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#6b7280;cursor:pointer}
.topbar-bell:hover{background:#f8f8fb}
.bell-badge{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--color-danger);border:2px solid #fff}
/* Avatar */
.topbar-avatar-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--color-accent),var(--color-accent-mid));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.topbar-uname{font-size:13px;font-weight:600;color:#1e1e2d}

/* ── Content scroll area ── */
.content{flex:1;overflow-y:auto;padding:24px 24px 32px}

/* ── Cards ── */
.card{background:#fff;border:1px solid #e8e8ef;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid #e8e8ef}
.card-title{font-size:14px;font-weight:700;color:#1e1e2d}
.card-subtitle{font-size:12px;color:#9ca3af;margin-top:2px}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid #e8e8ef;border-radius:12px;padding:18px 18px 14px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:4px}
.kpi-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9ca3af}
.kpi-number{font-size:26px;font-weight:700;color:#1e1e2d;line-height:1.1;margin-top:4px}
.kpi-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.kpi-delta{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap}
.kpi-delta.up{color:var(--color-success);background:var(--color-success-bg)}
.kpi-delta.down{color:var(--color-danger);background:var(--color-danger-bg)}
.kpi-delta.warn{color:var(--color-warn);background:var(--color-warn-bg)}

/* ── Status pills ── */
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.status-pill::before{content:"";width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-active{color:var(--color-success);background:var(--color-success-bg)}
.s-active::before{background:var(--color-success)}
.s-warn{color:var(--color-warn);background:var(--color-warn-bg)}
.s-warn::before{background:var(--color-warn)}
.s-info{color:var(--color-probation);background:var(--color-probation-bg)}
.s-info::before{background:var(--color-probation)}
.s-danger{color:var(--color-danger);background:var(--color-danger-bg)}
.s-danger::before{background:var(--color-danger)}

/* ── Buttons ── */
.btn-primary{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;background:var(--color-accent);color:#fff;font-size:12px;font-weight:600}
.btn-primary:hover{background:var(--color-accent-mid)}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:1px solid #e8e8ef;border-radius:8px;background:#fff;color:#6b7280;font-size:12px;font-weight:500}
.btn-ghost:hover{border-color:var(--color-accent);color:var(--color-accent)}

/* ── Table ── */
.table-card{background:#fff;border:1px solid #e8e8ef;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid #e8e8ef;gap:10px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:#1e1e2d}
.table-count{font-size:12px;color:#9ca3af;background:#f8f8fb;border:1px solid #e8e8ef;padding:2px 8px;border-radius:99px}
.filter-pills{display:flex;gap:6px}
.filter-pill{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:500;background:#f8f8fb;border:1px solid #e8e8ef;color:#6b7280;cursor:pointer}
.filter-pill.active{background:var(--color-accent-bg);color:var(--color-accent);border-color:var(--color-accent-bg);font-weight:600}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8f8fb}
th{padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9ca3af;text-align:left;white-space:nowrap}
th:first-child{padding-left:20px}
th:last-child{padding-right:20px}
tbody tr{border-top:1px solid #f1f1f5;transition:background .1s}
tbody tr:hover{background:#f8f8fb}
td{padding:12px 14px;font-size:13px;color:#1e1e2d;vertical-align:middle}
td:first-child{padding-left:20px}
td:last-child{padding-right:20px}
.rec-cell{display:flex;align-items:center;gap:10px}
.rec-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.rec-name{font-size:13px;font-weight:600;color:#1e1e2d}
.rec-sub{font-size:11px;color:#9ca3af}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid #e8e8ef;font-size:12px;color:#9ca3af}
.pagination{display:flex;align-items:center;gap:4px}
.page-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer}
.page-btn:hover{background:#f8f8fb}
.page-btn.active{background:var(--color-accent);color:#fff;font-weight:600}

/* ── Horizontal-bar breakdown ── */
.dept-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.dept-row:last-child{margin-bottom:0}
.dept-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dept-name{font-size:12px;color:#1e1e2d;width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dept-bar-track{flex:1;height:6px;background:#f1f1f5;border-radius:99px;overflow:hidden}
.dept-bar-fill{height:100%;border-radius:99px}
.dept-count{font-size:12px;font-weight:600;color:#1e1e2d;width:28px;text-align:right;flex-shrink:0}
.dept-pct{font-size:11px;color:#9ca3af;width:30px;text-align:right;flex-shrink:0}

/* ── Side panel ── */
.side-panel{display:flex;flex-direction:column;gap:16px}
.panel-card{background:#fff;border:1px solid #e8e8ef;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.panel-title{font-size:13px;font-weight:700;color:#1e1e2d;margin-bottom:2px}
.panel-sub{font-size:11px;color:#9ca3af;margin-bottom:14px}
.approval-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f1f5}
.approval-item:last-of-type{border-bottom:none;padding-bottom:0}
.appr-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.appr-info{flex:1;min-width:0}
.appr-name{font-size:12px;font-weight:600;color:#1e1e2d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appr-type{font-size:11px;color:#9ca3af}
.appr-actions{display:flex;gap:4px;margin-top:4px}
.appr-days{font-size:11px;font-weight:600;color:var(--color-accent);white-space:nowrap}
.appr-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer}
.appr-btn-ok{color:var(--color-success);background:var(--color-success-bg);border:1px solid transparent}
.appr-btn-ok:hover{border-color:var(--color-success)}
.appr-btn-no{color:var(--color-danger);background:var(--color-danger-bg);border:1px solid transparent}
.appr-btn-no:hover{border-color:var(--color-danger)}
.pending-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pending-label{font-size:12px;font-weight:700;color:#1e1e2d}
.pending-count{background:var(--color-warn-bg);color:var(--color-warn);font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px}
.pending-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f1f1f5}
.pending-item:last-child{border-bottom:none}
.pending-dot{width:7px;height:7px;border-radius:50%;background:var(--color-warn);margin-top:5px;flex-shrink:0}
.pending-body{flex:1;min-width:0}
.pending-name{font-size:12px;font-weight:600;color:#1e1e2d}
.pending-detail{font-size:11px;color:#9ca3af}
.pending-when{font-size:10px;color:#9ca3af;margin-top:2px}
.view-all{display:block;text-align:center;margin-top:10px;font-size:12px;font-weight:600;color:var(--color-accent);padding:7px;border-radius:7px;background:var(--color-accent-bg);cursor:pointer}

/* ── Form elements ── */
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field-label{font-size:12px;font-weight:600;color:#374151;display:flex;align-items:center;gap:3px}
.req{color:var(--color-danger);font-size:12px}
.control{height:36px;padding:0 12px;border:1px solid #e8e8ef;border-radius:8px;font-size:13px;color:#1e1e2d;background:#fff;outline:none;width:100%;transition:border-color .12s}
.control:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
textarea.control{height:80px;padding:10px 12px;resize:vertical;line-height:1.5}
.helper{font-size:11px;color:#9ca3af;margin-top:1px}
.field.invalid .control{border-color:var(--color-danger)}
.error-msg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-danger);margin-top:1px}
.field.valid .control{border-color:var(--color-success)}
</style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR — copy from dashboard.html; update active nav item ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="var(--color-accent)"/>
        <polygon points="14,4 24,10 24,18 14,24 4,18 4,10" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="14" cy="14" r="3" fill="#fff"/>
      </svg>
      <span class="sidebar-logo-text">Brand<span>Name</span></span>
    </div>
    <div class="org-switcher">
      <div class="org-switcher-inner">
        <div class="org-avatar">{I}</div>
        <div>
          <div class="org-name">{Entity name}</div>
          <div class="org-sub">{sub-line}</div>
        </div>
      </div>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:#9ca3af"><path d="M4 5.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <!-- Nav sections: replace section labels + item labels with domain terms -->
    <nav class="nav-section">
      <div class="nav-section-label">{Section A}</div>
      <div class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".5"/></svg>
        {Item 1}
      </div>
      <div class="nav-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-2.761 2.686-5 6-5s6 2.239 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        {Item 2}
        <span class="nav-badge">{N}</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-avatar">{II}</div>
      <div class="sidebar-footer-info">
        <div class="sidebar-footer-name">{User Name}</div>
        <div class="sidebar-footer-role">{Role}</div>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">
        <span class="topbar-page">{Screen Title}</span>
        <span class="topbar-breadcrumb">{Entity} / <span>{Section}</span></span>
      </div>
      <div class="topbar-search">
        <svg class="topbar-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Search {entity}…">
      </div>
      <div class="topbar-period">
        <button class="period-btn">MTD</button>
        <button class="period-btn active">QTD</button>
        <button class="period-btn">YTD</button>
      </div>
      <button class="topbar-bell">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 00-5 5v3l-1.5 2H15.5L14 10V7a5 5 0 00-5-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7.5 14.5a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span class="bell-badge"></span>
      </button>
      <div class="topbar-avatar-wrap">
        <div class="topbar-avatar">{II}</div>
        <span class="topbar-uname">{User Name}</span>
      </div>
    </header>

    <!-- Content — drop region skeletons from references/layouts.md here -->
    <div class="content">
      <!-- KPI row, mid-grid, bottom-row, or form / detail layout -->
    </div>

  </div>
</div>
</body>
</html>
