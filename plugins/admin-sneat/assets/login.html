<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — Sign In</title>
<style>
:root {
  --accent:        #696cff;
  --accent-hover:  #5a5dd6;
  --accent-dim:    rgba(105,108,255,.12);
  --canvas:        #f5f5f9;
  --surface:       #ffffff;
  --border:        #e4e6e8;
  --text-primary:  #333240;
  --text-body:     #646e78;
  --text-muted:    #8a9099;
  --shadow-sm:     0 2px 6px rgba(67,89,113,.12);
  --shadow-md:     0 8px 32px rgba(67,89,113,.16);
  --radius-card:   10px;
  --radius-input:  6px;
  --state-danger:  #ff3e1d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Public Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;background:var(--canvas);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none}
.logo span{font-weight:700;font-size:22px;color:var(--text-primary);letter-spacing:-.02em}
.auth-card{background:var(--surface);border-radius:var(--radius-card);border:1px solid var(--border);box-shadow:var(--shadow-md);padding:36px 40px;width:100%;max-width:420px}
.auth-heading{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px}
.auth-sub a{color:var(--accent);text-decoration:none;font-weight:500}
.auth-sub a:hover{text-decoration:underline}

.field{margin-bottom:18px}
.field-label{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
.field-label a{color:var(--accent);font-weight:500;text-decoration:none;font-size:12px}
.field-label a:hover{text-decoration:underline}
.field-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-input);font-size:14px;color:var(--text-primary);background:var(--surface);outline:none;transition:.18s;font-family:inherit}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.field-input.is-invalid{border-color:var(--state-danger);box-shadow:0 0 0 3px rgba(255,62,29,.1)}
.password-wrap{position:relative}
.password-wrap .field-input{padding-right:44px}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;display:flex;align-items:center}
.error-text{font-size:12px;color:var(--state-danger);margin-top:4px;display:flex;align-items:center;gap:4px}

.check-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--text-body)}
.check-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

.btn-primary{width:100%;padding:12px;border-radius:var(--radius-input);background:var(--accent);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:.18s;font-family:inherit}
.btn-primary:hover{background:var(--accent-hover)}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.oauth-btns{display:flex;gap:10px}
.oauth-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-input);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-body);transition:.18s;font-family:inherit}
.oauth-btn:hover{border-color:var(--accent);color:var(--accent)}

.auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)}
.auth-footer a{color:var(--accent);text-decoration:none;font-weight:500}
.auth-footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<a class="logo" href="#">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="var(--accent)"/>
    <rect x="8" y="8" width="8" height="8" rx="2" fill="#fff"/>
    <rect x="20" y="8" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="8" y="20" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="20" y="20" width="8" height="8" rx="2" fill="#fff"/>
  </svg>
  <span>AppPanel</span>
</a>

<div class="auth-card">
  <div class="auth-heading">Welcome back 👋</div>
  <div class="auth-sub">Sign in to your account to continue. New here? <a href="#">Create an account</a></div>

  <form novalidate>
    <div class="field">
      <label class="field-label" for="login-email">Email</label>
      <input class="field-input is-invalid" id="login-email" type="email" placeholder="you@company.com" value="not-an-email" aria-invalid="true" aria-describedby="login-email-err" autocomplete="email">
      <div class="error-text" id="login-email-err">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Please enter a valid email address.
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="login-pw">
        Password
        <a href="#">Forgot password?</a>
      </label>
      <div class="password-wrap">
        <input class="field-input" id="login-pw" type="password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="toggle-pw" aria-label="Show password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="check-row">
      <input type="checkbox" id="remember" checked>
      <label for="remember">Remember me for 30 days</label>
    </div>

    <button type="submit" class="btn-primary">Sign In</button>
  </form>

  <div class="divider">or continue with</div>

  <div class="oauth-btns">
    <button class="oauth-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="oauth-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      GitHub
    </button>
    <button class="oauth-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.002C0 1.343 1.343 0 3.002 0h17.996C22.657 0 24 1.343 24 3.002v17.996C24 22.657 22.657 24 20.998 24H3.002C1.343 24 0 22.657 0 20.998V3.002zm8.29 17.255V9.026H5.031v11.231H8.29zM6.66 7.693c1.136 0 1.843-.753 1.843-1.694-.021-.962-.707-1.694-1.821-1.694-1.115 0-1.844.732-1.844 1.694 0 .941.707 1.694 1.8 1.694h.022zM13.01 20.257v-6.275c0-.293.021-.585.107-.795.237-.585.775-1.191 1.68-1.191 1.184 0 1.658.901 1.658 2.222v6.039h3.258v-6.471c0-3.012-1.607-4.413-3.751-4.413-1.758 0-2.529.983-2.952 1.651v.034h-.022l.022-.034V9.026H9.753c.043.919 0 11.231 0 11.231h3.257z"/></svg>
      LinkedIn
    </button>
  </div>
</div>

<div class="auth-footer">
  Don't have an account? <a href="#">Sign up — it's free</a>
</div>

</body>
</html>
