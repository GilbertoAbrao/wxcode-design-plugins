<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — Screen Title</title>
<style>
/* ===== Design tokens ===== */
:root {
  --accent:        #696cff;
  --accent-hover:  #5a5dd6;
  --accent-dim:    rgba(105,108,255,.12);
  --canvas:        #f5f5f9;
  --surface:       #ffffff;
  --border:        #e4e6e8;
  --text-primary:  #333240;
  --text-body:     #646e78;
  --text-muted:    #8a9099;
  --shadow-sm:     0 2px 6px rgba(67,89,113,.12);
  --shadow-md:     0 4px 16px rgba(67,89,113,.15);
  --radius-card:   6px;
  --radius-pill:   20px;
  --radius-input:  6px;
  --state-success: #71dd37;
  --state-warning: #ffab00;
  --state-danger:  #ff3e1d;
  --state-info:    #03c3ec;
  --state-secondary:#8592a3;
}

/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Public Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:15px;
  line-height:1.5;
  background:var(--canvas);
  color:var(--text-body);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ===== Top navbar ===== */
.navbar{
  position:fixed;top:0;left:0;right:0;height:60px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  z-index:100;box-shadow:var(--shadow-sm);
}
.navbar-brand{display:flex;align-items:center;gap:8px;width:236px}
.navbar-brand span{font-weight:700;font-size:18px;color:var(--text-primary);letter-spacing:-.02em}
.navbar-search{flex:1;max-width:320px;position:relative}
.navbar-search input{
  width:100%;padding:8px 12px 8px 36px;
  border:1px solid var(--border);border-radius:var(--radius-input);
  font-size:14px;color:var(--text-body);background:var(--canvas);
  outline:none;transition:.18s;
}
.navbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-icon-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.navbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-body);transition:.18s;position:relative;
}
.icon-btn:hover{background:var(--canvas)}
.badge-dot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;
  border-radius:50%;background:var(--state-danger);border:2px solid var(--surface);
}
.nav-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent-dim);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;cursor:pointer;border:2px solid var(--accent);
}

/* ===== Left sidebar ===== */
.sidebar{
  position:fixed;top:60px;left:0;width:260px;bottom:0;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 0;
}
.nav-section-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-muted);padding:16px 24px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  cursor:pointer;color:var(--text-body);text-decoration:none;
  border-radius:6px;margin:1px 12px;font-size:14px;font-weight:500;transition:.18s;
}
.nav-item:hover{background:var(--canvas);color:var(--text-primary)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{flex-shrink:0;opacity:.8}
.nav-item.active svg{opacity:1}
.nav-badge{
  margin-left:auto;font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:var(--radius-pill);
  background:var(--accent-dim);color:var(--accent);
}

/* ===== Main content region ===== */
.main{
  margin-left:260px;margin-top:60px;
  padding:24px;min-height:calc(100vh - 60px);
}

/* ===== Page header ===== */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700;color:var(--text-primary)}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}

/* ===== Card shell ===== */
.card{
  background:var(--surface);border-radius:var(--radius-card);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
}
.card-title{
  font-size:14px;font-weight:600;color:var(--text-primary);
  text-transform:uppercase;letter-spacing:.05em;
}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 20px;border-radius:var(--radius-input);
  font-size:14px;font-weight:500;border:none;cursor:pointer;
  transition:.18s;text-decoration:none;font-family:inherit;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-ghost:hover{background:var(--accent-dim)}

/* ===== Status pills ===== */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:600}
.pill-success{background:rgba(113,221,55,.15);color:#4b9e22}
.pill-warning{background:rgba(255,171,0,.15);color:#b07a00}
.pill-danger{background:rgba(255,62,29,.12);color:#c02e14}
.pill-info{background:rgba(3,195,236,.12);color:#0296b7}
.pill-secondary{background:rgba(133,146,163,.12);color:var(--state-secondary)}

/* ===== Form field ===== */
.field{margin-bottom:20px}
.field-label{font-size:13px;font-weight:600;color:var(--text-primary);display:block;margin-bottom:6px}
.required-mark{color:var(--accent)}
.field-input{
  width:100%;padding:9px 14px;border:1px solid var(--border);
  border-radius:var(--radius-input);font-size:14px;color:var(--text-primary);
  background:var(--surface);outline:none;transition:.18s;font-family:inherit;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.field-input.is-invalid{border-color:var(--state-danger);box-shadow:0 0 0 3px rgba(255,62,29,.1)}
.helper-text{font-size:12px;color:var(--text-muted);margin-top:4px}
.error-text{font-size:12px;color:var(--state-danger);margin-top:4px}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">
    <!-- Replace SVG with your logo mark -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="var(--accent)"/>
      <rect x="6" y="6" width="7" height="7" rx="2" fill="#fff"/>
      <rect x="15" y="6" width="7" height="7" rx="2" fill="rgba(255,255,255,.5)"/>
      <rect x="6" y="15" width="7" height="7" rx="2" fill="rgba(255,255,255,.5)"/>
      <rect x="15" y="15" width="7" height="7" rx="2" fill="#fff"/>
    </svg>
    <span>App Name</span>
  </div>
  <div class="navbar-search">
    <svg class="search-icon-prefix" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input type="text" placeholder="Search…" aria-label="Search">
  </div>
  <div class="navbar-actions">
    <button class="icon-btn" style="position:relative" title="Notifications" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <!-- Remove badge-dot when no notifications -->
      <span class="badge-dot"></span>
    </button>
    <div class="nav-avatar" title="Account" role="button" tabindex="0">AS</div>
  </div>
</nav>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="nav-section-label">Section Label</div>
  <!-- Active item: add class="active" -->
  <a class="nav-item active" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    Nav Item
  </a>
  <a class="nav-item" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
    </svg>
    Nav Item
    <span class="nav-badge">5</span>
  </a>
  <div class="nav-section-label">Another Section</div>
  <a class="nav-item" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
    </svg>
    Settings
  </a>
</aside>

<!-- Main content -->
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Page Title</div>
      <div class="page-subtitle">Page subtitle or breadcrumb</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost">Secondary Action</button>
      <button class="btn btn-primary">Primary Action</button>
    </div>
  </div>

  <!-- Place cards / grids / tables here -->
  <div class="card" style="padding:24px">
    <div class="card-title" style="margin-bottom:16px">Card Title</div>
    <!-- Card content -->
    <div class="field">
      <label class="field-label" for="ex-input">Field Label <span class="required-mark">*</span></label>
      <input class="field-input" id="ex-input" type="text" placeholder="Placeholder text" aria-required="true">
      <div class="helper-text">Helper text below the field.</div>
    </div>
    <div style="display:flex;gap:8px">
      <span class="pill pill-success">Active</span>
      <span class="pill pill-warning">Pending</span>
      <span class="pill pill-danger">Cancelled</span>
      <span class="pill pill-info">Trialing</span>
      <span class="pill pill-secondary">Inactive</span>
    </div>
  </div>
</main>

</body>
</html>
