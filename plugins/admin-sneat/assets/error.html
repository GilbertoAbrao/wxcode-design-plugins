<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — 404 Not Found</title>
<style>
:root {
  --accent:        #696cff;
  --accent-hover:  #5a5dd6;
  --accent-dim:    rgba(105,108,255,.12);
  --canvas:        #f5f5f9;
  --surface:       #ffffff;
  --border:        #e4e6e8;
  --text-primary:  #333240;
  --text-body:     #646e78;
  --text-muted:    #8a9099;
  --radius-input:  6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Public Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;background:var(--canvas);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;text-align:center}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;text-decoration:none}
.logo span{font-weight:700;font-size:22px;color:var(--text-primary)}

/* SVG illustration */
.illustration{margin-bottom:36px}

.error-code{font-size:80px;font-weight:800;color:var(--text-primary);letter-spacing:-.04em;line-height:1;margin-bottom:12px;font-variant-numeric:tabular-nums}
.error-heading{font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:12px}
.error-body{font-size:15px;color:var(--text-muted);max-width:380px;margin:0 auto 32px}

.btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 26px;border-radius:var(--radius-input);font-size:15px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:.18s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:var(--surface);color:var(--text-body);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<a class="logo" href="#">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="var(--accent)"/>
    <rect x="8" y="8" width="8" height="8" rx="2" fill="#fff"/>
    <rect x="20" y="8" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="8" y="20" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="20" y="20" width="8" height="8" rx="2" fill="#fff"/>
  </svg>
  <span>AppPanel</span>
</a>

<div class="illustration">
  <svg width="320" height="200" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="404 illustration">
    <!-- Ground shadow -->
    <ellipse cx="160" cy="190" rx="100" ry="8" fill="rgba(105,108,255,.08)"/>
    <!-- Document body -->
    <rect x="90" y="30" width="140" height="160" rx="10" fill="white" stroke="#e4e6e8" stroke-width="1.5"/>
    <!-- Document lines -->
    <rect x="110" y="55" width="60" height="8" rx="4" fill="#e4e6e8"/>
    <rect x="110" y="73" width="100" height="6" rx="3" fill="#f5f5f9"/>
    <rect x="110" y="89" width="80" height="6" rx="3" fill="#f5f5f9"/>
    <rect x="110" y="105" width="90" height="6" rx="3" fill="#f5f5f9"/>
    <rect x="110" y="121" width="60" height="6" rx="3" fill="#f5f5f9"/>
    <!-- Page fold -->
    <path d="M210 30 L230 30 L230 50 Z" fill="#f5f5f9" stroke="#e4e6e8" stroke-width="1"/>
    <path d="M210 30 L210 50 L230 50" fill="none" stroke="#e4e6e8" stroke-width="1"/>
    <!-- Magnifier -->
    <circle cx="185" cy="135" r="32" fill="white" stroke="var(--accent)" stroke-width="3"/>
    <circle cx="185" cy="135" r="18" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="2"/>
    <!-- X inside magnifier -->
    <line x1="178" y1="128" x2="192" y2="142" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="192" y1="128" x2="178" y2="142" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Handle -->
    <line x1="209" y1="159" x2="226" y2="176" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"/>
    <!-- Stars -->
    <circle cx="66" cy="50" r="4" fill="var(--accent)" opacity=".25"/>
    <circle cx="260" cy="80" r="3" fill="var(--accent)" opacity=".2"/>
    <circle cx="72" cy="150" r="3" fill="var(--accent)" opacity=".15"/>
    <circle cx="250" cy="160" r="5" fill="var(--accent)" opacity=".15"/>
  </svg>
</div>

<div class="error-code">404</div>
<div class="error-heading">Page Not Found</div>
<div class="error-body">
  Oops! 😖 The page you're looking for doesn't exist or has been moved. Double-check the URL or head back home.
</div>

<div class="btn-row">
  <a href="#" class="btn btn-primary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Back to Home
  </a>
  <a href="#" class="btn btn-ghost">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Contact Support
  </a>
</div>

</body>
</html>
