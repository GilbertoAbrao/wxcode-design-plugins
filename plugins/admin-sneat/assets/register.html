<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — Create Account</title>
<style>
:root {
  --accent:        #696cff;
  --accent-hover:  #5a5dd6;
  --accent-dim:    rgba(105,108,255,.12);
  --canvas:        #f5f5f9;
  --surface:       #ffffff;
  --border:        #e4e6e8;
  --text-primary:  #333240;
  --text-body:     #646e78;
  --text-muted:    #8a9099;
  --shadow-md:     0 8px 32px rgba(67,89,113,.16);
  --radius-card:   10px;
  --radius-input:  6px;
  --state-success: #71dd37;
  --state-warning: #ffab00;
  --state-danger:  #ff3e1d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Public Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;background:var(--canvas);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none}
.logo span{font-weight:700;font-size:22px;color:var(--text-primary)}
.auth-card{background:var(--surface);border-radius:var(--radius-card);border:1px solid var(--border);box-shadow:var(--shadow-md);padding:36px 40px;width:100%;max-width:440px}
.auth-heading{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px}
.auth-sub a{color:var(--accent);text-decoration:none;font-weight:500}
.auth-sub a:hover{text-decoration:underline}

.field{margin-bottom:18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-label{font-size:13px;font-weight:600;color:var(--text-primary);display:block;margin-bottom:6px}
.required-mark{color:var(--accent)}
.field-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-input);font-size:14px;color:var(--text-primary);background:var(--surface);outline:none;transition:.18s;font-family:inherit}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.field-input.is-invalid{border-color:var(--state-danger);box-shadow:0 0 0 3px rgba(255,62,29,.1)}
.password-wrap{position:relative}
.password-wrap .field-input{padding-right:44px}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;display:flex;align-items:center}
.helper-text{font-size:12px;color:var(--text-muted);margin-top:4px}
.error-text{font-size:12px;color:var(--state-danger);margin-top:4px;display:flex;align-items:center;gap:4px}

/* Password strength */
.strength-bar{display:flex;gap:4px;margin-top:8px}
.strength-seg{height:4px;border-radius:2px;flex:1;background:var(--border)}
.strength-seg.weak{background:var(--state-danger)}
.strength-seg.ok{background:var(--state-warning)}
.strength-seg.strong{background:var(--state-success)}
.strength-label{font-size:12px;margin-top:4px}
.strength-label.weak{color:var(--state-danger)}
.strength-label.ok{color:var(--state-warning)}
.strength-label.strong{color:#4b9e22}

/* Terms */
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;font-size:13px;color:var(--text-body)}
.terms-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:2px}
.terms-row a{color:var(--accent);text-decoration:none;font-weight:500}
.terms-row a:hover{text-decoration:underline}
.terms-error{font-size:12px;color:var(--state-danger);margin-top:4px;margin-bottom:12px}

.btn-primary{width:100%;padding:12px;border-radius:var(--radius-input);background:var(--accent);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:.18s;font-family:inherit}
.btn-primary:hover{background:var(--accent-hover)}
.auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)}
.auth-footer a{color:var(--accent);text-decoration:none;font-weight:500}
.auth-footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<a class="logo" href="#">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="var(--accent)"/>
    <rect x="8" y="8" width="8" height="8" rx="2" fill="#fff"/>
    <rect x="20" y="8" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="8" y="20" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
    <rect x="20" y="20" width="8" height="8" rx="2" fill="#fff"/>
  </svg>
  <span>AppPanel</span>
</a>

<div class="auth-card">
  <div class="auth-heading">Adventure starts here 🚀</div>
  <div class="auth-sub">Create your free account. Already have one? <a href="#">Sign in</a></div>

  <form novalidate>
    <div class="field-row">
      <div class="field">
        <label class="field-label" for="r-fname">First Name <span class="required-mark">*</span></label>
        <input class="field-input" id="r-fname" type="text" placeholder="Jordan" autocomplete="given-name" aria-required="true">
      </div>
      <div class="field">
        <label class="field-label" for="r-lname">Last Name <span class="required-mark">*</span></label>
        <input class="field-input" id="r-lname" type="text" placeholder="Davis" autocomplete="family-name" aria-required="true">
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="r-email">Email <span class="required-mark">*</span></label>
      <input class="field-input" id="r-email" type="email" placeholder="you@company.com" autocomplete="email" aria-required="true">
    </div>

    <div class="field">
      <label class="field-label" for="r-company">Company</label>
      <input class="field-input" id="r-company" type="text" placeholder="Acme Corp" autocomplete="organization">
    </div>

    <div class="field">
      <label class="field-label" for="r-pw">Password <span class="required-mark">*</span></label>
      <div class="password-wrap">
        <input class="field-input is-invalid" id="r-pw" type="password" placeholder="At least 8 characters" autocomplete="new-password" aria-required="true" aria-describedby="r-pw-err r-pw-strength" aria-invalid="true">
        <button type="button" class="toggle-pw" aria-label="Show password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="r-pw-err" class="error-text">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Password must be at least 8 characters.
      </div>
      <div id="r-pw-strength" class="strength-bar" aria-label="Password strength: weak">
        <div class="strength-seg weak"></div>
        <div class="strength-seg"></div>
        <div class="strength-seg"></div>
        <div class="strength-seg"></div>
      </div>
      <div class="strength-label weak">Weak — add numbers and symbols to strengthen</div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="r-terms" aria-required="true" aria-describedby="r-terms-err">
      <label for="r-terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. You must accept to continue.</label>
    </div>
    <div id="r-terms-err" class="terms-error">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:3px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      You must accept the terms to create an account.
    </div>

    <button type="submit" class="btn-primary">Create Account</button>
  </form>
</div>

<div class="auth-footer">
  Already have an account? <a href="#">Sign in instead</a>
</div>

</body>
</html>
