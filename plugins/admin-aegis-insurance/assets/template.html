<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title}</title>
<style>
  /* ── TOKENS — copy these into every screen ───────────────────────── */
  :root {
    --clr-navy-900:  #1e3a8a;
    --clr-navy-700:  #1d4ed8;
    --clr-navy-600:  #2563eb;   /* primary links, active, CTAs */
    --clr-navy-100:  #dbeafe;
    --clr-navy-050:  #eff6ff;
    --clr-teal-500:  #14b8a6;   /* KPI top-bars, pipeline stage 3, chart series */
    --clr-teal-300:  #5eead4;   /* sidebar brand icon tint */
    --clr-teal-100:  #ccfbf1;
    --clr-teal-700:  #0f766e;
    --clr-green-500: #22c55e;
    --clr-green-100: #dcfce7;
    --clr-green-700: #15803d;
    --clr-amber-500: #f59e0b;
    --clr-amber-100: #fef3c7;
    --clr-amber-700: #b45309;
    --clr-red-500:   #ef4444;
    --clr-red-100:   #fee2e2;
    --clr-surface:   #f6f8fb;   /* page bg */
    --clr-border:    #e3e8f0;   /* card borders, table dividers */
    --clr-sidebar-bg:     #0f2057;               /* deep navy sidebar */
    --clr-sidebar-active: rgba(37,99,235,0.18);  /* active nav bg tint */
    --clr-sidebar-hover:  rgba(255,255,255,0.06);/* hover nav bg tint */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5; color: #1e293b;
    background: var(--clr-surface); display: flex; min-height: 100vh;
  }
  button { cursor: pointer; font-family: inherit; }
  a { color: var(--clr-navy-600); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── SIDEBAR ─────────────────────────────────────────────────────── */
  /* 240px, deep-navy bg, sticky full-height */
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--clr-sidebar-bg);
    display: flex; flex-direction: column; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  /* brand: SVG icon (color: var(--clr-teal-300)) + wordmark + sub-label */
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 22px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .brand-icon { width: 34px; height: 34px; color: var(--clr-teal-300); flex-shrink: 0; }
  .brand-name { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .brand-sub  { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.45); letter-spacing: 0.8px; text-transform: uppercase; }
  /* entity switcher pill */
  .entity-switcher { margin: 14px 14px 6px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 500; }
  /* nav groups */
  .nav-section { padding: 16px 0 4px; }
  .nav-section-label { padding: 0 20px 6px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: rgba(255,255,255,0.65); font-size: 13.5px; font-weight: 500; cursor: pointer; border-left: 3px solid transparent; transition: background 0.15s, color 0.15s; }
  .nav-item:hover { background: var(--clr-sidebar-hover); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--clr-sidebar-active); color: #fff; border-left-color: var(--clr-navy-600); }
  .nav-item svg { flex-shrink: 0; width: 16px; height: 16px; }
  .nav-badge { margin-left: auto; background: var(--clr-red-500); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; min-width: 18px; text-align: center; }
  .nav-badge.amber { background: var(--clr-amber-500); }
  .nav-badge.teal  { background: var(--clr-teal-500); }
  /* user footer */
  .sidebar-footer { margin-top: auto; padding: 16px 14px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--clr-navy-600); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .sidebar-user-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .sidebar-user-role { font-size: 11px; color: rgba(255,255,255,0.4); }

  /* ── MAIN ────────────────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Topbar: 60px, white, 1px border-bottom, sticky */
  .topbar { height: 60px; background: #fff; border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 10; }
  /* breadcrumb title stack + search + period-tabs + bell + avatar */

  /* Content area */
  .content { padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }

  /* ── CARD ────────────────────────────────────────────────────────── */
  /* white, 10px radius, 1px border, 0 2px 8px shadow */
  .card { background: #fff; border-radius: 10px; border: 1px solid var(--clr-border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

  /* KPI card: top 3px teal bar via ::before */
  .kpi-card { position: relative; overflow: hidden; }
  .kpi-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--clr-teal-500); }

  /* ── STATUS PILLS ────────────────────────────────────────────────── */
  .pill { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .pill.active    { background: var(--clr-green-100);  color: var(--clr-green-700); }
  .pill.pending   { background: var(--clr-amber-100);  color: var(--clr-amber-700); }
  .pill.inactive  { background: var(--clr-red-100);    color: var(--clr-red-500); }
  .pill.cancelled { background: #f1f5f9; color: #64748b; }
  .pill.review    { background: var(--clr-teal-100);   color: var(--clr-teal-700); }

  /* ── BUTTONS ─────────────────────────────────────────────────────── */
  .btn-primary { padding: 8px 16px; background: var(--clr-navy-600); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .btn-primary:hover:not(:disabled) { background: var(--clr-navy-700); }
  .btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
  .btn-ghost { padding: 8px 14px; background: transparent; border: 1px solid var(--clr-border); border-radius: 8px; font-size: 13px; font-weight: 600; color: #334155; }
  .btn-ghost:hover { background: var(--clr-surface); }

  /* ── FORM FIELD INLINE VALIDATION ───────────────────────────────── */
  .field-label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 5px; }
  .req { color: var(--clr-red-500); margin-left: 2px; }
  .control { display: block; width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--clr-border); border-radius: 8px; background: var(--clr-surface); font-size: 13px; color: #1e293b; font-family: inherit; outline: none; transition: border-color 0.12s, box-shadow 0.12s; }
  .control:focus { border-color: var(--clr-navy-600); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .helper { display: block; font-size: 11px; color: #64748b; margin-top: 4px; }
  /* invalid state — add .invalid on .field */
  .field.invalid .control { border-color: var(--clr-red-500); background: #fff8f8; }
  .error-msg { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--clr-red-500); margin-top: 4px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <!-- Replace with domain brand icon SVG, color: var(--clr-teal-300) -->
    <svg class="brand-icon" viewBox="0 0 34 34" fill="none">
      <rect x="4" y="4" width="26" height="26" rx="5" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M11 17h12M17 11v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-name">{Brand Name}</div>
      <div class="brand-sub">{Sub-label}</div>
    </div>
  </div>

  <div class="entity-switcher">
    <span>{Entity / Group label}</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.25l3.5 3.5 3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <!-- Add .nav-section blocks; active item gets class="nav-item active" -->
  <div class="nav-section">
    <div class="nav-section-label">{Group 1 label}</div>
    <div class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
      {Nav item 1}
    </div>
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="1.5,11.5 5.5,6.5 8.5,9 11.5,4.5 14.5,7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      {Nav item 2}
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">{Group 2 label}</div>
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 4H2.5A1 1 0 001.5 5v7a1 1 0 001 1h11a1 1 0 001-1V5a1 1 0 00-1-1z" stroke="currentColor" stroke-width="1.4"/></svg>
      {Nav item 3}
      <span class="nav-badge teal">{count}</span>
    </div>
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="5" x2="8" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      {Nav item 4}
      <span class="nav-badge">{count}</span>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-avatar">{XX}</div>
    <div>
      <div class="sidebar-user-name">{User Name}</div>
      <div class="sidebar-user-role">{Role}</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div style="font-size:15px;font-weight:700;color:#1e293b">{Screen Title}</div>
      <div style="font-size:11px;color:#64748b">{Brand} / <span style="color:var(--clr-navy-600)">{Page}</span></div>
    </div>
    <!-- search, period tabs, bell, avatar go here — see dashboard.html -->
  </div>

  <!-- Content — drop region skeletons from references/layouts.md here -->
  <div class="content">
    <!-- {regions} -->
  </div>

</main>
</body>
</html>
