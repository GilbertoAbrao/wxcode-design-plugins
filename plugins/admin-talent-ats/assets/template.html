<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{Screen Title} — Light Indigo Admin</title>
<style>
/* ── Token block: copy to every screen ─────────────────────────────────── */
:root {
  /* Indigo primary */
  --c-primary:    #4f46e5;
  --c-primary-lt: #6366f1;
  --c-primary-bg: #eef2ff;
  /* Pink secondary accent */
  --c-accent:     #ec4899;
  --c-accent-lt:  #f472b6;
  --c-accent-bg:  #fdf2f8;
  /* Violet supporting */
  --c-violet:     #7c3aed;
  --c-violet-bg:  #f5f3ff;
  /* Semantic */
  --c-success:    #22c55e;
  --c-success-bg: #f0fdf4;
  --c-warning:    #f59e0b;
  --c-warning-bg: #fffbeb;
  --c-error:      #ef4444;
  --c-error-bg:   #fef2f2;
  /* Canvas */
  --c-surface:    #f8f8fc;   /* page background */
  --c-card:       #ffffff;   /* raised panels */
  --c-sidebar:    #ffffff;   /* sidebar background */
  --c-border:     #e8e8f2;   /* 1px borders everywhere */
  /* Text ramp */
  --c-text:       #1e1b4b;   /* primary / headings */
  --c-text2:      #334155;   /* secondary body */
  --c-text3:      #475569;   /* tertiary / labels */
  --c-muted:      #94a3b8;   /* placeholders / subtitles */
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:13px;line-height:1.5;
  background:var(--c-surface);color:var(--c-text);
  display:flex;height:100vh;overflow:hidden;
}
svg{display:block;flex-shrink:0}
button{font-family:inherit;cursor:pointer}

/* ── Sidebar shell ── */
.sidebar{
  width:232px;min-width:232px;background:var(--c-sidebar);
  border-right:1px solid var(--c-border);
  display:flex;flex-direction:column;overflow-y:auto;
}
/* Brand block */
.sb-brand{display:flex;align-items:center;gap:10px;padding:20px 16px 16px;border-bottom:1px solid var(--c-border)}
/* Entity switcher */
.sb-switcher{margin:12px 12px 4px;background:var(--c-primary-bg);border:1px solid var(--c-border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
/* Nav group label */
.sb-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--c-muted);padding:10px 16px 4px;text-transform:uppercase}
/* Nav item */
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 16px;position:relative;color:var(--c-text3);font-size:12.5px;font-weight:500;cursor:pointer;transition:background .12s}
.sb-item:hover{background:#f1f0fe}
.sb-item.active{color:var(--c-primary);font-weight:600;background:var(--c-primary-bg)}
.sb-item.active::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:var(--c-primary)}
/* Count badge on nav item */
.sb-badge{margin-left:auto;background:var(--c-primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
/* Footer avatar cluster */
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--c-border);display:flex;align-items:center;gap:8px}

/* ── Topbar ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--c-card);border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0}

/* ── Content area ── */
.content{flex:1;overflow-y:auto;padding:20px}

/* ── Shared primitives ── */
/* Card panel */
.card{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;box-shadow:0 1px 4px rgba(79,70,229,.04)}
/* Page header */
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.page-header h1{font-size:18px;font-weight:700;color:var(--c-text);flex:1}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:12.5px;font-family:inherit;font-weight:600;cursor:pointer;border:none;transition:opacity .12s}
.btn:hover:not(:disabled){opacity:.88}
.btn-ghost{background:none;border:1px solid var(--c-border);color:var(--c-text3)}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:disabled{background:#a5b4fc;cursor:not-allowed;opacity:1}
.btn-sm{padding:4px 10px;font-size:12px}
/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
/* KPI card: see assets/dashboard.html for full component */
/* Stage board: see assets/dashboard.html */
/* Table: see assets/list.html */
/* Form fields: see assets/form.html */
/* Detail: see assets/detail.html */

/* ── Stage / status pills ── */
.stage-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-s0{background:#f1f5f9;color:var(--c-text3)}
.pill-s1{background:var(--c-violet-bg);color:var(--c-violet)}
.pill-s2{background:var(--c-accent-bg);color:#be185d}
.pill-s3{background:#dcfce7;color:#15803d}

/* ── Tag chips ── */
.tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;border:1px solid}
.tag-linkedin{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.tag-referral{background:var(--c-accent-bg);border-color:#fbcfe8;color:#be185d}
.tag-agency{background:var(--c-warning-bg);border-color:#fde68a;color:#b45309}
.tag-board{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}

/* ── Delta chips ── */
.delta-up{background:#dcfce7;color:#15803d;display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.delta-dn{background:#fee2e2;color:#b91c1c;display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}

/* ── Form field inline validation ── */
/* Use .field.invalid on the wrapper; never add a separate validation-summary panel */
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:12px;font-weight:600;color:var(--c-text2)}
.req{color:var(--c-error)}
.control{padding:7px 10px;border:1px solid var(--c-border);border-radius:8px;font-size:12.5px;font-family:inherit;color:var(--c-text2);background:#fff;outline:none;transition:border-color .12s}
.control:focus{border-color:var(--c-primary-lt)}
.helper{font-size:11px;color:var(--c-muted)}
.field.invalid .control{border-color:var(--c-error);background:var(--c-error-bg)}
.error-msg{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--c-error)}

/* ── Pagination ── */
.pg-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--c-border);background:none;font-size:12px;color:var(--c-text3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.pg-btn.active{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}
.pg-btn:hover:not(.active){background:var(--c-primary-bg)}
</style>
</head>
<body>
