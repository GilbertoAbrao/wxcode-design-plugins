<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — Page Not Found</title>
<style>
:root {
  --canvas: #191c24;
  --card: #1e2130;
  --border: #2c2e33;
  --text-primary: #e4e6ef;
  --text-secondary: #b5b5c3;
  --text-muted: #6c7293;
  --accent: #8862e0;
  --accent-end: #5b8ef0;
  --accent-dim: rgba(136,98,224,.14);
  --accent-gradient: linear-gradient(135deg, #8862e0 0%, #5b8ef0 100%);
  --radius: 4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--canvas); color: var(--text-primary);
  font-family: "Rubik","Nunito Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size: 14px; line-height: 1.5; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px; text-align: center;
  background-image:
    radial-gradient(circle at 25% 25%, rgba(136,98,224,.07) 0%, transparent 55%),
    radial-gradient(circle at 75% 75%, rgba(91,142,240,.05) 0%, transparent 55%);
}
.navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; z-index: 50; }
.brand-icon { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 18px; height: 18px; }
.brand-name { font-size: 18px; font-weight: 700; }
.error-wrap { max-width: 520px; display: flex; flex-direction: column; align-items: center; gap: 24px; margin-top: 60px; }
/* SVG illustration */
.error-svg { width: 280px; height: 200px; }
.error-code {
  font-size: 80px; font-weight: 700; line-height: 1;
  background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; font-variant-numeric: tabular-nums;
  filter: drop-shadow(0 0 32px rgba(136,98,224,.3));
}
.error-title { font-size: 24px; font-weight: 500; color: var(--text-primary); }
.error-desc { font-size: 14px; color: var(--text-muted); max-width: 380px; line-height: 1.7; }
.btn-row { display: flex; gap: 12px; align-items: center; }
.btn-primary {
  padding: 10px 24px; border-radius: var(--radius); border: none;
  background: var(--accent-gradient); color: #fff; font-family: inherit; font-size: 14px;
  font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.btn-ghost {
  padding: 10px 24px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 14px;
  cursor: pointer; text-decoration: none; display: inline-flex; align-items: center;
  transition: border-color .15s, color .15s;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="brand-icon"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 5v4l3 2"/></svg></div>
  <span class="brand-name">Nexus</span>
</nav>

<div class="error-wrap">
  <!-- Geometric SVG illustration -->
  <svg class="error-svg" viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background shapes -->
    <circle cx="140" cy="100" r="90" fill="rgba(136,98,224,.06)" stroke="#2c2e33" stroke-width="1"/>
    <circle cx="140" cy="100" r="60" fill="rgba(136,98,224,.05)" stroke="#3d3f4a" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Question mark structure -->
    <circle cx="140" cy="70" r="28" fill="#1e2130" stroke="#8862e0" stroke-width="2"/>
    <path d="M130 62 Q130 54 140 54 Q150 54 150 62 Q150 70 140 74 L140 80" stroke="#8862e0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="140" cy="88" r="2.5" fill="#8862e0"/>
    <!-- Floating elements -->
    <rect x="30" y="40" width="24" height="24" rx="4" fill="#1e2130" stroke="#2c2e33" stroke-width="1" transform="rotate(-10 42 52)"/>
    <rect x="220" y="130" width="20" height="20" rx="4" fill="#1e2130" stroke="#2c2e33" stroke-width="1" transform="rotate(12 230 140)"/>
    <circle cx="50" cy="150" r="10" fill="#1e2130" stroke="#2c2e33" stroke-width="1"/>
    <circle cx="240" cy="60" r="8" fill="#1e2130" stroke="#8862e0" stroke-width="1" opacity=".5"/>
    <!-- Path lines -->
    <path d="M80 180 Q100 160 120 170 Q140 180 160 165 Q180 150 200 160" stroke="#2c2e33" stroke-width="1" stroke-dasharray="3 3" fill="none"/>
  </svg>

  <div class="error-code">404</div>
  <div class="error-title">Page Not Found</div>
  <div class="error-desc">The page you're looking for doesn't exist or may have been moved to a different location.</div>

  <div class="btn-row">
    <a href="#" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go to Dashboard
    </a>
    <a href="javascript:history.back()" class="btn-ghost">Go Back</a>
  </div>
</div>
</body>
</html>
