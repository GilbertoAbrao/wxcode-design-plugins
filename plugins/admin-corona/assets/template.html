<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Console — Shell</title>
<style>
/* ============================================================
   ADMIN CONSOLE — TOKEN SHELL (seed for new screens)
   Replace [PLACEHOLDER] sections with domain content.
   Do not add external CDN links.
   ============================================================ */

/* --- Design tokens ----------------------------------------- */
:root {
  /* Canvas */
  --canvas: #191c24;
  --card: #1e2130;
  --card-hover: #252836;
  --border: #2c2e33;
  --border-strong: #3d3f4a;

  /* Text ramp */
  --text-primary: #e4e6ef;
  --text-secondary: #b5b5c3;
  --text-muted: #6c7293;
  --text-faint: #4a4b68;

  /* Accent (violet → blue gradient) */
  --accent: #8862e0;
  --accent-end: #5b8ef0;
  --accent-dim: rgba(136,98,224,.14);
  --accent-gradient: linear-gradient(135deg, #8862e0 0%, #5b8ef0 100%);

  /* Status tokens */
  --state-active: #22c55e;
  --state-active-dim: rgba(34,197,94,.13);
  --state-pending: #f59e0b;
  --state-pending-dim: rgba(245,158,11,.13);
  --state-error: #ef4444;
  --state-error-dim: rgba(239,68,68,.13);
  --state-inactive: #6c7293;
  --state-inactive-dim: rgba(108,114,147,.13);
  --state-info: #38bdf8;
  --state-info-dim: rgba(56,189,248,.13);
  --delta-up: #4ade80;
  --delta-down: #f87171;

  /* Geometry */
  --radius: 4px;
  --pill-radius: 12px;
}

/* --- Reset -------------------------------------------------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--canvas);
  color: var(--text-primary);
  font-family: "Rubik","Nunito Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Navbar (60px, sticky) ---------------------------------- */
.navbar {
  position: sticky; top: 0; z-index: 50;
  height: 60px; background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.brand-icon {
  width: 32px; height: 32px; border-radius: var(--radius);
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-icon svg { width: 18px; height: 18px; color: #fff; }
.brand-name { font-size: 18px; font-weight: 700; color: var(--text-primary); text-decoration: none; }
.navbar-spacer { flex: 1; }
.nav-icon-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: transparent; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .15s;
}
.nav-icon-btn:hover { background: var(--accent-dim); color: var(--text-primary); }
.nav-icon-btn svg { width: 18px; height: 18px; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
}

/* --- Layout ------------------------------------------------- */
.layout { display: flex; flex: 1; overflow: hidden; }

/* --- Sidebar (240px) ---------------------------------------- */
.sidebar {
  width: 240px; min-height: calc(100vh - 60px);
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
}
.sidebar-section-label {
  padding: 0 20px 8px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
  color: var(--text-muted);
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; text-decoration: none; color: var(--text-muted); font-size: 14px;
  transition: background .15s, color .15s;
}
.nav-item:hover { background: var(--accent-dim); color: var(--text-primary); }
.nav-item.active { background: var(--accent-gradient); color: #fff; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-spacer { flex: 1; }
.sidebar-profile {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-top: 1px solid var(--border);
}
.profile-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
}

/* --- Main content area ------------------------------------- */
.main { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }

/* --- Card --------------------------------------------------- */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.card-body { padding: 20px; }

/* --- Buttons ------------------------------------------------ */
.btn-primary {
  padding: 8px 16px; border-radius: var(--radius); border: none;
  background: var(--accent-gradient); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
  transition: opacity .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover { opacity: .88; }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }
.btn-ghost {
  padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary);
  font-family: inherit; font-size: 13px; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* --- Status pills ------------------------------------------ */
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: var(--pill-radius);
  font-size: 11px; font-weight: 500; white-space: nowrap;
}
.pill.green    { background: var(--state-active-dim);   color: var(--state-active); }
.pill.amber    { background: var(--state-pending-dim);  color: var(--state-pending); }
.pill.red      { background: var(--state-error-dim);    color: var(--state-error); }
.pill.inactive { background: var(--state-inactive-dim); color: var(--state-inactive); }
.pill.info     { background: var(--state-info-dim);     color: var(--state-info); }

/* --- Form primitives --------------------------------------- */
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--canvas); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px; color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-input.error, .form-select.error { border-color: var(--state-error); }
.field-error { font-size: 11px; color: var(--state-error); margin-top: 4px; }
.field-helper { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* --- Table ------------------------------------------------- */
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
  color: var(--text-muted); padding: 10px 16px; text-align: left;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--card-hover); }
tbody td { padding: 12px 16px; font-size: 13px; color: var(--text-secondary); }
.td-id { font-family: "Courier New", monospace; font-size: 12px; color: var(--text-muted); }
.td-num { text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
