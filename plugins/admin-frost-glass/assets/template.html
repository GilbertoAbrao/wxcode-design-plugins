<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{Screen Title}</title>
<style>
/* ─── FROST GLASS ADMIN — TOKEN SEED ───────────────────────────────────────
   Copy this template as a starting shell. Drop region skeletons from
   references/layouts.md into <main class="content">. Replace every {brace}
   placeholder with real domain content.
   ──────────────────────────────────────────────────────────────────────── */
:root {
  /* Canvas gradient stops */
  --grad-a: #0f0c29;
  --grad-b: #1a0533;
  --grad-c: #0d2137;
  --grad-d: #0c2a3a;

  /* Accent system */
  --accent-cyan: #22d3ee;
  --accent-cyan-dim: #0891b2;
  --accent-violet: #a78bfa;
  --accent-violet-dim: #7c3aed;
  --accent-rose: #f472b6;
  --accent-emerald: #34d399;
  --accent-amber: #fbbf24;

  /* Glass surfaces — all neutral rgba, no chromatic values */
  --glass-bg: rgba(255,255,255,0.06);
  --glass-bg-hover: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.36);
  --glass-blur: blur(16px);

  /* Chart series */
  --chart-1: #22d3ee;
  --chart-2: #a78bfa;
  --chart-3: #34d399;
  --chart-4: #fbbf24;

  /* Text ramp */
  --text-primary: rgba(255,255,255,0.95);
  --text-muted: rgba(255,255,255,0.50);
  --text-faint: rgba(255,255,255,0.28);

  --sidebar-w: 220px;
  --topbar-h: 60px;
  --radius: 14px;
  --radius-sm: 8px;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  background: radial-gradient(ellipse at 65% 15%, var(--grad-b) 0%, var(--grad-a) 45%, var(--grad-c) 70%, var(--grad-d) 100%) fixed;
  background-size: cover;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 99px; }

/* ─── Shell ────────────────────────────────────────────────────────────── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ─── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-right: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  padding: 24px 0 16px;
  overflow-y: auto;
  z-index: 10;
}

.sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; }
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.brand-sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

.nav-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-faint);
  padding: 0 20px 8px; margin-top: 12px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 2px solid transparent;
  color: var(--text-muted); font-size: 13px; font-weight: 500; text-decoration: none;
}
.nav-item:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
.nav-item.active {
  border-left-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(34,211,238,0.08);
  text-shadow: 0 0 12px rgba(34,211,238,0.4);
}
.nav-item.active svg { filter: drop-shadow(0 0 4px var(--accent-cyan)); }

.nav-badge {
  margin-left: auto;
  background: rgba(34,211,238,0.18); color: var(--accent-cyan);
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 99px;
  border: 1px solid rgba(34,211,238,0.3);
}

.sidebar-footer { margin-top: auto; padding: 16px 20px 0; border-top: 1px solid var(--glass-border); }
.user-pill {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  border-radius: var(--radius-sm); background: var(--glass-bg); border: 1px solid var(--glass-border);
}
.avatar-sm {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.user-info-name { font-size: 12px; font-weight: 600; }
.user-info-role { font-size: 10px; color: var(--text-muted); }

/* ─── Main + Topbar ─────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: var(--topbar-h);
  display: flex; align-items: center; gap: 16px; padding: 0 24px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  flex-shrink: 0; z-index: 9;
}

.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
.breadcrumb .crumb-active { color: var(--text-primary); font-weight: 600; }
.breadcrumb .sep { color: var(--text-faint); }

.search-wrap { flex: 1; max-width: 320px; margin: 0 auto; position: relative; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 36px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
  border-radius: 99px; color: var(--text-primary); font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.search-wrap input::placeholder { color: var(--text-faint); }
.search-wrap input:focus { border-color: rgba(34,211,238,0.4); background: rgba(255,255,255,0.09); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }

.topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted);
  transition: background 0.15s, color 0.15s; position: relative;
}
.icon-btn:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
.notif-dot {
  position: absolute; top: 7px; right: 7px; width: 7px; height: 7px;
  border-radius: 50%; background: var(--accent-rose);
  border: 1.5px solid rgba(15,12,41,0.8);
}
.avatar-topbar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-violet-dim), var(--accent-cyan-dim));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: 1.5px solid var(--glass-border);
}

/* ─── Content area ──────────────────────────────────────────────────────── */
.content {
  flex: 1; overflow-y: auto; padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
}

/* ─── Buttons ───────────────────────────────────────────────────────────── */
.btn-ghost {
  padding: 8px 16px; background: transparent;
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  color: var(--text-muted); font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn-ghost:hover { background: var(--glass-bg-hover); color: var(--text-primary); }

.btn-primary {
  padding: 8px 16px;
  background: linear-gradient(135deg, var(--accent-cyan-dim), var(--accent-cyan));
  border: none; border-radius: var(--radius-sm);
  color: #0f0c29; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 0 16px rgba(34,211,238,0.3);
  transition: box-shadow 0.15s, opacity 0.15s;
}
.btn-primary:hover { box-shadow: 0 0 24px rgba(34,211,238,0.5); opacity: 0.92; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

/* ─── Glass card ────────────────────────────────────────────────────────── */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
}

/* ─── Status pills ──────────────────────────────────────────────────────── */
.pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.pill-active   { background: rgba(52,211,153,0.14);  color: var(--accent-emerald); }
.pill-pending  { background: rgba(251,191,36,0.14);  color: var(--accent-amber);   }
.pill-critical { background: rgba(244,114,182,0.14); color: var(--accent-rose);    }
.pill-info     { background: rgba(167,139,250,0.14); color: var(--accent-violet);  }

/* ─── Delta chips ───────────────────────────────────────────────────────── */
.kpi-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
.delta-up   { background: rgba(52,211,153,0.14);  color: var(--accent-emerald); }
.delta-down { background: rgba(244,114,182,0.14); color: var(--accent-rose);    }

/* ─── ADD SCREEN-SPECIFIC CSS BELOW THIS LINE ──────────────────────────── */
</style>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <!-- Replace with real brand SVG + name -->
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <circle cx="18" cy="18" r="16" stroke="var(--accent-cyan)" stroke-width="1.5"/>
        <path d="M11 18h14M18 11v14" stroke="var(--accent-cyan)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="brand-name">{Brand}</div>
        <div class="brand-sub">{Product}</div>
      </div>
    </div>

    <!-- Nav section -->
    <div class="nav-section-label">{Section}</div>
    <a class="nav-item active" href="#">
      <!-- inline SVG icon -->
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.6"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.6"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
      {Nav item}
    </a>
    <!-- Repeat nav items as needed -->

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar-sm">{Initials}</div>
        <div>
          <div class="user-info-name">{Full name}</div>
          <div class="user-info-role">{Role}</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <span>{Parent}</span>
        <span class="sep">/</span>
        <span class="crumb-active">{Current screen}</span>
      </nav>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="text" placeholder="Search {entities}…" aria-label="Search">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" aria-label="Notifications">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1C8 1 4 3 4 8V12H12V8C12 3 8 1 8 1Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6 12C6 13.1 6.9 14 8 14C9.1 14 10 13.1 10 12" stroke="currentColor" stroke-width="1.4"/></svg>
          <span class="notif-dot" aria-hidden="true"></span>
        </button>
        <div class="avatar-topbar" role="button" tabindex="0" aria-label="User menu">{Initials}</div>
      </div>
    </header>

    <!-- ── Content: drop region skeletons from references/layouts.md here ── -->
    <main class="content">

      <!-- Page header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div style="font-size:20px;font-weight:700;letter-spacing:-0.02em">{Page title}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px">{Scope · context · timestamp}</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn-ghost">{Secondary action}</button>
          <button class="btn-primary">+ {Primary action}</button>
        </div>
      </div>

      <!-- Drop dashboard / list / form / detail skeleton here -->

    </main>
  </div>

</div>
</body>
</html>
