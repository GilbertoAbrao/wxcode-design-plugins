<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Admin — Shell Seed</title>
<!--
  SEED SKELETON — copy this file as the starting point for a new screen in the
  Pulse airy light-mode skin. It carries the :root token block and the app shell
  (sidebar with workspace switcher + nav groups + avatar-stack footer, and a main
  area with a topbar + scrollable content slot).
  Replace the workspace mark/name, the nav group labels and items, the topbar
  title and breadcrumb, and the <div class="content"> body with the real domain's
  equivalents. Mark the active nav item with .active. Keep the token block intact.
-->
<style>
  :root {
    /* Accent (the one non-neutral hue) */
    --accent:         #0ea5e9;
    --accent-dark:    #2563eb;
    --accent-bg:      #e0f2fe;
    /* Status / stage ramp — add or rename states to match the domain */
    --state-stage1:   #0ea5e9;  --state-stage1-bg:  #e0f2fe;
    --state-stage2:   #f59e0b;  --state-stage2-bg:  #fef3c7;
    --state-stage3:   #7c3aed;  --state-stage3-bg:  #ede9fe;
    --state-won:      #10b981;  --state-won-bg:     #d1fae5;
    --state-lost:     #ef4444;  --state-lost-bg:    #fee2e2;
    /* Deltas */
    --delta-up:       #059669;  --delta-up-bg:   #d1fae5;
    --delta-down:     #dc2626;  --delta-down-bg: #fee2e2;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    background: #f8fafc;   /* page canvas */
    color: #334155;        /* body text */
    height: 100%; line-height: 1.5;
  }
  html { height: 100%; }
  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; font-family: inherit; font-size: inherit; border: none; background: none; }
  input, select { font-family: inherit; font-size: inherit; }

  /* Neutral light ramp (hardcoded): #f8fafc page / #ffffff card / #f1f5f9 inset
     / #e2e8f0 hairline. Text: #0f172a / #334155 / #475569 / #64748b / #94a3b8. */

  /* ── APP SHELL ─────────────────────────────────────────────── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ───────────────────────────────────────────────── */
  .sidebar { width: 240px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow-y: auto; }

  /* Workspace switcher */
  .ws-switcher { display: flex; align-items: center; gap: 10px; padding: 18px 16px 14px; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
  .ws-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-dark); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .ws-name { font-weight: 600; font-size: 13px; color: #0f172a; flex: 1; }

  /* Nav groups */
  .nav-section { padding: 18px 12px 4px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8; padding: 0 4px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 7px; font-size: 13px; color: #475569; transition: background .12s, color .12s; position: relative; }
  .nav-item:hover { background: #f1f5f9; color: #0f172a; }
  .nav-item.active { background: var(--accent-bg); color: var(--accent-dark); font-weight: 600; }
  .nav-item.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 18px; border-radius: 2px; background: var(--accent-dark); }
  .nav-item svg { flex-shrink: 0; color: currentColor; }
  .nav-badge { margin-left: auto; background: var(--accent-dark); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

  /* Sidebar footer */
  .sidebar-footer { margin-top: auto; padding: 14px 16px; border-top: 1px solid #e2e8f0; }
  .avatar-sm { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; margin-right: -8px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; }
  .invite-link { font-size: 12px; color: var(--accent); font-weight: 500; }

  /* ── MAIN AREA ──────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Topbar */
  .topbar { height: 56px; flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; padding: 0 20px; }
  .topbar-title { font-size: 15px; font-weight: 700; color: #0f172a; white-space: nowrap; }
  .breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #94a3b8; margin-left: 6px; }
  .breadcrumb span + span::before { content: "›"; margin-right: 4px; }
  .breadcrumb .bc-active { color: #475569; }

  /* Search */
  .search-wrap { flex: 1; max-width: 340px; margin-left: auto; position: relative; display: flex; align-items: center; }
  .search-wrap svg { position: absolute; left: 10px; color: #94a3b8; pointer-events: none; }
  .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; color: #334155; font-size: 13px; outline: none; transition: border .15s; }
  .search-wrap input:focus { border-color: var(--accent); background: #fff; }

  /* Filter chips */
  .chip { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid #e2e8f0; color: #64748b; background: #fff; transition: all .12s; cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.chip-active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Avatar in topbar */
  .topbar-avatar { display: flex; align-items: center; gap: 8px; margin-left: 4px; }
  .avatar-lg { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dark); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar-name { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; }

  /* ── CONTENT SLOT ───────────────────────────────────────────── */
  .content { flex: 1; overflow-y: auto; padding: 20px; }

  /* Reusable primitives screens build on */
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .btn-ghost { padding: 7px 14px; background: transparent; border: 1px solid #e2e8f0; border-radius: 7px; color: #475569; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: border-color .15s, color .15s; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent-dark); }
  .btn-primary { padding: 7px 16px; background: var(--accent); border: 1px solid var(--accent); border-radius: 7px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn-primary:hover { background: var(--accent-dark); }
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR: workspace switcher → nav groups → avatar stack -->
<aside class="sidebar">

  <!-- WORKSPACE SWITCHER — relabel to the domain's workspace/org/account name -->
  <div class="ws-switcher">
    <div class="ws-mark">W</div>
    <span class="ws-name">Workspace Name</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M4 5.5l3 3 3-3" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- NAV GROUP — replace labels and icons; mark one item .active -->
  <div class="nav-section">
    <div class="nav-label">Group Label</div>
    <a href="#" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/>
      </svg>
      Overview
    </a>
    <a href="#" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Records
      <span class="nav-badge">0</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2.5 14c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Contacts
    </a>
  </div>

  <!-- Sidebar footer: avatar stack + invite link -->
  <div class="sidebar-footer">
    <div style="display:flex;align-items:center;margin-bottom:8px">
      <div style="display:flex">
        <!-- Repeat .avatar-sm for each team member, set a bg color per member -->
        <div class="avatar-sm" style="background:#2563eb">AA</div>
        <div class="avatar-sm" style="background:#7c3aed">BB</div>
        <div class="avatar-sm" style="background:#0ea5e9">CC</div>
      </div>
      <a href="#" class="invite-link" style="margin-left:18px">+ Invite</a>
    </div>
    <div style="font-size:11px;color:#94a3b8">N team members</div>
  </div>
</aside>

<!-- MAIN AREA: topbar + scrollable content -->
<div class="main">

  <!-- TOPBAR — relabel title + breadcrumb; add search/filter chips as needed -->
  <header class="topbar">
    <div>
      <div class="topbar-title">Screen Title</div>
      <div class="breadcrumb">
        <span>Home</span><span class="bc-active">Screen</span>
      </div>
    </div>

    <!-- Optional: search + filter chips + avatar -->
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="#94a3b8" stroke-width="1.4"/>
        <path d="M10.5 10.5l3 3" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search…" aria-label="Search">
    </div>

    <div class="topbar-avatar">
      <div class="avatar-lg">··</div>
      <span class="avatar-name">User Name</span>
    </div>
  </header>

  <!-- CONTENT SLOT — drop the screen body here.
       See assets/dashboard.html, list.html, form.html, detail.html
       and references/layouts.md for paste-ready skeletons. -->
  <div class="content">
    <!-- content goes here -->
  </div>

</div>
</div>

</body>
</html>
